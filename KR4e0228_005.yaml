body:
  text: 仰節堂集卷五明曹于汴撰墓志銘顯考纍贈徴仕郎刑科右給事中雲津曹府君顯前妣贈孺人喬氏顯妣封太孺人張氏合葬墓志銘余祖之家安邑厥初不可考西郊有塜纍纍約歷代甚逺莫詳諱位自勝國時七世祖諱天祥方有可稽六世祖諱本道高祖諱端曾祖諱玘祖諱司民配祖妣孺人賀氏外曾祖諱袖女生三子一女考居長諱希舜字伯孝别號雲津初配前妣孺人喬氏外祖諱蘋女蚤卒繼配妣太孺人張氏外祖諱健甫女考卒於萬厯之六年敬庵張先生志生殁行實於墓慕岡馮先生記神道之碑逮四十有二年十月六日戌時妣卒距生嘉靖十有四年八月十日午時壽八十歲卜以次年十有一月十有二日啓考之壙合二妣祔葬焉謹再礱石併藏諸幽考之孝友瑰節文章邃詣有二先生臚列在不敢復贅惟是憶不肖幼時見余考為諸門下士講授案無帙册亹亹如注聞昔受學於祖考每夜滅燭背誦盡一册以為常所遺閲過經書點攛之迹甚恭評注纚纚率出人意表未冠為博士弟子輒不為干有司之事或慫恿祖考俾強之祖考亦不強也常見當路折節過廬舍考野服出迓清茗共談浩如也或托之文字當路誤以為訛令更之亦竟不更然與人極沖藹少年輩至迂道以避憚其謙敬內恧也而至今紳珮中軫世懷昔之感蓋又種種云彼時不肖騃未能窺測祕奧然瀕屬纊時為不肖論生死之故若論他人然既不能語猶回首有所示豈以死生搖念者况貨賄豐嗇勢位崇卑何足挂吾考齒頰哉余妣出望族相余考矻矻壼內政事上撫下不毫毛自暇逸不肖及見其事我祖妣未嘗不適厥意而外祖妣萬終九十七齡之壽其安享何異于出丈夫子考逝後不肖輩孱然莫能自樹四女俱在室季子季女且僅數歲而稚妣殫力茹苦門户體貌賴之不隕喜施豫贍親戚傾篋洗囊不靳外祖妣性毅諸女饋食若以巾帕包裹則不納從母有適李者外祖家憐其扃閴乘牆餉之輒擲還妣凝重真有此風固有所鍾孕亦男子所難也比不肖通仕籍迎至淮隂者一至京都者再所教以毖飭內外言言金石蚤歲處妯娌以貧見睥睨既貴則報之極厚每食與共周旋其存殁曲盡嗚呼考妣之德若此乃致不肖叨抵今日天固借此豎子以博主榮耳初以不肖理官之滿徼恩勑命贈考文林郎直𨽻淮安府推官封妣太孺人繼以不肖給事吏垣值册立東朝贈考徵仕郎吏科給事中贈前妣孺人仍封妣太孺人繼又以不肖右給事刑垣值上聖母徽號贈考徴仕郎刑科右給事中前妣仍贈孺人妣仍封太孺人嗚呼不肖最庸暗何能以寸長尺伐得之君加之親蒼蒼之意固不欲余考以績學砥行余妣以秉淑勵貞僅終於黌舍夫婦故曰借此豎子以博主榮而已顧不肖子職多乖慈恩罔報靦眉宇於寰中抱愆尤而莫遣余考當年既未供一菽一水余妣處孀闈幾四十載亦未能代憂代瘁及當暮景復多曠違前歲補牘數十乞謝吏科而歸過蒙聖主晉少常卿豫歸省覲實稱異遇方圖侍聚遽罹永捐眷兹黃壤掩我親形噫不肖之肉寧堪充爼也耶前妣無出妣生子三長即于汴娶封孺人侯氏次于淮邑庠生繼叔考諱希禹之嗣娶路氏次于渭儒士冠帶娶馬氏女四長適周安止次適庠生楊可畏次適舉人劉定民次適董正學孫男三汴出者曰良聘楊氏淮出者曰吉運庠生初娶喬氏繼娶梁氏曰泰儒士娶薛氏孫女七汴出者長適庠生景永徽次聘于李必元淮出者長適庠生張仕祿次適庠生姚懿德渭出者長適張覲辰次適庠生馬爾循次尚幼曾孫男三吉出者惺泰出者呐慎渭及長女及渭出適張之孫女劉壻景孫壻俱先母而卒銘曰修林環互余考妣之墓皇命昭宣地靈呵護維靜以幽既安且固竣封兮還步裂心兮還顧步復顧兮可奈何淚流不到重泉路處士知一先生張公墓志銘知一先生姓張氏諱九霞字凌漢知一其號又號雲巔山人世籍平陽之蒲坂居首陽之東談郭里五世祖諱敬以洪武初遷居大澗乃號澗張氏而籍仍談郭高祖諱寬曾祖諱鄰祖諱輅父太公諱尚質兩娶皆嚴氏前嚴為潮之女生公是為太孺人公之長嗣輝余與同辛卯鄉書雅慕公高致屢欲登見未果而聞訃矍然傷悼既而年友梁用修以其所為狀致長君之囑俾余為銘置諸幽因相與道公之素初年好丹鼎鉛汞之術比覽太極圖讀其説及讀西銘正蒙二程紫陽文清各語録憬然動于中遂破竈焚方書散諸言黃白之士日夜孳孳潛心孔孟之學有得則拈筆録焉槩見於理言什一山居雜記其句云至有看他未有時又云了塵須是要同塵嗟乎大道之晦不著不察久矣或亦據席高談意見紛起崇有與耽無角立同塵與遺世分馳有者拘攣無者枯滅同者淄染遺者捐棄孰能合已發於未發即經世為出世實孔門之正印巨儒所艱窺而公以兩言道盡可不謂邁人之學識哉蓋公少負頴質沉重寡言笑淡於世味十三解聲詩十五不為末俗之談是後值太公遭家難拮據左右遂停誦習而太公竟弗寧宇去適於蜀公以煢煢孱弱外捍里人之凌轢者俾不得逞內操作水薪奉母以養祖母劉至傭書里册以襄祖母葬事諸艱備經始能受室生子不圮其門然如太公無耗何一日太孺人泫然曰汝父客蜀十有五載冉冉桑榆之景矣不則已枯之骨委於異土乎扶掖而來幸已不則輿櫬歸丘隴惟汝圖之公伏泣不能仰視曰痛父良苦嚮不敢奔呼逺覓者非不念之第以母之膝下僅此隻孑之軀耳今婦能事母又延一線之續此身可置于長途上問皇天下窮后土不得吾父兒弗歸矣泣拜徒步以西挈資不盈百錢而往甚毅道遇一士宋姓者感其孝贈之金授之治生術公乃陟秦嶺穿子午道直抵于瀘不可得越滇南歷撒蒙中慶澄江大理諸路三易寒暑跋涉五萬里又不可得惶急籲天願瀕死一見貿貿反瀘復遇宋於道為占曰會即見太公因就旅次日將晡一叟從外入雪鬢丹顔向客語生平似蒲中人熟聽則太公也持之而號觀者嘆訝遂迎以歸夫形容變易跬步誰何茫茫大地安所訊詰而相繼入次父吐生平兒得聆之何竒也兩遇宋士又何竒也其懷親之念直徹蒼旻神鬼冥冥驅排合湊而父子一體若逆若赴譬之血奔而肝動氣激而肺舉理有固然無足怪者公既聚太公太孺人於一堂乃令長君就外傅以竟未就之業日稽其所課或月夕躬為抄經作其勤勵太孺人及見其孫列學宫而太公享鹿鳴之賀公之振家而養志也太公還里之後垂四十載壽躋九旬公以七十餘齡之人榮養哀葬十八年暌違之日父之所厄兒之所愛似有假之以酬焉者而前是喪母成疾喪繼母如母孝不匱也公締交不遺貧賤富顯所在恥為磬折即被徴請亦罕往焉而聲名益重兢兢畏法非矩矱不敢蹈人或有微瑕亦不敢令公知一日遇解某橫加詬詈則笑而受之不與計直曲曰若喪心將自斃吾方彼憐也明日解死其量其明復如是嘗面數一少年之非甚厲逮暮而私為慮衣食輒至淚下方其面折時亦以用愛耳其贖人己鬻之癡女及聞鬻啞女者覓市三日多其直買而畜焉恐他人苦之不遂其生也釋兔舍魚犬馬之死葬以藁焉往而不愛買啞女俾仲嗣養之勿厭薄亦所以寓教也晚歲怡情山水吟弄翩翩無事閉户焚香正襟危坐冥心古典客至摘蔬供具共話桑麻或散步青野優遊自適忽搆劇疾無兒女身家之語整衣冠且逝猶為長君辨理先氣後之説為非是嗚呼是守正而終矣夫目觸鼻吸皆氣也無臭者安往一點胎凝形性併至胡先胡後固可察也學舍相望縫衣如雲而校勘宗旨乃當年束書之人亦足明學之鵠矣想其親親日久精專神一而又履囂用靜涉邇探遐大慎細矜鍊情見性秋宇澄而月鑑皎臘沍極而春風回所謂自得之也非人之所能為也借令汨沒于利欲之中血氣憒憒方在痿木且不能通之親安能通之道通于道者通于天矣公生嘉靖己丑冬十有一月二十有二日卒萬厯癸卯秋九月七日年七十有五以壽膺官非其所願者潛處而行修可謂曰士故以處士題也配孺人范氏鄉耆景山女生男二長即輝娶史氏壽官熞女繼韓氏庠士廷佐女次熿娶王氏處士楠女女一適洪業先公卒孫男四昶初聘孟進士希孔女暹初聘孟庠士一願女旭初晟初俱幼孫女六一適王鄉進士三欽子濬元一適馬儒士曉子騰驤一字楊時薦子庠士升三幼輝率諸子孫葬公于澗之東南太公墓之昭其期為萬厯三十三年夏四月十一日銘曰人生原諸親也生生道為根也不遺不畔根原敦也寧於兹丘而可焉者君也湖廣按察司僉事慕岡馮公墓志銘蓋余之得交于慕岡馮公也在壬辰同第之後云公端凝沉靜言若擬動若議窺其意向必為聖人而後己聞有闡揚聖學及志行端良者竭蹶師友之終歲講究如不及然絶不為口耳炫露之習曾會學淮浦纍月其同事謂余曰吾未嘗聞慕岡之有言也又會學京師纍年其同事謂余曰吾未嘗聞慕岡之有言也余以間質公所學公曰吾日日有領略焉蓋心研躬體期之乎自得以故月異而歲不同己亥年謂余曰吾其正月之氷乎固自覺將泮而大進乃在幽獄時曲暢旁通未嘗有所窒礙比出獄將遊歷四方盡交天下士參驗取益忽以病終悲哉其門下士戴子任跋涉來都下以志銘屬余嗟乎即無戴子至余自不容己于言公諱應京字可大慕岡其號先世自開封遷廣州有永祥者洪武間從戎南都𨽻籍泗州衛定居盱眙凡三傳曰方寶寶生皓皓生贈承德郎兵部主事崑岡公世登是為公父官順德訓導祀名宦祠盱眙以鄉賢祀者也配贈安人陳氏生公京邸甫八歲而贈公卒于官伶仃還里逾年始就小學路拾遺錢持以告母曰當詢其主還諸年十四讀宋儒程子遺書欣然有會志聖道自此始十五充博士弟子十八升增廣生繼乃廩于公督學直指至必旌其行衆口食貧竭力旨甘以娛母嘗居泗一夕忽心動曰母必有疾亟歸果然藥之愈六試省闈辛卯登賢書壬辰成二甲進士觀吏部政輒辭坊金不以煩里閈時哱寇方熾守臣多求去公上疏請降資為邊方尹尉練兵戡亂未許是秋以老母假歸次年安人卒哀毁幾絶苫塊蔬食不入內舍者三年丙申除户部主事督餉薊邊窮險隘究興替咨方略創户部職掌及經武考諸編丁酉東倭不靖轉兵部主事虞患殫謀倒囊延士以資當事大都公食衣不厭粗菲而日夜皇皇為天下慮非以接欵豪傑則考訂典籍每自外歸必呼筆識其所得之人與所聞善言行以為常己亥秋滿奉勑授階褒贈二尊人馳書祭告乃分田二區業陳劉二甥贍其兩姊夫世之貴人自貴耳誰復念先人遺血如公者且父事其師而周其師之子與父執之子俾皆有室有業焉是年擢副職方即庚子擢僉憲湖廣備兵武漢黃既下車亟行部延見吏士問利弊一以厚民生興教化為務首舉鄉約保甲社倉三事其崇賢奬節息訟弭盜懲淫斥異繕城葺祠除道疏川利農通商諸德政槩見于蓄艾編中先是楚苦稅監陳奉之荼毒者二年公入境其焰頗戢已復狂逞辛丑春公乃上疏劾其不法九大罪而稅監誣衊之疏亦至詔降公官尋削籍尋逮繫公初聞降報即解組登舟士民閧然哭聲震原野葦舸攀追夾岸號呼者信宿不絶爭繪像尸祝之建生祠若干所及在途聞逮繫報遣妻子東還而單騎赴中都龍興寺候逮沖襟愈色談道不斁黎明即起誦高皇帝御製文集或詢楚事曰盡臣職耳非有意為之也械入金吾署中稅監亦見撤于是楚民不啻更生而公且罹刑鞫禁詔獄薄海之內咸謂公以一身易全楚之命烈日爭光而全楚世世感之刺骨顧公于楚事偶然耳儒者以無事為本體以有事為應迹而世人能觀人于有事不能觀人于無事假令以楚事槩公則謂公為楚事掩亦可也公在圜室倡諸同繫儒紳紬繹孔聖心宗討論皇朝典故或閉關靜存者幾三月餘時有契悟忘憂躍喜而經世實用編成大抵尊崇聖祖備體用之全歸信紫陽析儒禪之異平生精力多見于此甲辰奉詔釋還杜門簡出足不涉公府率族衆舉祖先之祀田夫舉鄉社之約而祖祠義田創焉邑之倉學壇壝興焉蕭然蓬户之中纂述不輟暇則課少年歌詩習禮習射一日忽謂門人曰吾夜夢聞二語云其流行者光輝而其所以流行者散也我將去矣越旬日腹疾作謂親友曰百年頃刻耳宇宙即吾家萬物吾同氣所謂我身是私身也生死公于天吾何得私宰之病三日劇密存不發一語丙夜恭坐漏下五更而逝面色如生天地晦冥者十許日逺近悲悼是為萬厯三十四年丙午正月二十日距生嘉靖三十四年乙卯五月二十一日年僅五十有二楚以名宦祀而盱眙祀鄉賢祠夫世之仕者非無可紀之績然于道無窺不隘則雜其或從事學問馳心曠逺遺落世事亦焉用此若公者其學有用其政有根操履粹白精神流盎學當如是也已配張氏封安人備有令德人以此觀公之家政子二長霆公以兄之子為子者娶陳氏繼楊氏次霦側室李氏出娶霍丘選貢周允升女霦之生也公曰吾有嗣可致身于國矣及能讀書公曰令讀五經俟年十五觀其志果端人也則授以舉子業為國用不則否嗟乎此之為心事豈尋常可埒哉孫男四堯徵堯缺堯缺皆霆出堯會霦出孫女一霆出堯徵娶庠生亢時雨女餘皆幼墓在邑西之靈山葬以癸丑年十月草有缺日銘曰衆視聖若驚而思與之頏思與之頡衆談學若艷而如飢之哺如渴之啜厥學有成是謂正學可宗為轍嗚呼公固自信吾亦信公以傳信于來哲劉介達先生墓志銘余嘗誦電仲劉公山房集聽鶴十二偈知其深於道者為之序其歾也厥嗣余弟子塙偕其弟述公行實告於京邸余為志而銘之劉氏漢長沙定王後代有顯人宋咸淳進士諱漢臣子諱廷玉以明經辟揚州别駕孫諱文質以才幹辟山隂幕樂其山水乃占籍文質孫諱子華徵為大興同知孫諱諤登洪武丁丑進士第三人三傳諱某某生龍泉公諱棖醇厚好濟人急難數千金産盡傾焉初配姚氏太守諱世儒女繼配韓氏方伯諱陽女孫諱某女生公諱焀字電仲别號玉笥蚤慧勤習于學文成驚四座顧無録入鄉校者時以蕭索故客遊四方韓母勉之詩云家貧無奈子分行獨倚柴門計返程勿戀洛陽些箇富越王橋畔暮雲生世有如是母其子不雋偉乎既而龍泉公纍于族之户役幾罹遣則刺股攻苦至嘔血謂匪是無以免其父竟首録于當路而出龍泉公于厄然不以貧故履當路之庭况囁嚅富人前竭力養二親且贍二弟教之婚之寧令其子後余聞古人云兄弟親之子也孝弟一而已二乎哉癸酉秋闈業為分試鑒拔首薦之與主者左乃曰留解下科母小就遂七試不售命也左者留者造物為政公從是畢精課子題聫云今古乾坤皆是友父兄子弟自相師世有如是父家學不光大乎橋梓聚一竹屋耳提口授延朋論文不問宵晝王孺人典鏡典絮以佐之著視舌編集最三千餘篇及兒訓上下卷考天體星厯輿地之紀十議郊廟宗藩史諫兵律之條亦十䇿河運禦敵三論禍福同異倫誼十二辨國風刺惡春秋書法七題太極皇極律吕洪範十三經衍義諸子傳史二十二又著野史十二卷理路縱橫八卷持忍説貞女戒事核當世之務理抉千古之祕淵乎宏矣伯子入國學次舉于鄉季廪于庠未央也然涉世得一忍字衛生得一節字齊家得一儉字由博反約數字不啻足矣故取豫必謹然諾不負與人無纎芥之隙而不隨俗左右委婉果勇胥合焉世有胸貯千卷不得一字之用奚益其教子以名節為藩以噉名隕實為戒季幼稍抗禮先達輒督責荆請匪僅僅誨以帖括云爾晚年絶意仕進督學使者優之冠帶不受遨遊諸名勝登峻臨流訪交弔古栽花種樹稱觴酬節多出世之咏出世之行動云假合蓋亦志于真也方嘉尚有用道學而謂無用者為假為偽豈以假合遺落者乎又欲創義塜别賢愚立義學分親疏甓里衢置祭田厥志未竟然欲立欲達欲仁得仁念起足褒矣其捐田葬姊之適王者併葬其舅姑而遺稿有大宗譜母族韓譜祖母族徐譜及祭儀奠章亦證其志願非虛殁日之晨猶手書宗約致之族長既而欵賓方罷坐中堂呼諸孫輩糚燈為樂目上視遂逝族戚友人私諡介達督鹺直指扁以理學精傳生前海內交知贈言讚頌集視與編存笥公稟賦爽敏有入道之基而進機有二閲歷艱苦動忍備至譬金百鍊精光斯發一也好規不好頌自題云年過知非乞言自勵必期洗瘢摘瑕直刺吾骨而後快人以片語相及終夜詰責不能帖席曰何因有是學人未入真空地未必杖擊虛空自恕者日墜自責者日崇二也文成祠諸儒聚講時赴探討奧趣其會道亦有二嘗謂櫧山遺世士吾師其能用海門用世士吾師其能暗是知道無偏也李周二先生無偏也而公之學亦無偏也所以超超塵俗之表卓然為高士也生嘉靖乙巳四月二十一日午時殁萬厯庚戌正月十九日巳時年六十有六配王氏某女子三長國子生塙更名在庭娶庠生吳一麟女次舉人埁更名永基丙辰進士娶禮部儒士胡世杰女次廪生垸己酉貢士娶散官何鎮女孫男五錫恩垸出聘樂安余尹倫女孫錫齡錫蕃埁出錫蕃嗣塙錫朋錫履俱塙出孫女四錫順塙出字余尹倫孫某錫淑埁出字王龍溪先生曾孫庠生僑錫懿字庠生王彰之子某錫惠俱垸出葬之期為某年月日墓在某處銘曰芰衣為窮彩衣為通世眼何矇吾自有人人自有真至大至尊碩儒襟期妙道淵窺得數不竒勒石幽宫敬藉芳蹤百世以風張文學見羲公墓志銘夫天不可以人移而可以理度以理度天是以理度理其機為順以人移天其機逆而數不敵也故天不受移焉天心賦為人心人心所凝天心所凝也人心所運天心所運也天心不受欺人心亦不受欺不受欺故不可欺以人欺人隔以形體且云不可其神通也况吾之神明朗朗內燭詎能欺諸蓋進士張子翼明以若翁見羲公行狀觀余俾為志余誦之感焉公績學博雅蜚聲藝苑纍試於鄉不偶分校者竒其卷為圖決售於中庸墨義中增潤數句力薦之直指直指輒于增處塗之曰殊覺多此僅畀乙榜兹非天不可以人移耶方其增句時有揶揄于旁者耶若曰之人也數不應爾何為者乎直指之塗有佐之者耶若相弄抑相醒耶公嘗以次子啓明嗣其叔某之子大原遵父命為叔仁義著其鄉族不可令無後既而或齮齕之乃曰焉有仁義者而天斬其祀乎聞大原妾有娠必産子遂召啓明還無何大原殁而遺腹果舉子視所料不毫髮爽非所謂天可理度者耶公訓誨諸子動云心不可欺夫心烏乎可欺哉不欺心者不欺天也不欺天乃通於天而何不可度之不欺心則萬事有本亦烏乎不善公固孝于親對賓客侍立終日無倦色每旦問寢問畢方赴館治業父病禱天祈代因攻醫術而精之居喪哀毁骨立竟以悲鬱甫釋服而卒友于諸弟父語以析産輒潸然垂泣不獲已則寡取焉睦于族于戚于鄉叔珩産蕩盡乃謀諸父父曰與之粟對曰男有負郭田三百畞可使霑足且以贍其子孫出劵與之父喜訓族之子賑族之飢姻媾之貧老者養之如吳如華若而人喪葬之窘乏者賻之如曹如白若而人婚娶之逾期者助之如西如秦若而人囊篋蕭索而有入隨以周人急誰謂貧窮濟人難不啻易易耳公偉貌美髯磊磊流輩中人有過每面折之而中實無他腸遊覽山川稱觴賦嘯寄興淵逺其視塵世榮華浮漚流影之無異鄉曲婦女亦知其人可不謂人傑也乎公諱易世為中都宿州人祖諱某治田泡澮間父諱某稍加開廣因籍永城公遂為永庠諸生母某氏以嘉靖辛亥六月生公距卒萬厯癸卯八月壽僅五十有三歲以河患故艱於得地越七年庚戌厥子成進士卜地某處以是年某月日移葬焉天所以報公固當在是曩者之圖一第也蚤矣配吳氏子男四長即進士翼明任湖廣麻城縣尹娶指揮閻純女次啓明蚤卒娶貢士成大器女次針明娶庠生高等女次際明亦蚤卒女二長適指揮吕某之子戴渭次適鄉進士郭某之子昌明孫男四京尹京麟翼明出京封啓明出京元針明出銘曰我通我塞天為政不醜不榮人為政人以符天心為政修士達此備媺行余銘厥幽為世鏡定陶縣尹大墅賈公墓志銘憶昔歲遇大墅賈公于都下其人惇慤而夷鬯邇有膾炙公之詩者為余誦之輒又想見其人不可得尋聞公遘病其長嗣方理真定棄官奔省僅一面遂成永訣悲哉無何長君以狀來俾余為志藏諸墓余弗忍讀其狀况忍為志邪然不可辭公諱贈字士言别號大墅世為陽城福民里人高大父諱旺曾大父諱璘大父諱志儒以行義載縣志中父諱緩亦節烈好義母潘孺人生五男子公其季幼頴慧讀書目過不忘十五為邑庠士慷慨負逺志益肆宏覽好古文詩歌嘗戲筆為淇山午夢諸小傳太宰王公閲而驚異俾其移精舉子藝則博大深奧竒氣溢出每試為諸生冠當路闢西席髦士藉講授者不遑也在古艷稱三鳯更艷白睂時則以當公伯仲且以當公云七舉不偶逮辛卯貢士之期首貢丁制公以次貢應貢然不能為懷欲以貢讓不獲則賻以貢金之半督學者修吾李先生不輕許可天下士顧抗手褒稱厚德卜其嗣之昌茂蓋時長君登鄉書矣後果成進士今進秩司空部人謂公之食報先生之言若左劵然公曩聞南宫之捷則盈滿自勑遇物益遜及筮仕司理手書政訓千餘言迪以平恕清勤之道或隔屏聽問斷刑勿得稍苛比聞擢部復移書戒勿過望第恐人負官則公固有佑啓後人袤其福者乎先是丙申謁選訓太原徵文之檄踵至一夕草十三啓寅僚推其精敏夫士操觚能為麗語鮮不沾沾氣得瑣飾聲容而公以真素洽士士親之如父兄先後邑令無不飲醇欽義時就談詠兩臺交薦於朝遷郿縣宰歸里為太翁壽窺其稍衰乃戀戀躊蹰不忍行居三月太翁果長逝假令聽從勸駕者違親而往此恨曷其有極哉然猶三年悲慟遇高年輒動于中悽其推食若弗獲復食其父然吁孝矣癸卯服闋補定陶單車之任陶故瘠邑更水災為沴衆方艱食防亂莫如弭盜則重緝捕止盜莫如緩征則停催科贖鍰關何急事矧斯際耶則令息訟畚鍤繁興勞費焉支則議蠲河夫至二千然匪賑而餒者終弗可蘇則亟請之上得請則置里老諸人於異處命各報貧而覆核無漏仍匹馬躬飯之全活萬有餘人若是可以興教矣則鄉有約孝弟力田有諭摛辭諄布俗用丕變任甫浹季而厝施乃至此竟以督賑時勞瘁衝寒荏苒不起等死耳死于民事不愈于死婦子之側者哉公淡約自奉長君于治所為製一羊裘而紬其緣則怒大寒在途終不加諸體顧才有贏羡即以助戚友婚喪不給者弗靳也與人交藹藹披肺腑或有邪動復面嫉無隱鄉閭有競咸就質輒據直為之平解長幼僉服而愛焉堂室之壁揭所得格語嘉事固以示諸子而寓其嚴訓抑可覘其崇尚匪徒頡華掇腴藻其筆者也著子史摘抄舜澤叢談等書及文稿百餘首生嘉靖二十有一年十有一月二十有九日卒萬厯三十有二年五月七日年僅六十有三初配樂氏生女一適楊元繼張氏以長嗣貴封孺人生男三之鳯即長嗣工部主事娶張氏儀賓鵠女之龍生員娶徐氏省祭官朝寵女之鵬儒士聘張贇女女一適生員陳炣孫男二益默益亷俱龍出墓在祖塋北陽高泉之原葬之期為卒之年十有一月八日聞公赴定陶時長君謂公坦懷不逆而難末俗之多欺跽而陳世態反覆狀公曰逆詐是先自詐也吾惟率吾素以誠結之而已究且士氓吏𨽻靡不信其衷者夫世之簪紳或稱明智大都以能逆為覺耳人之徑寸如人之眸毫芒入焉則暗安所容逆機乎機心一萌色澤已異彼且從而﨑嶇我我何説之辭又安所平其情哉公平生士行五載人師三月良尹固本于此非偶而已也銘曰洞厥中直厥躬言何蔚德何豐奄以去峩以封百千䙫仰高風王龍田先生墓志銘先生頴異磊落不可羈束事有不當意輒侃侃以大義裁之或遇一可矜又眷眷不勝情殊不類其激昻善詩辭第要于泄其胸臆不規規格律雖事舉子業顧亦未之求工蓋寧瑟母竽也性不能較贏縮而喜施好賓用是家計日蕭索至饘粥弗繼然倜儻不減于初猶時時延知友傾罌相款蘄一日之噱笑也或者曰負其俊才而不以博青紫耗其積而貧是甘抑何謀之拙也余竊謂人生榮悴造物者潛握其機縱先生回其真性而齷齪淟涊以逐時尚亦未必遽享豐美且方其負朝暄飽藜藿景物佳天地濶獲句而自賞大叫而狂歌即處甚豐美亦烏能加此樂哉今已矣將與膏粱紈繒含珠玉而殂者同化為飄風而朽為土壤乃其旅寄之日能翩翩自適而不令此形骸心志縛縶蕩漾于名利之場中夜而倣徨晨興而四顧也獨為得勝算矣噫嘻此先生之高世而余所以深痛其亡也銘曰有行有歸四野纍纍兮月咏風哦所獲既多兮華表崇崇作我羣蒙兮孝義張仲子北溪暨配李氏合葬墓志銘仲子者余之內弟張光射也惟思其字别號北溪孝義若斯人乃無忝于男子之稱故諡以孝義而子之張氏為安邑望族國初諱仲榮者自猗氏移籍于此再傳諱從三傳諱斌錦衣衛千户四傳諱佑贈南京太常寺卿五傳諱璡進士御史六傳諱􅉅解元二府七傳諱健甫是為余外祖初配王孺人生子二次子壽官諱極是為余舅繼配萬孺人生子一女五先封母為次女舅配傅孺人生子三女一次子為光射蓋余不惟戚之而實賢之時時與之遊其殁也殊傷慟不啻連城璧碎不可再得云仲子孝于二親余舅遊歷之處預授金于主人曰吾父到則具食飲舅挈友以至如家焉稍稍逺行必具膳以從慮所市弗潔愛敬于昆弟歡洽顧瞻不私其有值二親之喪獨力董葬事余外祖母之喪亦然其伯母與其嫂之喪代其兄及從兄棺殮禮窆尤人所難也鄉族戚友有所需輒給之亦或相負終不校偷兒攫其金所司將窮治恐波及無辜止勿究未嘗研博士家業而挾䇿稽古涣然有解其謹飭恬雅無競無忤之度儒生且遜家之人曰吾族一北溪邦之人曰吾鄉一北溪邑侯吳公旌其門曰孝友可風督學周公旌以敦倫尚義直指劉公旌以孝友端良或欲請給冠帶則力謝辭仲子良貴乃爾奚賴峩冠為余方為圖表揚將覬自輦轂下檄以風世而仲子已矣悲哉生無間言殁有同悼此亦傑然殊絶之人矣初配李氏䎛士璡女先仲子卒余曾述仲子之行有曰其內子化之每食與妯娌共蓋實録焉李氏得翁姑之悅而雍和于壼內仲子之成厥德亦其克相之力也繼配王氏庠生廷寵女仲子生嘉靖戊午九月五日酉時卒萬厯壬子十有一月二十有九日亥時年五十有五李氏生嘉靖辛酉三月二十有四日未時卒萬厯己酉六月六日亥時年五十子三長君聘蚤卒次君選娶郭氏次君愛娶馬氏女二長聘于馬爾從次聘于王嗣真俱李出以乙卯十有一月十有八日合葬于北郊之祖塋余方襄先封母大事草土憒憒非搦筆時而誼不能自己輒為敘其梗槩昔人謂志銘為諛墓中人若仲子者乃字字無愧而余亦竊比于撰郭有道之碑之不愧矣銘曰吁嗟仲子洵孝洵義聽輿人言稱情而諡比屋如鱗鮮窺其二泣勒兹銘以告萬世劉孺人曹氏墓志銘孺人曹氏者河南僉憲劉公諱得寬子孝亷諱定民之配余之三妹也孝亷先卒既葬壙有志矣今歲天啓壬戌正月二十一日子時孺人亦卒孤子際皥將以是冬缺月缺日奉孺人柩併孝亷之初配李氏繼配馬氏合袝于壙而余為之志先贈君諱希舜配先封母張生男三女四二弟俱亡妹之亡者二余以長兄灑泣揮毫志弟志妹斯不亦乾坤慘怛事哉憶贈君見背余與諸弟妹煢煢孤苦三妹方在稚弱比余交于劉共筆研之席時劉猶為茂才來委禽焉余遂主令歸之劉君治家嚴明妹年甫十四蓋初猶易之繼乃稱終乃極隆重妹于壼政有調度扃鑰毖飭罔所滲漏絲頭韋屑必儲校劉前時歲費減三之二然饌飲精絶饋遺豐腆劉君好嘉客坐上時時談咏猝有賔至未嘗無珍具亦不知其如何撙節所用器具恆若新視之則數十年前物也劉君諸弟之母之子孝愛無斁罔不欣洽以為賢既而劉君感恙痀瘻不能屈伸承事搊扶漏初下抵二鼓方得一轉身如是者頻歲未嘗有倦色劉君閨闥間無不慊其意藉之以頥養更不關心家務得不廢其學逮稍稍能下榻移步遂登庚子鄉書計偕入都門泣謂余曰君妹于我有再造之恩纍科不第黯然長往往時遺句云相報再生圖重可知也惜其未通仕籍徼一尺之綸以報孺人耳此後孺人居孀寡課子撫孫不墜其門閥其體健厚無恙忽報病腹滿竟至不起悲哉孺人聰慧識大體孝于封母左右維護一果必供推及六親無不周至可謂女中丈夫矣余因是知婦德之關于家者大也無制之家一日之費有制之家足供纍日有制之家一日之腆無制之家纍日未睹費約而常若有餘費奢而常若不足則主內政者不同耳若孺人者可以式矣世衰俗漓女子不聞訓語比為人婦驕侈惰敖烏識理家僅能安靜無華膏沐整潔輒嘖嘖稱良矣敢望其他乎吁嗟此非細事也距生隆慶己巳十一月二日亥時年僅五十有四子男一即際皥運庠生娶路氏二尹君常女女一適郡幕郭君民衛子庠生世墉先卒孫男一重光聘孝亷路君行義女孫女四一適司訓路君康孫庠生應元子庠生連步一聘于庠生喬國標子某二尚幼婚嫁俱名門云銘曰欷歔妹氏從爾夫子安女止令聞不已百千億􅑤其永寧只茂才張子叔艮墓志銘嗚呼此叔艮張子之墓余年友郡丞輝世稱淥汀先生者之子從學于余而夭且夭于竒禍余安忍把筆為之志也乎余竊嗜學道有年每慨士人沾沾于帖括藻繢以徼名利世風之滔滔也思得志道之士相與闡述先聖之統苦難獲其人幸而有叔艮及稷山陳子國賢皆可維正學而皆死張子之年尤少而死最慘安能已於慟憶昔歲遊蒲訪余年友則以叔艮見時甫四歲耳舉止若老成應對如流聞其告人曰聖人不難學余心竒之年十二充博士弟子有聲庠序中嫺文辭工書翰孝二尊人值嫂誕辰衣冠趨拜有命免入猶拱肅門外他可推也隨郡丞抵都下乃師事余比余還里則時侍余于别墅嘗問為學之要余語以四字一曰任二曰奮三曰恆四曰成若有當于其心也者而甚喜余曾因事斥呵之次日拜謝曰感吾師之斥呵我也既别去以書來曰無以報師惟從事任字余深慰自忖曰吾今可以死嗚呼豈期叔艮先死且死于盜乎距其舍數里許偕同儕會文暮歸遇盜叔艮死于刃郡丞驚怛成病雖罪人有獲然至今不知的因不得大舒其憤奚望病之蚤瘳嗚呼可恨哉不但為其死恨為學恨也然亦無如之何也已叔艮諱旭初生某年某月某日卒之日為某年某月某日年僅若干初聘楊氏未婚而卒今從葬繼娶郭氏以兄子某為子郭之節可終叔艮亦可目瞑矣葬之期某年某月某日銘曰亘古才難千里一士士不長年道將誰恃昔在聖門且慟未止今日何日晨星爾爾吁嗟生乎何遽罹此漠漠荒丘寒流泚泚吁嗟生乎何遽瘞此李母贈孺人羅氏纍贈孺人曹氏合葬墓志銘蓋曠戎部聲和氏為李侍御羅曹二母狀自述執筆時淚潸心裂作而復輟比侍御屬余以志而畀是狀余一讀亦輒隕泣不可為懷置狀於案越日取閲復隕泣不能已仍置狀狀中載慈孝綣懇態自足動盡人之子而最愴人者則舍女存前孤之事也羅孺人遺二孤次曰日新曹母初舉一女女與新同患疹俱厲醫者謂是不能兩全僅可存一問所欲孺人云烏能為已出捐前人之孤乃移女别簀手抱新不置盡解簪珥救免得不死而女競殤中夜相顧懸淚在睫不敢失聲恐驚抱中兒噫嘻遐想此時何啻萬刃攢心而為前孤割所痛此古人所鮮何論今人丈夫所難何論婦人余所以悲之深也按唐西平忠武王之裔為江右吉水李氏世有顯人逮博士贈君祀四學敬吾先生諱缺初配羅孺人諱缺里之泉溪人文恭公族女父諱溢娶母劉氏而生貞靜寡言笑習姆訓父鍾愛甚聞敬吾先生秀頴嫺文事乃許字及笄歸焉翁東臯公持家嚴重然以得孺人喜其子之得內助病且革以善事其子囑孺人賞鑒乃爾而孺人果於壼政靡不飭居恆無疾言遽色既慈且介宜於長少賢之者交口佐先生事其尊人養生喪死無憾當罹喪初或揶揄先生之牖若謂將不振先生與孺人對泣而矢期於勵學孺人操作隨之屆督學試遂首諸生有有道之品題逺近師迎自此始羅翁客楚劉媪遘篤疾屬纊時以槖中金付孺人乃偕先生曰外族封貯俟翁翁歸還之女不染母之有宇內豈有兩也顧不永於年曹孺人繼之為政諱缺出廬陵唐東望族武惠王五十二世孫父東湖公諱本母郭氏亦汾陽王裔也孺人蚤慧莊毅不埒常女稍長勤女紅東湖公每惜其不為男男則亢宗矣期遇快壻甫許配會先生失羅孺人有富室婺以厚資相啖兾得侍巾櫛先生據義不可東湖公聞之曰是真吾女匹也遂允伉儷驟自溫膴為貧儒婦不懟也躬操饋紡有提甕出汲風先生得不輟其學逺遊設絳帳而孺人肩數口之家撙什伍之入弗致乏絶不牽先生內盼難矣即異時先生屢厄於棘院謝館穀閴處岑寂有加其子且束贄從師結社締友皆孺人拮據支撑以機杼對吾伊又難矣堂有繼姑有病叔事養無間逮繼姑捐世值先生旅寓都門而典衣襄大事更難矣死事羅孺人每飯必炷香供之曰我為其後何敢忘亦難矣遺孤有室遺女有家內之食指衆外之應用繁曾遇歉歲糧粃粟野芝婉飼諸孤艱辛備嘗然雖甚窘不言貸而人有急則忘其口而周之尤難矣其嫁遺女之日乃生侍御之三日從草坐起治奩不就枕先生相勞苦不斁也曰慮人以無母女易吾女也竟以頭岑嗽喀終其齒憊焉不愈難哉先生以明經謁選訓臨汝繼諭上高蕭然蓿盤孺人督僮僕藝蔬茹淡如常時先生故亷稱之為德友士或具瓜果輒云我為秀才婦未嘗杯水薦官師今得無愧蓋猶若泰焉者世之食厚祿忘其初較是何如侍御舉於鄉則勸先生致政偕歸焉歸而子婦森立能於其家蓋至此似甫肩息顔解云素不喜榜笞人亦不忍聞其聲壼以內和藹可知也既而強侍御再赴南宫及歸舟阻小孤怔怔心動倣徨望禱有乞一帆風願捐數歲語薄暮風果作二日抵章門則有病報踉蹡奔險又三日抵舍猶得母子抱首強起啜粥曰兒積念所致越一日而瞑悲哉蓋嘗反覆考論二母懿行後先劵合雖以閲世久近不無詳簡而足耀千秋無二其曹母之與先生則又多同符者先生深於道訓子以忠孝寡欲以畏天認已而母訓子六字曰正直忠厚勤儉初之臨汝手紡軸授諸婦戒以勿忘侍御登第先生聞捷高臥曰莫卜所成而先是母聞鄉書之報亦不色喜先生之庭偶有踞虎先生行吟而入虎突逸而出不為害土屋雨圮傅於枕不傷而孺人中夜隨月獨紡人謂其地多祟而無怖室一梁蠧似有呼而起者而梁折適當坐處其為鬼神呵護亦同斯亦竒矣侍御滿中舍考貤恩考妣後遇覃恩兩母俱贈食報於天又同也日者謂曹母不宜子而先生於其舍女存前孤之日決其有子果不爽則天固有可必耳羅孺人生嘉靖某年月日卒隆慶某年月日年僅若干曹孺人生嘉靖某年月日卒萬厯某年月日夀若干子三長日升娶周氏繼娶亦周次日新娶周氏俱冠帶儒士羅孺人出次日宣即侍御曹孺人出娶周氏封孺人副龔氏曹氏女一適郭生文華羅孺人出孫男五長垓次埏俱某出次坤某出次某次某日宣出孫女一日升出兩母合葬之吉為某年月日兆居某處某山某向銘曰浩浩長江淑氣龎厚賢哲如林纘前開後西平武惠文恭之家厥男厥女茂實芳華或乾之健或坤之貞宜爾閨闥肅肅雍雍或先篝燈志學成始或繼鳴雞克終登仕皭然義利豈睇囊金沾沾阿堵愧彼婪心慈愛所鍾何分人我屬毛可捐天應淚墮慶深且逖大澤龍生既承家學亦贊國成遡流知源敬銘母氏誰銘先生俟子鄒子我辭不斐好德則同億萬斯載仰止高風湖廣鄖陽府同知淥汀張公墓志銘淥汀張公為諸生時與余同硯席復同登辛卯鄉書曾同官於都下即有暌違亦互訪於廬互問以郵筒莫逆之交至于沒齒公以天啓三年十二月二十七日卒其壻楊生手為狀請志銘于余余豈忍搦筆耶蓋久而勉成之公之先世為蒲州潭郭里人國初諱敬者徙居大澗里遂為澗張氏曾祖諱某祖九十翁諱某父知一先生諱某配母某氏生子二公其長體貌偉厚而莊窺覽宏博嫺於文事甫入郡庠輒執牛耳著四書臆見讀書日記聞見隨録襟子從之如雲師道嚴重視世之向弟子稱名稱生及字號弟子所絶無者遐邇紳珮求詩文書翰者踵相接比登科令聞益懋然孳孳檢躬有改過彰善二語實允蹈之其教人以居敬窮理為要性至孝昕夕侍大父及父之室歡笑雍雍漏下二三鼓方就寢大父捐館舍號踊慟甚大母亟諭慰猶屏伏飲泣州人稱張氏有孫事大母如大父父過其牖拱立以俟度父就坐方就坐父病焚香籲天有增父夀十年願減一紀之禱丁父艱余赴弔時且小祥見其猶寢苫柩次蓋茹素不入內者終三年其事母承顔聚順不命之退不敢退冬寒立侍不移至於瘃愛弟如手足撫二姪如己子父存日曾以食指衆令析㸑垂涕不忍從弟被誣於長安星馳而往必出獄而始慰蒲俗侈則著四禮約約從儉躬自倡之有烈婦邵孝女熙亥力為揄揚建祠樹坊著烈孝集以風世而劉氏敦子道婦道亦為闡之或遊廟宇非其鬼不拜同行者拜之挺不為動或值當拜衆拜於上獨趨而拜於下家固無厚蓄遇貧人求濟者必曲周之不居間當路而里人薛罹大辟之枉竟為暴白鄰人尋隙詬譟不與較且加禮焉其人化而易行六上春官不售念母年高乃謁選華隂諭板輿迎養子姪從行一時孝感致學使存問餽遺督通省士於正學書院仍議建太華書院著四知會約及士戒與馮司空少墟先生講明聖學著語録秦之士民尸祝頂禮晉擢成均升鄖陽二守尋署府篆署竹山縣篆蘇憊剔宄興學明約而行户官價等項俱革有欵十二有辨十如招撫流移修舉廢墜釐正風俗緝獲叛亡驅逐衙姦革除常例奉行保甲辨理寃枉及貪肆之辨酷暴之辨狡偽之辨惰慢之辨耗蠧之辨昏庸之辨木痺之辨要皆鑿鑿經世訏謨也以故還竹山日軍民攀號之聲徹滿山谷獨署府則有異焉王百户以軍餉百金寄府庫當事者以為未寄百户惶迫無之將自裁公代之補完然竟不悅於當事坐以老疾致政歸蕭然懸罄不能具饘粥三院延主河中書院教事而公亦病矣貧與病合其病且苦不無揶揄者而肖子茂才死於盜愈病愈貧諸艱備經荏苒數載終不起竊嘗謂人情多岐天道有定公之在官在田不諧於世固宜其爾顧福善如天何為畀以苦病復畀以竒禍考其生平無一足以致此胡為乎來哉天之有定安在抑天本不可測亦付之不可測而已矣悲夫距生嘉靖三十六年十一月三日夀六十有七娶史氏某女繼韓氏某女子三昶初史出娶孟氏繼楊氏旭初州庠生聘楊氏黽初未聘俱韓出女五一適儒士王濬元一適儒士馬騰驤一適州庠生楊升俱史出一適儒士賈允醇一未字俱韓出孫男二魯幟鄒幟俱某出而某繼某嗣葬之期天啓五年某月某日其窀穸居大澗祖塋之次銘曰銘公之學既博且藻初工文蓻繼研聖道銘公之行洵厚且醇厥履無咎厥衷綦真銘公之政所至成烈造士士興牧民民悅嗚呼素襟千古黃壤一封滔滔斯世賴有流風明高密侯明軒寧公配孺人王氏合葬墓志銘明軒寧公卒於萬厯三十有五年閏六月二十有三日葬矣逮四十有一年七月二十有三日而配王孺人亦卒厥嗣獻可輩以次年三月十有八日啓公之壙而奉孺人合窆焉先是公之葬也直指史公為之志二府張公表其墓業纚纚詳之顧孺人之淑行何可不聞於後厥嗣手狀觀余幾於一字一淚余至不忍讀何得辭以不文蓋昔宋莊敏公直指吾晉時竒公之才為之選婚邑士大夫以王應遂得孺人為配至今閭里艷稱之公下帷治舉子藝家徒四壁立孺人匪第無怨言能節縮自將斡旋補綴諸可代其拮據佐其勤苦靡不竭殫不煩公內顧且當公指公得以肆力於學什九外遊聫朋講貫友至有緇衣剪髮風人人得歡而公亦業日精聲日茂家計藉之漸饒創起屋宇而又能周人之急不以無為解報人之施不以久而遺忘公領鄉書之秋孺人先嘗出粟如干石助耕捷音至而鄉人喜可知也公筮仕宰百里風以子民言每問所平反公殁而右目以泣喪明其敦婦誼乃爾孺人慧頴而方嚴言色無疾遽蚤有女德於嬰童時比為新婦壼內政立辦事太夫人孝雞鳴起盥沐治具以養病則不離於側不假手左右其養祖夫人亦然無不能之賢之以女若孫女歡視之其母遘恙晨興步候忘其女之痘也處妯娌獨肩其勞無齟齬語能以遜忍待誶言者得其和割所有以周王氏之兄弟生養死葬且恤其子遇婢僕以恩戒家人勿得虐無不感而力於役亦無敢欺者其自奉則縞衣蔬食為常敦朴而服勤不置私槖即公間有所授仍儲而還之不則以給甥壻輩遇子女綦慈而教則嚴口授以詩書居恆曰天理曰隂隲曰平等曰忠厚誠實不絶於口噫嘻兹孺人禔躬之本也亦所以佐夫子及訓子有成之本也世無論男女第於數言中得一二誦而維之足以無忝於生而孺人通達若此顧不可風哉寧之家世詳於公志孺人之父諱孟達鄉人推為長者母高氏以嘉靖三十年九月十有八日生孺人夀僅六十有二卒之日族黨戚識無不揮泣也子二俱庠士獻可娶杜獻誠娶薛女四適高寯張之翰薛士最聶蘭馨孫男綿祚維祚紹祚諸亦詳於公志惟是綋祚誠出者二孫女可誠各出者前志未及兹當併載云銘曰有刑於家有相於室維德之儷兮宜於而鄉顯於而國昌而之裔兮生也齊芬殁也聨玉敬銘以鍥兮明義官小川吕公墓志銘吕氏世居安邑運城里仁坊國初因亂有徙蒲坂者有徙臨晉者萬厯間臨晉族來認宗以家乘未詳尋寢蒲竟未相聞城之南郊有二大塋一為孝子塋即邑志所載孝子諱完者迤西一塋最上為公曾祖諱失傳次右為公祖諱德配許氏生子四長即公父諱萬里配張氏生子二長諱國禎次公諱國祚字云永號小川以捐助邊餉兩臺給以義官生而質直無飾言貌如其心九歲被孰師醉夏楚傷股遂廢讀既壯勤力南畝厚糞其田不以旱潦有間商遊唐鄧羣商多以資託曰某善守而有信居家每有所寄曾有人寄金聞其人病持金至則不能言但目座旁一親公度其意在此親隨以金豫每有舉動輒證以大明律念母蚤亡年七旬言及猶流涕痛兄之卒幾於自隕訓兒讀書夜闌及晨起必坐以督之尤諄諄告以立身揚名為孝遣兒師事余每歸必令述所聞改容靜聽謬謙以私淑徵志向矣因長女守節常誡以古道躬劬勞以適其意生平苦胥吏追呼示兒曰儻獲半職其愼念此晚年絶迹商賈甘意清儉日遊娛田園人羡其高致其天真自得處人猶罕能窺之屬纊時令婦女逺執兒手言訣蓋嘗迹公之素履其足述者有二其一脫去闤闠怡志園林其一遣子學道期之繼往夫世人役役騖於名利即號為冠紳之士未嘗不薄其見處之位望望前途有如不及揚歷所至每云苦海致位公卿猶謂茶苦曾有身居揆府自謂窮民無歸他可知也嗜進貪榮至於老死雖有臺池僅窺圖畫不辱不殆一丘一壑脫然無纍亦良鮮焉而况經商之侣晝夜執牙籌矻矻不足安有捐去刀錐徜徉泉石豈非豪傑之見歟俗之教子取科第而已博得華膴厚其囊槖大我門庭侈我車馬雄於里閈詎不大快其有從事道學不以為冷寂則以為忤時訕詈且加誰肯從臾然浮榮有盡轉盼成虛慷慨繫之腐草埒之此何異以掌上之珠置諸塗炭孰與教以好修之流光逺哉昔余為淮吏春秋仲月循其舊典致祭于孝子徐仲車先生其父之墓相距數十武相禮者𨗳余至其前致恭而後去兹亦教子之報已而况不但為仲車者乎吕子勉旃公生於嘉靖三十八年七月二十日酉時卒於崇禎三年六月十九日午時夀七十二歲以五年十一月初二日葬於祖塋之右元配郭氏從禮配節婦周氏女子男一即崇烈恩選天啓元年貢士娶馬氏運庠生之傑女女三長適朱廷試即守節者直指有旌次適廣文李英才先卒三係側室賀氏出適李中明賀後公一年卒葬於祖塋之西孫女六長字湖廣嶽州府同知南公拱極之孫邑學生之彥子大亨次字陜西鞏昌府同知李公圭之孫舉人貞倓子􅀈三未字四蚤逝五字巡撫延綏都察院右僉都御史胡公志夔之孫舉人承裕子遂封六字兩浙運使蘇公養蒙之孫廣西慶逺府推官希轍子九埏銘曰公之存翩翩然適也公之去當亦翩翩然適也而子學道余度其有成九原可慰是以知其適也仰節堂集卷五
