body:
  text: 仰節堂集十四巻别集類五明提要臣等謹案仰節堂集十四巻明曹于汴撰凡文十一巻詩三巻前有髙攀龍馮從吾序于汴嘗從二人講學故也攀龍序謂其文足以定羣囂明學術詩足以暢天機流性藴從吾序謂其非沾沾以文章名家而撡觚自豪之士無不退避三舍于汴亦嘗為從吾作理學文鵠序曰闗中少墟馮先生輯諸大家舉子藝百數十首以式多士命曰理學文鵠不命以舉業而命曰理學何也見理學舉業之非二也云云故于汴之詩文亦在理學舉業之間或似語録或似八比盖平生制行髙潔立朝風節凜然震耀一世逺者大者志固有在原不以筆札見長從吾序所謂非沾沾以文章名家者為得其實觀是集者謂之文以人重可矣集初刻于首善書院甲申板燬于兵康熙癸卯其外孫景望蘧購得殘本其門人吕崇烈鳩鄉人醵金重刋即此本也乾隆四十六年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀仰節堂集原序夫學性而已矣夫性善而已矣何以證性善也今人欽欽焉目明耳聰手恭足重心空空而無適於斯時也徹内外非天乎天非性乎性非善乎以其為人之本色無纎毫欠缺無纎毫汙染而謂之善也循是而動不違其則之謂道故學莫難於見其本色見本色斯見性矣程子以學者須先識仁而謂不須防檢不須窮索夫學豈可廢防檢窮索欲人識防檢窮索之非本色辨其非本色者則知其本色知其本色則防檢窮索皆本色也吾見曹真予先生於長安中終日欽欽目明耳聰手恭足重叩其中空空而無適也可以證性矣夫性空言之則無朕也實證則有象也先生非其象乎故先生居鄉孚鄉立朝孚朝告君者足以定羣囂明國是告友者足以明學術闡道奥見於咏歌者足以暢天機流性藴所謂循是而動不違其則之道也此之謂性此之謂善知先生者知斯集知斯集者知先生根本枝葉無二物也時天啓四年六月二十六日錫山友弟髙攀龍頓首拜撰昔明道先生作字甚敬曰非是要字好即此是學余以為作文亦然非是要文好即此是學若作文甚敬行必顧言吾得之真予曹先生云先生全集梓成余讀之喜甚鄒魯嫡傳濂洛正脈其在斯乎言言有理言言不苟而又言言有作意它不具論即如題南臯先生教言數語雜之秦漢古文辭中亦不多得寸山起霧勺水興波賞心哉觀止矣蔑以加矣先生以千古絶學自任固非沾沾以文章家名者而作文又甚敬乃爾即世所稱操觚自豪之士寧不避三舍退哉先生雖諄諄講學而非其人不輕發一語即得其人亦不輕發一語易云擬之而後言議之而後動擬議以成其變化先生以之故其著作雖間有應酬而譽必有試獨為余文似又輕譽余竊愧之而或謂善信如樂正子孟子進之以美大聖神夫美大聖神而可易言乎哉其期望不得不如此子惟勉之可耳焉用愧猶記前嵗少宰缺廟堂誤起余而借重先生陪先生特膺簡在余方為銓衡得人喜而先生再三力辭竟不税冕行夫銓衡重任也少宰美秩也他人争之若騖而先生棄之若凂此其髙風峻節即古之人寧數數見哉先生之學以躬行二字為宗而辭少宰一節尤為躬行之大者讀先生集當因言而求於言之外不然而徒豔羨其文辭浮慕其理致出口入耳忘厥躬行即先生所謂没齒務學終屬半塗終日亹亹猶漫道者也豈惟負先生亦且自負或曰薛文清公與先生皆晉産也文清終身學問只是一敬字先生學問淵源葢有所自余曰然青出於藍而青於藍氷出於水而寒於水自古記之矣天啓乙丑七月既望關中馮從吾撰重刻仰節堂文集序余師真予曹先生仰節堂文集行世已久余曽得一部朝夕諷誦不能釋手且當時家藏户珍者不鮮甲申之後十失八九己丑兵燹運城極厄無論片墨不存並其原板不可問矣奈何一日先生之外孫景君字望蘧者忽遇此集於安邑市上蓋幾與敗絮殘楮相為没滅耳景君急購之若驚若喜見余而道其繇來余乃仰天謝曰先生之靈不泯天地鬼神為之呵䕶也歟於是聚而謀諸𢎞運書院之友諸友曰碩果之存危哉相與鳩金而為重刻以圖不朽刻成諸友屬余序余曰比鄰夏有司馬温公集河津有薛文清公集合仰節堂集可謂三大文章矣自此汾洓重清條霍更翠其關風化人心詎淺微哉然而重刻之友亦與咸休太史公謂蒼蠅附驥而行千里余於斯亦云門人呂崇烈頓首題於𢎞運書院中時康熈二年歲在癸卯六月吉
