body:
  text: 仰節堂集巻十二明曹于汴撰五言古詩題徐翼所年伯素履圖說十二首人以官拓産伊産以官落何能卑小官而不清獻若世情難與偕所貴在空橐貽謀亦有良一經不為薄右庭闈受業曩未採芹日芸窓現鬼魑移居免覆壓人謀詎及斯毋乃人四旁有鬼相依隨愼旃滌厥衷誰云可射思右泮宫發軔昔人羡一鶚况乃雙桂芳賀者交於閭若為共榮光或亦怙其貴鄰里轉彷徨徐翁仍往役吾以酬吾鄉右兄弟聯登天逺不咫尺宫闕髙嶙峋徘徊聳瞻視茲地致吾身致身未為報丁寜啟後人而勿忘此日應更念吾君右率子瞻天曾聞南方强情與北方異吾不虐其人渠亦不為祟貪將故生釁馘殺自網利一札平畨書千里免兵燹右持節平番千章出萬壑躬先不畏苦神為畫良籌夢裏頻開剖人恐遺之累輸金不啻土神人不可格何不於斯睹右奉詔掄材從昔論事主以人為上臣一人曾無幾安得百千人若得人千百便是百千身守蜀蜀人化茲意良獨眞右持衡校士余聞古聖人出入劒為珮奈何懸蓬矢慴志黄雲塞揮毫睨武夫武夫殱巨憝揚戈滄海中不比齪齪態右靖海揚戈從昔有事使從昔有君臣不聞君負臣惟聞臣負君試覩龍章錫皇恩被兩親負曝還自暄何以報王春右奕世承恩余誦聞臚說林泉見一人有子朝通籍若翁暮乞身不縁寄寸赤豈釋負千鈞侃侃囑報國吾亦怵吾神右待漏聞臚昆弟俱白首蘭桂何翩翩讀罷七訓語霞觴欣流傳親親共長長風世以家先莫道賦歸去經綸更燦然右歸田課孫輿人皆曰賢躋諸鹿鳴席先生曰予眊檢身轉惕惕惟其檢厥身茲筵得上客知非不為非伯玉映今昔右賓筵介夀和馮慕岡年兄五詩臣工壅主澤萬姓苦如焚怨氣干天怒重罰奪良臣譬如家有譴賢子應邅迍有士頸如雪一朝繫黒組一組活萬人巨璫亦去楚木械更不惡木械眞有靈能令三湘衆滂沱涕泗横能令夏畦子忸怩顔可憎能令忠烈士芳名齊岱恒亦或唁其忠亦或賀其禍烈士意如何脉脉不可揣引袂時揜飾吾君那械我右械繫吟昔聞頭象天無乃非骨肉我生髪未燥鄭重忻修沐鄭重固鄭重小帽如冠玉烏紗貴且榮乃至忘初服我首生於天可黝亦可華我冠制於君可帽可烏紗皇恩自浩濶髠鉗不漢家易冠以小帽不殊純易麻帽下頭顱直一舉戴旻蒼上士薄斯語不冠憂惶惶中士契斯語不冠樂洋洋下士嗤斯語不冠胡涼涼相契不相薄毋寜幸相嗤賢人解其冠天下無寜時右易帽吟縲絏南來若有得語音充朗貌顔和蕭寺候逮四十日御製披觀三兩過方窺大道萃皇祖果覺殷憂増慧多百歩衡門亦可入為彰法紀荅恩波右龍興寺候逮十椽草屋破生塵户外時聞索債人有妾抱子俱稚齒阿兄賴嫂絶㣲顰千里緘衣不墮淚九秋披葛已忘身珍重鍼縷莫輕視病妻憑我且懸鶉右寄衣昔聞堯堦指佞草想是今時珥筆人慢道草多佞全歇當應佞夥草不神果如讞獄繫臯士何獨悲囚痛夏君安得無佞亦無草堯皇臯佐樂長春右祭臯陶題首善書院維皇建有極日月麗霄漢借問極云何至善誰容畔此善來自天大寳逾瓊瓘主之為師模闡之為性案為之聖者徒積之慶可斷帝京天下首千方支體貫坦坦王路遵蒸蒸登于岸明善善以明洵其樂且衎先覺覺斯民構館斆學半將期實行修寜啻縟文烜登其門崔嵬升其堂輪奐入其室深幽敬止何敢玩不學善乃湮不善世乃亂誰兮匪天民勿作如是觀感懐喜夷怒則蹠人蹠我則夷肉糜吾胡飽羮藜爾豈飢甘可使為苦妍可使為媸味不主於口色非目所司有物盤其間強横踰窮竒變化若牛鬼播弄如兒嬉突起千尋障何論目如離能幻舌如馬食蜜胡甘之吾生患此物敬奏主君知明燈照奥窔峭壁捍邊陲剛刃晃似雪誅翦靡孑遺口目賀且泣從前何太癡夷蹠自有真飢飽莫相岐雜詩二十二首周道榛莽交憑誰詢濟渡勞勞古人心蔬水澹啜餔赤日掲中霄六宇撤其錮我行不可求殷勤悲日暮二豎勿相凌㑹當振其歩其二昊天制厥命萬類共相竢命之貴綰組命之賤秉耜命之厭膏粱命之乏糠粃命之健超乘命之憊牀笫命之為彭叟命之為殤子命之彛鼎垂命之秋草萎智人達其竅素位坦如砥愚䝉罔有窺營營良苦耳其三栢幹何挺挺藤枝一何柔傲霜秋賞菊傾陽夏譽榴有賞應有咎毁譽總堪休誰能代之喜誰能代之愁曠懐觀物理觸景聊優游其四桃花殊綽約舉俗艶其芳彌空連錦幄落地紛紅糚譽口若市沸戀賞奔如狂孤竹生澗畔掉臂一何涼為語澗畔竹韶麗堪相將飛霜千仞壁聊此共嵐光其五好鳥鳴高枝聲如管絃流池水尺有咫魚躍何悠悠人生欲無涯忽忽起蜃樓不見青春子兩鬢倐成秋呼酒酬今日勿為明朝憂其六少年種多疚中嵗相侵尋病久更惜日觀時感慨深感慨千里外杳杳懐同心奮袂欲䇿蹇乘風凌高岑望望不可即潸然涕霑襟其七草根共木皮藉以延嵗年疢疾應由我修短固在天便欲御風去其如至情牽留往總不易寒風凄枕邊韋編苦難讀平生愧衆愆且乘尚健日問膳高堂前其八缾罌罕儲粟謬懐揮千金蓬門有貧客原田乏㴻霖帯鈎固無幾解以酬知音秋氣正蕭瑟勿厭桮中斟其九秋日猶溽暑秋風亦已涼披襟南軒下無語嘆流光暑餘豈遽謝涼至時則當時乎天弗違人生胡徬徨螗蟬當此日深樹噪夕陽其十中宵忘在病披衣睇月輝錚錚匣中銕寒光交青幃鯨鯢百丈強盍往奮一揮否否且寜卧意廣百年㣲其十一昨晨一齒落今晨目茫茫兩體似共期衰嵗行相將胡不當壯盛勉學如不遑此君否大嚼落齒應未妨目茫阻誦讀何以覩虞唐世態多變幻﨑嶇繁眦眶便可昬昬然且免窺雌黄其十二有斐誰氏子楚楚青春姿藐藐予云聖施施我旣知日入坐嘆息支言良自嗤世季匪旦暮皇皇乎何為三秋月中桂一芥塵上枝生民天未厭㑹當愜所思其十三追日斃於渇說難亦已淪事有不可為三閭悴江濵善哉陶靖節漉酒以葛巾茅簷坐捫􅀢澄懐賴昔人達士臨川上流坎良循循其十四黄金辭暮夜關西畏四知清節勵嚴霜芳名千古垂家人共氷蘗歡訶今莫知亦聞薛夫子出都杖其兒二家秉峻徳遐風念在茲其十五蘇卿處漠北突厥為比鄰氊雪為食飲不忘君親倫晨起整衣冠仁禮向具陳初陳嬉以訝再陳怒以嗔侏㒧生相習華言褎不聞吁爾焉用道物生固難均其十六骨骸植丘山對靣燕楚異赤心赤逾日誰剖誰以視縱令枯其舌如簧應不翅所以抱心人幽懐付掬淚吾師固有言當是誠未至其十七孔方何醜類昔人譽為兄或亦名之奴差似稱厥情仍為奴中賊殘狡恣縱横渠能離至戚因之失良朋渠去凋人顔渠來躁人膺内險藏巖谷外獰聳刀兵幻忽安可詰舉世墮其坑便移絶交檄勿致擾吾庭其十八平生不了事憑此數行書抱病逾一載方寸成荒墟短檠未能親藥餌時則茹解組歸田里所懐寜此知厥慮匪朝暮那不惜居諸其十九大事如小事有事如無事神閒氣自融華嶽土垤峙萬類穹窿間太空只如是因物付以物天下本無事其二十向若官為家生計了不植歸來無所棲南鄰聊以即半間晝延賔半間夜燕息祖先無祠宇言念傷胸臆置主室之隅一過一惻惻幾欲謀構樹踟蹰烏能亟謀身拙似鳩勿謂將謀國其二十一烏用嘆寂寂呼童訪所思跨蹇擬行邁河柳緑烟絲且盡此日歡勿問食無糜女嬰眞大癡奚事咄咄為宫袍况可典詎至餓爾肌其二十二浩歌復浩歌人世奈心何心心山海隔心心籌算多相隔生睊忿多算少安和我生靈萬類寸心更靡它胡為翻自苦憧憧起干戈吾將驅此心委諸東流波不分秦與楚不知唯與阿可使眉無促可使鬢無皤百年能幾日浩歌復浩歌有感二首有口翕如箕同室戈矛起痛哉髪星星失人亦失已日日顧金人吁嗟胡為矣刺舌聞古人刻骨戒相擬訟言伊何時除夕嵗庚子古人重知幾知乃微之謹或罹發諸聲胡不窺諸隱下石伊何尤落井良自隕世方崇背憎何為相沓噂來者如可追刻膚時自抆上李大蘭先生四首夫子起南國開䝉厪轍環翩翩西山陲鳴珮雙玉珊一為仁道言揷架徒矜繁攫靈自銀漢大河無飛瀾相看誰可擬朱鳯矯翾翾蝸蠻逐白日世味塵懐鎖世氛非故吾吾生自有我么䯢小厥躬吾道得無墮勛華躅匪遙嫓芳詎云叵問予何爾知摳衣趨臯坐疇昔珍燕石秋螢詡相映法堂啟秘藤靈珠驚照乘人道匪逺人千蹊總幻徑賢人人之賢聖人人之聖三嘆嘉斯言泠然破初瞢鬱鬱壇中杏依依河畔栁栁絲千萬條不綰杏壇綬悠悠感中懐心蓬將無茂何以冩我思訓言當共守吾道誠在邇象罔秪豐蔀感事一首萬厯辛丑四月八日外吏五十三内吏二十一一朝下徵書趨蹡依紅日朝紳為結綬朂哉勉為臣年餘綜核審試罷官僚分浹嵗忽喧動部曹奉俞綸皇恩自浩蕩忘久秪成忻余猶在寥廓應非終沉淪羈棲二三載胡不事明君胡不環膝下以奉暮年親親年日以邁臣力日以迍力為君王惜年為老親珍年力如可駐疾徐何足論春日春日上簾櫳芳樹禽聲暖南簷餘皓雪北戺露苔蘚晨興獨徘徊鄉思愁繾綣離親動數年途路阻且逺振羽乘天風迴翔悲在羂控告聲為枯誰能開其鍵鄉語空谷音家書金璧羡夢魂何憒憒撫枕惟輾轉室人訝不吐將占舌復捲道旁車轔轔有來亦有遣睇瞻可若何吟罷淚欲泫得家音馬上逢來使急問庭幃事先聽報平安纔看平安字四體慊然舒歡極仍涕泗淮安送母迴經今嵗五易雖知豐碩顔其如年若駛思歸為阿母不然忍遺世不歸為阿母不然胡所嗜虚名誤徽纆浪跡成泥懘年年春明外距家千里二天門更萬里曉日光易被去留幾躊躇究將跨蹇逝買竹搜囊忽莞爾猶存買竹錢是日雪似掌交映疎窓前一睹嘆強項崛峭籠寒烟再睹殊瀟灑勁氣鬱軒軒戛擊流清響動中自静專冽泉度幽壑喬峯倚逺天坐對肩為聳晨夕相留連骨亦為之挺腸亦為之湔趙藺漢長孺前身何疑焉感此延新益漫賦高軒篇謝任竹東詩扇望望稷王山熠熠嵐光紫中有好修人九十武公似禔躬絶氛埃羅胸富經史世德紹先徽尚友薛夫子我欲從之遊室遐人則邇雙鯉愧木桃瑶篇突而眎下以軫時艱上而憂國是予為貧生干不以我為訾從茲懐袖間馥郁逾蘭芷清風時披拂泠然盪予滓髙誼啻云銘夀公式多士輓趙公子并何烈婦有引余同年趙乾所丈之子邑學生任賢蚤負美質學道於少墟馮先生其為制藝毎冠多士未第而天副室何氏自經以殉嗟乎烈婦乃得從夫去公子乃得烈婦同去復何憾顧余不能無悼爾皓雪曉山寒稜稜趙氏子抱琴入長安一鼔清塵耳馮門稱高足擬暢六經㫖剛腸有父風萎薾不啻耻以是範厥躬刑室亦以是忽忽去修文何媛繼而死覔死再且三竟死芳逾芷死此百年身不死者萬祀我讀烈婦傳涕淚不能止世態頺波流賴茲為柱砥挽董烈婦何烈婦三水人三水又有董氏適趙公之孫諸生一鳯一鳯卒董氏投千尺澗以死死在六月而何烈婦之死以七月一時雙烈竒哉併輓之世人畏世險談險而指咋死生貴得所豈在坦與阨烈婦覷深澗不異處華簀肌骸願如粉眞成屑瓊璧瓦全居繡幃何殊叢刃鏑想當飛身時天帝為之格天帝為之格人誰不痛衋贈别絳庠蘇小泉廣文還秦天下無眞儒因之無善治昔人軫此憂興學以為亟聖逺言旣㣲士風亦嵗異終身學校中不問學校字泰運轉河汾小泉振鐸至衛道如保躬造士如呼寐一朝西其轅皇皇起衆喟西方有美人法堂樹赤幟行矣共闡揚斯文應日熾遺訓芹泮間有士掲而示大道終在茲誰兮甘自棄遊祥宇李公園勝地堪遊覽素心况主人崇臺祛障礙清澗滌氛塵靣靣長林簇葉葉窺吾眞本為躭幽寂轉與人世親不知各意適但見飛觥頻歸徳沈孝女孝女堅孀節蓋棺骨似銀未聞再醮婦能為不死人淡濃盼轉合燕越趾移分或共嚴霜烈或隨腐草湮男兒負剛氣莫愧女郎身贈曠聲和悠悠嘆世路﨑嶇日侵尋官常有墜舉民情無古今不見循良尹雲陽愛戴深猶憶分符日漢吏蚤盟心三年報上最楓陛貤綸音誰云有盤錯良堪證士林都下見西山忽忽見西山千峯螺黛簇宛若對中條當年景可掬臨眺重徘徊屛營撼衷曲不見故山雲何况雲下屋寸腸折大刀擬上陳情牘贈别胡生敬明守戎世非道不世人非道不人武非道不武文非道不文斯道入無間斯道廣無垠誰能甘蝸縮但飽七尺身殷勤囑明眼認取此身眞到得眼明日萬彚備於君主人不自主大患在逡巡眞形誰信取磅礴貫乾坤送别戴肩吾七月涼風來雨罷蔬苖廣戴子訪吾廬隴畔談今曩不道生計微但詢學問長手持李翁言作聖示吾往珠玉揮四壁坐玩襟期爽送子遠行遊歸視吾禾穰子行懐自佳天宇秋正敞癸丑村居雜詩六首秋雨送新涼一朝遍四隩旣入貴人堂亦來寒士谷亦滋荒陬草亦實良疇榖世眼過分析造物笑拘蹙雲霞布長空山川羅禹服錦繡滿乾坤不禁萬人目隔籬羡他人枉自隘其腹如愛袖中藏不容珍在櫝達人自大觀恢恢剖邊幅我生從何來請君且三復其二浩浩復浩浩天地有至寳此寳人人具人何不自保先賢閔世愚持鉢效丐討堪嘆悠悠子愒日甘就槁枕璞以為石長饑羡一飽一朝悟其眞應悔悟不早誰云藐七尺巍峩陵蒼昊舜年眞未央顔淵同夀考黄金北斗齊校如一芥草此寳匪難尋昭昭在大道其三林扃静無事萱幃夀且康阿男得師表薫陶望善良秋序且將半黍榖漸登塲鄰人挈酒至共邀明月光醉眠不掩戸花影紛藜牀撫此欲一笑野子何徜徉試問道旁人孰與聲利場其四山居何所有林泉欵長日籬圃雜蔬香梨棗垂垂實笑言對古人案頭聨卷帙比壤有清士過從挹其苾舍此欲何之世口過於蜜其五好雨連朝足堦前寸寸青禽魚若忭躍草樹亦崢嶸向來憂旱者亦已動歌聲相將坐桑下杯酒話生平縱無榖盈廩菜根固可烹天公不棄物安用煩胸膺其六土臺峻若丘伐木構為榭俯窺千樹杪颼颼風在下縈迴觀四山蒼翠罨如畫吾道足至樂景光不需價蘭亭别彭殤右軍久已化何事電光中區區争譖罵吾欲洗吾耳紅塵已盡謝送别劉年兄豫吾陌上楊栁枝烟氛凄且楚何能折贈君贈君行以語不願相游揚但願相期許迅鶚方徘徊未可戢其羽一鶚終逾百暫折未為沮隱顯總君恩事業無來去古人亦有言當為豈此舉大鵬息溟池一奮排天宇若過少墟氏停驂試問取有懐美人在何處乃在恒山峯盪胸羅曉日釣海垂長虹蒼松十萬丈萬里摇天風我欲從之遊藤蘿翳行踪晝望月為白夜望日為紅殷殷不成寐珍重夢魂通張無翼茂才索詩南山有薇蕨北山有薜蘿胡不餐且衣念茲寒餒多衣冠紛嘆惋關市聨網羅是以賢達士孶孶如拯痾元方施未竟季方更礱磨研精羲氏畫夢寐尼山阿所志潤埏垓澄源洪其波葦棚詩癸卯得告還里賃住室淺苦暑乃買葦箔數巻縛棚以廣屋簷甫及半已覺灑然既成則宻不蔽風疎不漏日鬱同邃厦燦若花隂度夏無慮即使嵗一新之不過嵗用百餘錢終吾之世費不數千徼禄足辦無難也不亦快乎結葦為高棚清幽障暑酷袒背卧藜牀稚子供脱粟有時爇檀蘭古編可朗讀托身六合中風光到處足還期招所知兹樂誰能獨青苔堦除經積雨匝地鋪莓苔隱隱青痕薄茸茸黛色堆舉足忍相踏移榻為頻來化工裁製巧藻繢漫追陪相對境幽寂悠爾好懐開懐公周廷諸友美人隔滄海何當駕葦舸所隔在山嶽吾將攀藤蘿高居雲㝠㝠瞻望可奈何夢接以為期庶幾滌煩疴擬卜居樸庵諸君附近寓懐二首晨興跨欵段徘徊欲何之所之緑樹外納履話幽思涼風生懐袖麥飯甘如飴暮還約復往將子當吾徯其二野曠襟期爽入望惟青林時伴耘𤓰侶踞地談昔今情投言俱質禮簡坦吾心悠爾酌村釀醺然互清吟城市勿見招於斯膠漆深弔趙烈婦言遡河之滸聊以鑑清漪有美趙氏婦殉義委郊圻赴死亦良難厥志恥中移銖視千金體華膴寜啻媸初心豈弗皦一飽成脱遺孤墳何鬱鬱逝波亦瀰瀰徘徊正秋暮悵望涕漣洏陶村送别友人相逢何造次一夕成分岐但念相逢喜不念行當離河梁携手處别恨摧肝脾悵余卧孤館寒風襲人肌雞鳴天未曉君馬已南馳古道木葉脱不似送來時嘉言永不忘于以沃吾思贈梁思軒年丈在昔稱賢母賔至剪其髪孰與擕其兒迢逓山河越迢逓伊何為維以交賢哲蒲坂萃儁髦張孟聲華勃朝鼓虞絃風夕採雷山蕨不聞三遷者笈囊出里閥梁郎感此意天池㑹迅發招子榮春氣正和煦徑草緑參差暖日融懐抱相對何熈熈天心固如是達人觀化時觀化憑誰語子榮共襟期不負良士言大道懼多岐闗侯心如天上日此義罕人知共誦將軍語更鮮窺其陲能心將軍心八極蕩藩籬侯心炯萬世心心映不移赫赫中天日光被永如茲與胡上舍佩蘭亦良馥何必青雲枝大鵬幾千里網罟安所施圓方中天地赤手援四維尊爵一仁備良貴千載垂乘田職不卑匹夫百世師請看徵賢詔西下錦江陲示戒我愛孟子書論孝萬年鵠鬭狠父母危縱欲父母僇所以處鄉黨勉效恂恂䠱出入氣常下惟恐與人觸博奕歌舞地不以入我矚獨有士人行難成而易蹙我願諸子孫尊生如執玉吾能秉謙恭誰不愛敬篤罵人人亦罵辱人取人辱娼門譬火坑陷人逾鴆毒妖態厲殺鋒癡蠅逐臭肉保身須養心珍惜凌霄足百行孝為原芳名千古矗沈頥貞年伯祀鄉賢傑士埀榮名身後紛尸祝或拜九原人或拜三尺木懿哉沈太翁孝義生死篤急難匪求知千金不入矚道高祀乃崇聲徽起人肅伊其未祀時固與諸賢族輓張年伯母張郎夀其父念不忘其母夀父既承歡念母轉悽苦宫袍豈不華不及北堂舞空有紫泥章灰飛一抔土人生值親存晨昬可莽鹵曲江李年伯先賢維大道羣䝉賴以啟白沙宗自然甘泉認天理李翁闡其學傳心在克己克己乃無外吾身豈稊米誰云仕不達懦夫色欲起丹綍下天衢皇言爛於綺吾方處塵網茫茫目有眯斯人如可作從之若脱屣懐思庸先生思翁秉先覺逢人指大道教者何殷殷聽者亦草草茲道匪易窺塵情錮難掃吁嗟年復年不殊秋卉槁先生悲羣䝉憂心應如擣誰能究斯業九天慰此老讀斛山遺稿忠臣瀕百死貞心不少移幽室絶曙色斷食甘長飢逢辰曝囚板暢懐哦新詩眞成骨似鐵寧愁命如絲聖恩今浩蕩掖垣何委蛇雖然靳圜轉霆威固重施愧無感格術停閣亦焉悲詠喬丹山先生丹翁敦信義恤孤矢不負三品歸來日弗忍私其有歴敭二十年共道畜豐厚甫及垂老時脆甘嗇於口身去肉未寒莫能贍厥後清風拂鄉閭謗言眞枉咎寄語月旦人評隲胡可苟送劉友南還名實分先後窮通若白皁或簪纓於朝或以巖穴老巖穴厭紛埃簪纓薄枯槁達人自大觀時行匪二道時行何寥廓劉子眼相青公卿虚左席皎皎玉壺氷揮麈闡秘奥心胸羅繁星一朝辭燕市南去渡滄江劒光寒夜月烟雨迷瀟湘乾行如走丸氤氲何南北把臂竟無言勿忘相開廸遊北園為躭遠寂地留連十日此高臺屬望遙幽禽清人耳雨過千林青日落萬山紫草生堪悟仁木秩可窺禮傳觴抒衷言策蹇訪高士野老罕機心羣兒無侈靡田頭禾黍稠縞綦足妻子隂晴趂民時天行允在是何當鼓此風淳朴移城市相將還太古于于胡不美弔丁文堂先生余誦文園集獨嗜緑茵辭幽居抱至趣情深自華滋譬之天成卉盤礴空良師因知貴得我得我發乃竒玩言思若人徘徊為悽其若人有孝子已矣勿復悲徐鳴卿得告南還賦贈古道氷猶合出門色轉舒誰種棘為林畏此刺人裾倚鞍令繾綣中夜幾躊躇有懐不可吐願言愛居諸題史武麟年兄怡怡堂史氏今名閥祥光何炎炎伯子友于弟相將樂以恬友于極百愛拊畜顧復兼仲子亦珪玉克恭如所嚴怡怡闢堂構飛白髙朱簷惟以為箴銘出入相顧瞻百年期繾綣誰能中道嫌豈其躬町畦内子靡私奩繄予亦有弟予弟亦有兄感此史氏義請陳兄弟情十指聨於手兩手聨胸膺烏得強分别而云若炭氷世人重意氣斗酒呼同盟一同不復忘世講踰蘭蘅孰與産同腹親切亦焉増急難懐兄弟胡不讀鶺鴒父母遺桮棬睨盻肺肝折那知兄弟身父精母之血父愛愛何疑父敬敢弗敬犬馬猶且然矧其所毓孕弟愚噪厥兄父耳慘堪聽兄怒目其弟母懐痛欲涕兄飽弟腹飢八珍成淚墮弟煖兄身寒披錦心如剜吁嗟世人懵利重親乃輕利不殊糞穢焉將骨肉衡伊其癖金貲矻矻後人遺胡厚我之子獨薄親之兒或以小怨始惉惉竟沒齒何如怒不藏予喜象亦喜大都夫之心灰於婦之口朱陳秦晉人渠於我何有我思古風醇壎箎擬季昆讓産不自殖讓金不自珍或尊為天子樓閣美芳芬或貴躋台鼎參問勤朝昬矢衆良難折健兒解崇倫鬭兄愴不武形迷性自眞盜亦欽友愛弗忍相邅迍草木折何知紫荆條枯存於戲後視今誠猶今視昔千年萬年後史氏輝簡籍熊念塘年丈終養畢謁選任婺源君親恩則同忠孝固一理吾君之臣萬吾親之子幾所以一日養三公不可擬人子處襁褓父母歩一顧兒有一宵别親應終夜寤漸長漸相離如葉之辭樹大離乃為仕長年動以數熊子天下賢孝愛切肝脾成名年不少尺組莫相縻歸去環膝下菽水亦依隨雖然五載歡百年無憾遺孝道有終始事君當在茲作令文公里瞻對無忸怩其友為曹生三年離其母匪以捐七尺匪以干五斗親年一何速客夜一何久褰裳盼修途徘徊未能剖重感熊子義涕淚交於胸雲中亦有鶴陌上亦有蓬人生懐其親為熊勿為儂晉松陽乃翁年伯中丞公七􅐆予友晉伯氏叔子予同科共季對春闈伯也先鳴珂時予栖燕市朝暮相劘切伯翁寄書來倖予亦窺閱首舉婁公戒唾靣宜自乾無心與有心侵我只歡然定當勿侵人有往必有還衣寜用其故屋寜居其小馬寜跨其弱趨事寜凌曉吾當坎軻日國事必殫心吾當隆盛時罔敢驕於人好友須締結締結勿以財時事戒輕議囑事口莫開權門不可慢權門不可近遊士亦屏絶一刺良重愼為吾具夀言須入不仕語爾第吾起官似爾為營取守静聽自然逺到卜於汝一讀一三嘆黄髪之言芳喜不倦於教是宜閥閲昌伯翁懋勛業天署達龍荒贈言遍京國不乏錦堂章組之用為夀維以發潛光抑將告仕籍式遵永靡忘寄别張警庵平生不解泣今日淚頻揮一泣趙郎去二泣呉郎歸三泣張倅罷顔色逺相違張倅才激昻彎弓兩石強清操不纎翳直性無迴腸爾行自慷慨我懐自皇皇徘徊乏雙翼隨爾共飛翔汪中臺年伯祀名宦鄉賢從昔辨仕學朝野迥然分朝野亦寄迹根宰一天君汪公祀上谷還祀汝水濵綰綬何􅋫􅋫入里何恂恂抑或雄於鄉何談樹功勲吾將質夫子聊取鑑人倫贈王金暘計部回南夀其兄復姓孔氏仲尼躬大道天下一家也豈不有同宗一家之親者天下闡其學譬如共陶冶同宗繩厥武親若在膝下伯魚何異聞詩禮之言雅金暘出孔氏傳神異土苴贈翁垂令徳昆弟如韶夏食指紛同鼎末俗睇茲寡季也念伯氏萬里夀玉斚復姓追本支先聖自歆嘏繄予欽其芬翰墨為之灑謂疎非所親胡為思如㵼大道在金暘吾言當不假懐昔吟八首懐昔吟懐同里之先賢也賢不盡於吟吟未盡其美聊據所知以竊仰止云爾甲辰四月廿有一日夜李尚文先生諱素通政使李公建媺猷掖垣振遐軌彌天知瑣郎到今黄髪李千載有餘芬煌煌徵國史愚忝踵故署三嘆不能已張九雲先生諱岫都御史清白信清白日逺揚輝光片札世人珍乞米帖同芳堂堂八座尊候俸製母裳鄰翁售以宅昕夕為徬徨流傳聊彷彿峙嶽懸春暘所嘆文昭後高丘柏已戕天道不可問人生惟允臧孤鳯鶱雲漢誰與之頡頏張訥菴先生諱芮大學士張翁秉操古朴懐而直躬逆璫熾虐燄勁柯迥靡風學士一長揖拜跪羞羣公左去豈不得鼇禁留髙踪史官謂未識他人何弗懵升沉俱往迹忻瞻芳譽叢胡東渠先生諱諧叅議胡公凝粹徳趙璧楚白珩守道抗宰輔宦貧感同升拂袖耕北野高標映日晶等閒欽令聞盗亦為心傾杳杳青天濶何縁請執經謝朝制先生諱誥員外郎謝公當孝亷驄馬憲臺扣五日百雉興㓂退萬家救筮仕秉清法供億省帝狩歸來遺世氛貴宦罕能覯村墟契胡公城居翟叟厚訪胡芒履趨訪翟坐圭竇寥寥將百年此風不可又劉思庸先生諱弼寛府同知言念思庸翁未老遽焉之執謙魯恭士邃語匡衡詩當年聆一二服膺猶在茲懊予匪善問未窮珠藪竒頗解理痿木墓楊空瀟澌悽切向誰語殘燈照淚垂杜勿塢兄諱可久舉人予昔在髫齡及窺勿塢子蚤嵗歩青雲磊磊終貧士六月被大布放歌悲世否奮毫落瓊珠孤鶴雞羣恥狂飲不懼疾厭病輙祈死齷齪市上兒豈直上下笫英風不可追心熱為背泚馬少軒兄諱邦瑞行人人亦誰無心心各隔胸膚少軒心外露坦坦渾邊隅忘機漢隂叟歡笑歩春雩孔門肇毋欺若人之徒歟忍見璠璵質委置蓁莽區贈别戴生秋日長安來春日江淮去爾身有去來爾心無行住識得爾心時八荒寸地具識得爾心時萬行一模鑄識得爾心時乃見違心處吾心那可違談心淚如注感懷六首夜光紛滄海網罟亦良難夜光無擇照海底如人間人間自多夜夜乃光之求含光數問夜抑足用為羞太公無耋夀渭濵一老漁披裘翁為誰悵然嘆區區其二或居崑山麓觸目盡珍竒炊玉以為食紉貝以為衣或居荒裔區觸目盡魍魑倛面叫以嘯隂風凄以悲所居乃不同相憎徒成癡山鬼亦趫跳聊以解我頥其三伯竒父不憐顔路子不夀牛也憂兄弟顗兮空良友買臣未終賤室人謝絲蘿版築不入夢髙宗如説何相遇良偶然不爾偶不遇天且莫之為委心復奚慮其四晉史寇諸葛賔王武瞾賊漢髙不滅楚耳餘為比翼漢髙自萬乗勿勞幸不耳孔明胡所尤天命如斯矣臨危悲黄狗拜相感微時豈知死與貴石光忽滅澌其五天亦有晝夜天亦有生死有開必有闔有成必有圮東海有時涸西嶽有時平日有時不暄月有時不明榮光鐫金石彼時阿誰知相逢且相樂勿為空嗟咨其六貧家斗有餘而常嗇於升富貴千不足萬億何時盈馳驅百歳間憧憧撼心膺臨去猶長嘆亦或目不瞑愁魔一何强以此竟死生誰能殄此魔浩氣排青雲吾道自至富吾道自不貧不縁知足樂不足復何論榮公樂三事假物以自歆至樂無所假至樂無可尋會友有談歸賦寄弧矢懷四方安能事一室萬厦庇士寒凍死亦不恤有弟貧且耕予咎弟何失有妻病且憒月老繫之匹我憂年踰强大道猶闇窒我憂民木蘇烽烟方急疾吁嗟憂何為採菊酬秋日不見鬢邊絲那能再如漆寄夀徐封君徐翁玉南先生長嗣戎部君鳴卿自北南行奉寄以詩為夀淮水之南北時與鳴卿晤一晤一傾懷瓊樹凝清露世艶揚州鶴而乃類寒素云是嚴若翁積金當見怒翁才大崒嵂六籍蚤能富迴首謝青雲惟以盟鷗鷺名理佩前哲孝道永孺慕昆弟樂且耽千年愧尺布九族惇以睦不殊奏大頀瑋行嗜如炙鴻名亦若赴鄰里薰之良種徳已成圃誼髙戒吉甫中嵗不再婦課子為通儒探摉破訓詁理郡露竒頴芳猷罕能步寰宇珍明珠靈淵應可遡爛爛紫泥書曰以報是父家慶流徳光國威藉戎務當是趨庭日干櫓燦武庫皇華飛絳節五月長江渡過里拜慈闈和氣生門户久予棲京邸寸腸感烏哺夜誦春暉吟朝上乞身疏辛楚歸未得供張慙道祖去去乎鳴卿華堂裊香霧為翁舉霞觴為予歌此賦黑髪擁諸孫如川綿夀祚寄報沈湛源博士虎丘山上月碣嶺亦輝光人生能不别所懷遙相望未拜寄來書先拜賔鴻翔容顔不盈尺一語一琳瑯丈夫重掀揭枕流亦已涼長劒爛星斗誰思匣中藏把劒相憐惜無言但涕滂寄報何霽懐京兆客從吳江來遺我尺素書長跪讀君書問君何為歟韜煇官若弃食貧田無餘門前環碧水座上集瓊琚顔倡孟閔諾易始書之初鳴琴對樽酒一笑意淵如何當置其間孰與夢華胥送曾公祖南巡廣西送君河之浦不折垂楊枝楊枝幾尺强千丈繫離思别離復何道光輝日在兹顧慙漆室伏喜君驄馬馳春明萬里隔况乃南溟陲六飛匪代狩誰與聽民咨讀朝制先生詩語新凉整冠服簡編事校讐端誦謝公語言言在清脩潛心窺顔孔普樂為民謀誰與膏其槖擊鮮雜歌謳九原可以作執杖相遨遊何如饜藥石吾病行將瘳咏耿敬亭年伯昔行大河涯徘徊砥柱下砥柱高百尋黄流任奔瀉崚嶒不嫵媚不乏嫵媚者羣籟亦交發如奏鄭與雅衆喙匪可緘嗟咨誰能舍巍巍寒嵯峨而今安在也王紳字朝用千戸王紳跨羸馬揮鞭驅萬人萬人豈不武伏竄䘮其神亦聞高軒者咋舌為逡巡人豪何矯矯可以擁三軍怪哉抱誰語滴酒詎能申世界吟世界多缺陷斯言未為確家家日月明處處川原擴崇高貴者榮清閒賤之樂多財多受享少貨少計較周易憑羑里蘇節賴沙漠長夀賀歴年化去如解縛坦途誇砥平峭石賞巖壑譖毁聲焉住誰短長鳬鶴見在總充盈一榻亦廓落豈不聞芥子不異須彌博莫相憎吟鳯麟天之産蛇蝎亦天生誰不秉至情雜紛縁五行世衰鮮教化遂致終懵懵抑以天道逺難測者㝠㝠不有不肖子積慝家無傾怙惡儻知悛奚至貫滿盈利名或濫被只因乾澤宏辟彼甘澍降荆棘亦敷榮一瞬總歸盡忽忽電光明相逢幸相憐切願莫相憎咏寓邸四槐所居燕市裏茂樹緑隂濃當年曽手植重到已凌空鬱鬱冪夏日颼颼撼天風好鳥來棲止交語如商宫公餘時一憩不異故山中故山共農叟木榻坐林叢愛茲若彷彿亦可盪吾胸都城多華屋歡情偏爾鍾歡樂詎敢極側耳長樂鐘癸亥冬得告西還途次漫賦昨嵗長安來今嵗西山去道旁相睥睨來往一何遽修途旅枕寒暴客郊原聚豈不感君恩綣綣不可住君臣誼自高行藏别有據憑將遅遅行聊以答吾遇又憶得一紀前新年寓井陘今日逢元日依然舊館亭君恩頻予告授餐煩居停山川似有縁一笑酌春觥健兒挾弧矢飛騎堪怡情却懐漢猛士赤幟㧞堅城誰當靖東海泰運轉邊庭又夀陽暫税駕昌黎詩在墻讀罷行十里狂風塵沙揚咫尺不可辨僕夫凍且僵踉蹡投旅舍草榻卧殘缸兼之我疾作中夜起徬徨行路昔稱難况乃鬢如霜方知倦飛鳥原來各忖量又林臯餘十載鷗鷺久締盟晝營與夜夢不離讀與耕天子思遺履起我貳常卿俾之贊風紀俾之佐銓衡有懷埒芻蕘擬將披腹呈忽忽仍歸去秋毫報未曾官忝真成竊慙深涕淚零所願二三子聖學共闡明貨利不可嗜寵榮勿去爭樹人將在此慎莫藐予聽贈别李本晦侍御吾身若虚空氣形凝未聚浮榮與浮名奚所憑而住所以達觀人不以縈其慮虚空何邊涯茫無析别處所以大心人似千花共樹離亭我送君杯酒莫躊躇君固河東留我已江西去搥碎匡廬山面面兩相覷但會虚空身肯令沾飛絮又我昔弱冠時不揆慕往聖誰其示我學吾與渠共命浮沉數十年簡帙窺先正元公及純公金谿有子静江門果自然姚江揭大柄泰州簡而要二溪之言瑩垂老逢吉水一睹真率性率性匪等閒須理融欲凈豈乏為義人戕性滋世病不思勉而始不思勉以竟歸去告先生當不我為佞平房成窄屋苦炎熱新構屋四楹屋頭不用瓦甃磚坦以平直西丈有五向南三丈横前時宅基狹於今不啻𢎞夏喜新凉入冬應暖日融屋裏常居處屋頭時一登吟餘抱膝坐飯後遶欄行采雲疑相邇皓月若增明吾此堪頥老欲擬菟裘營歸田園田園二載别重到理蒿萊雖然吾年老尚堪歴隴崖比舍舊農侣斗酒來追陪及時播嘉榖引水灌新栽乘凉就茂樹踞地席青苔晝永眠深洞朗吟盪胸懷童子為治食搴蔬向籬隈兩盂腹已果千鍾安用哉最喜延三益妙道相取裁善言踰瓊璧良士杞梓才不藉好修士誰與奠埏埃七言古詩久旱禱雨有應利璫鑿地脉名山不能雲闗市紛豺虎戾氣徹蒼旻去年六月書不雨迨今河漢飛紅塵昔聞土養人今見人食土饑來去何之凄涼空敗堵父子忍仳離白骨暴如莽餓夫十八萬枵然聚畿輔路逢𣙜利人不言而敢怒我皇惻惻躬禱桑以實不以文煌煌釐弊無異除新法剔奸何啻烹𢎞羊頌聲成轟雷喜氣成靈㴻雖然草始青鼓腹若大餔家家機杼鳴處處禾黍布公家固不貧萬里盡外庫君不見從來大亂興毎自荒年起民饑則流流則聚一夫掲竿大事圮邇來景象亦如此不有甘霖胡恃矣漫歌行白浪如山海若怒萬石之舟一粟淪幾人方競渡幾人方問津亦聞炎荒成白骨徘徊銅柱顔為忻白骨枯不靈辛苦誰為陳中心有所驅四體不相仁周道有華堂桂棟栢為梁瓊玖為茵席椒蘭何芬芳苦樂一以殊歸去疇踟蹰為謝行役子勿勞相招呼從征行十載從征戰白刃如飴面銜鏃天寒日暮沙塲宿飲血枕髑髏雲黑隂鬼哭百殆適不危千慮繁心目跫然喜客至踉蹡相徵逐首問功高官爵榮次問黄金富千斛吁嗟乎利錮人乃若此今人重利重於死賈玉行賈人賈玉交琳琅栖栖楚客何彷徨秪知三獻終當售誰知兩足刖堪傷蘇秦賈舌以舌死丈夫未遇盍括囊蘇秦死齊不存懷璧為罪胡璧珍尼父遊遨七十二價不可求但可俟濯徳歌一緯錯一疋惡纎塵能障玉壺冰尺霧猶堪翳太清宣尼濯德精彌精盪以江漢之砰磅滌髓瀝腸中外瑩毛可以吹疵何生疇為濯之時衾影我獨知急遽共流離疇為濯之具上帝時汝顧翼翼恐以懼愼防歌寸心有刀鋒刀鋒森如麻亦有水與火焚溺夐無涯抑亦工變幻朝人暮為蛇忽以隂忽以晴忽以鳯舞忽以鴞鳴忽以虎嘯忽以䑕驚當其未變時羊腸望路岐及其變已成千尋瀉建瓴本来面貌果如何憑君認取莫蹉跎刀鋒水火原無有愼防勿令㣲成多近觀歌近以觀遠人以觀天我以觀物後以觀前小以親巨偏以觀全麄以觀細顯以觀𤣥枝頭一珠露萬古包鴻濛鴻濛不縁腐草隔仍向秋螢見化工一呼天地始一吸天地終所以聖王不下榻康民阜物成豐功大同歌農人農賈人賈文人文武人武左賈右農誰與通功軒文輊武誰與禦侮瞽師典樂刖夫司閽智愚迭役孰去孰存乾坤何磅礴為蟨為蛩蛩周主昌君義殷士掲臣忠山青雲靄白草緑花舒紅東家聖老於行西家愚没於市無用費平章亦各畢其事哀丁生賔茂才丁公子卒余往弔或曰是年少者可長揖夫丁子孝悌人也余雖老敢不拜乎謹再拜詩以哀之丁郎皎皎玉為姿靈輀忍睹赴郊圻斯人厭世一何蚤斯世可無寜馨兒克孝兩親悌厥長肯忘根本傷同枝若兄先去悲無歇鎔金為主相奉持錦襲眞容時左右千里間闗不暫遺嗟余平生罕窺此何不住世挽風靡誰不孝悌本至性誰將此道不陵夷爾可贖兮我身百傷懐為爾泣漣洏良良歌吾族老僕曹寜其子良良垂髫時以搖箕為生毎得毫釐則為父母具美味稍長傭工其父母不乏酒肉嗟乎兹非孝子乎哉未可忽也曹寕夫婦病且老有子良良行孝道苦筋竭力得毫釐奉養雙親常溫飽我雖峩冠為朝臣睹此美行感懷抱世上豈乏峩冠人上天下地能論討妻羅子綺愁不足不為父母添布襖嗟爾良良是我師願爾多夀多財寶夀何年伯年兄何旭如氏叙年伯父母行實命為詩慶上夀謂年伯洞經世出世二通玩易睦族種樹灌園伯母禮奉觀音宜於尊卑教子三事一米一菜不忘君親各善不可殫述聊就其諸語稍加錯綜以寓請質之意冀得畫一之歸世人世出誰為可經世以世不以我九族既惇百畝耕以斯出世以斯經三語課兒清慎勤一米一蔬君父恩里閈旄倪生忻心何妨俯首誦觀音封君孺人徳何閎仲子言之感我膺仲子鳴珂朝珥筆世胡以經胡以出亦有欽崇大士者一米何有空天下大道難窺請以扣抑以扣言為之夀沈孟威年兄乃堂伯母節夀歌孟威索句夀其母子孝母貞兩俱睹孝將寸草報三春貞如勁栢凌千古孝道從來重顯親不虧厥體顯為真體分大小誰與辨不虧其大幾何人貞母徳夀天與齊筆匪如椽將焉題孟威孟威以忠孝南極北堂絢紫泥輓熊太孺人人羡孺人誕貴子扶摇萬里紆青紫我羡孺人誕子賢玉峯千丈倚中天有子不肯置王家百年不訣亦焉嗟賢郎幾上思親書正是萱幃無恙初腸枯舌爛歸不去西風灑淚可何如奚童反命慟欲死東村母子方治耜長號奔去天㝠㝠相看誰不泣横膺噫嘻乎翟冠鼎養今已矣永終慈譽惟賢耳揭曉前一日有友索歌歌此春風曉入曲江曲西山客子但呼醁座上有高士相看驚側玉為君發長歌有口不食彈鋏粟御罏攜馥度玉堂故園烟柳競新黄誰能軒輊此乾坤萬里足徜徉渭濱一絲繫九鼎當年未遇垂孤艇手持鹽梅上丹轂夢懷不入岩前築生不願扣角鳴嗚嗚懸車前弩亦區區人生容膝俱長物勿用擾擾逐隙駒為君歌君浮白君才崒嵂追謋砉仰視長天流浩碧詠知一張年伯似緑汀年丈知一先生胸如日直從造化窺靈根加纊不憂身且去方憂吾道蓁其門校勘理氣授冡嗣雙瞑浩浩歸九原兹念固已達渾沌下通萬億剖籬藩匪修匪證匪克悟紛紛離析愧支言冡嗣孝廉真大孝號天踊地晝為昬先生有神應注矚綿綿道脉繩繩孫張君孝親孝以道理氣不裂孔顔存我學憒憒賴發覺他年寸地夜可暾贈别劉冲倩劉生索賦詩欲賦無可賦吾喜劉生來悟言如祛霧聊於歳月間迴頭試一顧不行何用言不行不為悟忽忽將百年抑以將求副歳月不副猶可圖百年不副眞堪怖眼前自有相副時轉盼休成千里路仰節堂集巻十二
