body:
  text: 仰節堂集巻三明曹于汴撰引張時庵先生八十壽冊引歲庚申春仲念六時庵先生張公壽屆八旬復元辛君摛辭成冊走書質言俾弁之首顧余不敏其奚以壽公請談壽乎世人以氣為身不以理為身不知身者也乃以身之所歴為年不以理之所貫為年夫所貫何極是壽之説也如以所歴而已公之宰容也五六年所耳然公之樹勛於容及容人之思公迨今未艾也五六年已乎其守滄也六七年所耳然公之樹勛於滄及滄人之思公亦迨今未艾也六七年已乎其司南計部二千石秦蜀十四年所耳然南人秦人蜀人之思公迨今未艾也十四年已乎比歸林麓不為世俗縟麗態明學講道淑世維風夫道何極之有哉可以窺公之年矣客有難予者曰果爾則人人在道中人人皆壽何以必得其壽獨歸有聖德者余曰此覺不覺之異耳復元云乎哉愚夫愚婦各具聖人體段一覺悟焉如醉夢得醒自爾手舞足蹈然則人人皆聖所乏者覺覺之則聖人人皆壽亦所乏者覺覺之則壽覺此身從無極二五中来有不與無極二五共不艾哉不則不可言覺公固覺之先者哉請以是為公壽仙掖貤封詩引春曹介泉衛君之前主上黨教事也化行勣茂銓司以翰林待詔遷之盖久懸不除者致旨嚴勘然終以君雅稱此遷而准授不為例越三歲則竟以是遷移贈其大人徐川翁如其官於是閭里歡動謂造物者殆若有意存焉夫久懸之缺介泉豈覬得之主爵者於應除應否靡不了了而何為除所不除天子業知為曠典不難奪之而特恩眷注不啻榮介泉而卒至榮徐川翁始終凑合若此則翁之砥躬績學以謹厚没齒而介泉承其世範益醇修宜於邇遐天將昌其閥而揚其光銓司雖欲不以是官授之而天子雖欲靳之有不可得者然種徳者食報厚積者巨發天雖欲不以是佑其父子亦不可得也乃世或謂通顯可力致而圖之以術是與天抗也又或不求諸已而求諸天甚且咎天之不我福是仇天也則胡不以翁觀焉翁之贈也諸達人先生歌誦以詩成巻題曰仙掖貤封而不佞引於首盖深感於天人之際見翁之得此非偶爾也題跋題文公朱先生經濟文衡朱先生之學繭絲牛毛而未嘗不廓大遠搜旁稽而未嘗不簡要履繩蹈尺而未嘗不透悟世之外於先生者曰何其不廓大也不簡要也不透悟也是不諳其所到而枉之者其歸於先生者曰先生繭絲牛毛已也逺搜旁稽履繩蹈尺已也是割其所到而枉之者由前之人猶可言也猶後之人不可言也故舎朱從陸與闢陸從朱總之不知先生盖儒賢之從事於學入門不必同及抵堂奥未嘗或異儻未窺其堂奥第望門而評隲焉烏足以盡余年友張華東氏尊信先生寳其文衡昕夕披玩楮敝墨渝重加裝演不忍釋手其嗜之若此盖亦遊先生之堂奥者矣可不謂千載知己乎哉題南臯先生教言嘗聞鄒先生之論學矣曰行路曰到家曰開眼曰未開眼夫既未到家則雖没齒務學終屬半途既未開眼則雖終日亹亹猶漫道也余曩誦先生之書邇聆先生之講大抵髙坐堂室雙眸朗朗之談意其閲歴之久艱苦之嘗㕘究體騐積有功力乃臻於是乎士人無其功力驟而聞之未必見信縱或信之亦僅為幽𤣥妙論聞未曽有足以悦耳而解頤非真能信也果其聽受而出倣效而履質之飭躬御物一一相肖方為真信耳詎易得哉浙堇父王君錄先生之言成帙余受而卒業謬題數語期與學者共信焉然則當如何亦曰第行行不已求開不已㑹有到時題貞裕堂集貞裕堂集集呉母太恭人之褒揚於上下自誥勑以及傳誌記序詩詠文辭貞言其節裕言其子若孫之彬彬賢且貴貞以啟裕裕以起貞兹集也以章母懿亦以風世教母之子安節先生為汴師寄示汴命以言謹拜手卒業有槩於衷夫猶子未繼先十年而矢節已堅是洵貞也撫襁褓之子德成爵顯繩繩未央是洵裕也第當其直志從一艱苦不二之日貞在是裕亦在是貞於母身可覩裕若有待而見焉耳善乎塘南先生之言節義根於性也夫天下有裕於性者哉世或以險夷樂苦自撼之自怵之乃不無隘焉呉母於境之可撼可怵掃若祛霧蕩若焚毛亭亭無倚浩浩無礙孰貞於母亦孰裕於母詎待先生登第甫稱裕乎竊恠夫士之不知貞者不知裕也夫本包六合羅萬象而營營於數十畝之宮競富鬬麗謂裕於居本髙無上貴無偶而屑屑焉夜睨台曜晝傍侯門謂裕於貴本前無始後無終而斤斤於百年之内玩流光奉口體幸而皓首謂裕於壽裕其非裕不裕其可裕不貞者如是故君子亦貞而已貞則裕矣太恭人貞於家先生貞於國家國迹也貞不囿於迹不囿於迹之謂裕故貞無所待裕亦無所待然孝子不忘其先則呉氏之後固待太恭人而裕裕無所囿則後之裕皆其裕兹貞裕堂所以有集也題劉孺人苦貞錄江右直指以劉孺人賴氏孀節奏於天子欽命旌之士大夫形諸歌頌其子伸集為帙曰苦貞錄夫孺人苦哉苦於形而不苦於心者也以不貞為苦以貞為不苦者也世不能辨苦何以辨貞然劉子念其母艱辛拮据狀其苦之也則宜余亦蚤孤共余母守貧貧未若劉氏之甚而亦艱於甘旨余或食於富貴之家或舉箸躊躇不能入口既登仕版無他長獨不敢輕費人錢安知其不似吾一錢之難彼以一錢為母子命豈其不如我也劉子仕矣不忘母子之苦當亦知民間母子之苦孺人以貞而成其子之貞劉子以貞而顯其母之貞俾其先君子有妻有子端在是乎嗟夫孺人艱於初貴於終劉子之懷可抒而其先君子又艱於年安得起九原而祿養之則劉子之不能舉箸入口當有時時動者抑亦没齒而已矣此又余與劉子同者也揮筆至此淚潸潸不可遏遂止題抑齋盧公夫婦傳余嘗言天下多清有司而鮮窮鄉官夫既輦載而富則所云氷澄玉潔如薦剡及口譽者何為乎故清之真者難也咎在不知俸廩之外不宜更有所取不知朝廷之祿原以供其在任之用非并其任後身後俱有贍也平生聞山東曹楚石談及此守及此曽晤一客自嘆其祿薄謂到家何所用竊不然之理淮日過諸生盧守恭之廬其廬社學也蕭然四壁因思其父抑齋翁敭歴二十餘載致位中丞所遺後人如此可不謂清之真者哉既讀翁夫婦傳則翁夙承家學澹素稜峻不知有權相奚知有其官一裘不凂殁於國事而江夫人閨閣丈夫叱明珠簮珥之遺真抑齋妻也彼固謂食君之食事君之事事一日事食一日食子孫何勞焉而以君之官為其囊篋乎我朝諸僚俸祿載在典制雖善節省亦難多餘苟無妄取即公卿無大富薛文清宰相迴籍中途而窘羅一峯狀元及第客至無米不為異也世以薛羅為竒絶則盧公可易覩哉然使守恭不甘於貧窶而行告於通家世籍故吏門生宜當有所獲而不之為也亦真抑齋子也約其躬而揚其先者也不然予何以知盧公之清之真哉翁夫婦懿美備於傳中清特其一節予感於此而聊題之乃爾題張綠汀年兄主教華陰巻孟子曰聖人與我同類者夫人亦在乎為之而已人之所以異於禽獸者幾希其視聖人甚近視禽獸亦甚近無兩可住足之處世人俗眼則視聖人甚逺視禽獸亦甚遠究則聖人之遠者果遠矣而彼雖欲遠禽獸不知其日近也明眼者知其兩近故汲汲皇皇祈以異於禽獸而齊於聖人其視人亦皆兩近故汲汲皇皇悲人之窮而共立共達也余不肖每念及此未嘗不生懼焉夫聖人者不失赤子之心者也赤子之心人人皆有則人人皆聖戕伐之後人人有平旦則人人可聖第令旦晝如平旦不致梏亡何至與禽獸近哉自為者保平旦之氣為人者共保平旦之氣其斯而已矣夫平旦之氣以息而生以夜而息則其故可想矣故聖人主静静也者不以時不以地不以枯寂心之體也赤子之初也旦晝之梏不静耳不静而胡以御動禽獸不遠無惑矣年友張綠汀氏自為為人期之乎聖人主教華陰以人之聖不聖責諸己以己之聖不聖自責也同心之友題巻贈别余無能為言則以孟子之言衍而書諸巻書既凜凜轉自懼矣題孫生廬墓克孝冊孫生昔為其祖母廬墓邇復廬其嫡母墓三年畢士紳艶稱之製歌成冊問序於曹子曹子曰將頌諸乎抑祝之也行者啟於途匪若居者止於室是故必有祝俾及其所期孫生竟廬墓之孝將居於斯耶抑自此啟行耶語云孝弟也者其為仁之本與謂行仁自孝弟始夫曰本則有幹有枝有花有實曰始則有終幹枝花實之無終而曰吾從事於始矣而可乎行道者未有縈縈其既行之武者有期而至者在也孫生廬墓之孝固其既舉之武當亦忘之必有所期必有所終必有所止以居矣乃題數語以祝焉題譚生十畧譚生同節篤志聖學考訂仲尼年譜正諸家之訛皆據所見發明之為洙泗考畧居常開巻藉以尚友志顧不遠哉既又以生平所讀之書各加纂編自李耼釋迦天文地理古今政事文藝方術皆為畧以淑其身心而宏其應用余得以逐一涉獵嘉其窺覽之博思致之邃也或謂其言有與孔子不合者雖然予嘗有云善學者雖巷語野謳亦切實際不善學者雖三墳二典徒益支撑顧同節之學如何耳士人童而讀學庸論孟言言聖訓然思以是博富貴虐取窮民誰予違者凌傲鄉鄰誰予抗者予讀書得第人也嗟乎吾夫子乃令人如是耶則雖日誦夫子書何益乃王文成公遇市人鬭詈亦謂之講學士誠好學無往非益也且人不聞雞鳴乎彼以唱曉為事者也不聞犬吠乎彼以守夜為事者也雞犬之聲非以有為而發故主人善飼之亦然訶打之亦然是之謂率性然則聞其聲得其益不淺也同節意若斯乎其語之㑹中諸生當知所以求益矣題海陽别意巻繄我皇明真儒輩出講明聖學而大江以西尤稱盛焉不佞遊其地晤其人聆其談讀其書未嘗不咨嗟三嘆曰文在兹乎惺魯胡君南昌名士所從學皆鉅公碩儒講貫有年北遊河洛踰中條駐轡郇封吾黨之士執經請質函丈之間常滿不佞間詢之云若從胡先生講學乎曰否吾輩第從講書耳嘻講學講書有二乎伊其據案横冊第一云大學之道尚不謂之講學乎講一而已以學聽之學在是矣以書聽之書焉己耳聽之以學則將契諸心體諸身片語隻言可達神化聽之以書或且入於耳出於口時習二字亦屬想像其勞劬同其費月日同身心之講聖賢為伍一息成千載之業口耳之學皓首矻矻所造不越里巷士宜何所擇焉胡君馬首欲南多士綣綣製巻為别聊題其端乃爾夫胡君所講未諠也其勿僅付口耳昕夕修證如獲珍饌吾飽吾腹方為我有俾江右碩儒聞之曰吾道北矣不亦可乎題胡君遺愛冊夫共世而居者共氣而生交相愛而已或以愛施或以愛報各不容己顧其責在施者有其施有其報未有有其施無其報者也應暘胡將軍愛軍士軍士愛將軍生而歌頌之殁而俎豆之士紳艶稱焉厥子敬明彚之為冊以視余余想其當年之交相愛也形骸化而精神貫上不曰我可飽爾可飢我可煖爾可寒我可甘爾可苦愛之則願共飽共煖共甘也下不曰我可飽可煖可甘爾可忘愛之則不忘之而歌頌之俎豆之也斯何其翕如雍如協氣遍滿乎余讀遺冊恍挹淑美而嘉愛不遑況共閫而交愛一何鬯哉敬明世父之官欲繼父志則亦繼其愛耳夫愛不靳於禽魚草木況同類而為人愛不遺於千百世況生同時愛不嗇於山隅海陬掉臂不相識之人況相臨而事使何弗愛焉我愛彼彼何弗愛我焉上下交相愛天下事何弗可為哉然亦知有施而已勿計其報無其報者必無其施者勿疑芸窗紀愚跋昔人云言之不文行之不遠奚取於文而行之文以載道文行則道行也如以文而已矣雖行之遠奚禆汴素不能文其讀諸家所為文亦多不能卒巻然獨有慕乎督撫禇公之文抒寫胸臆根極至理其贈人不忘箴規其論事則經綸如指諸掌讀之可知其人必樹勲流聲卓犖朝野者也得其一二而自淑焉可以無過然則道固在是匪文焉已也公以紀愚自命盖不欲以文自居也聖門惟顔子如愚愚故空空故近道彼機智百出其衷空焉否乎其於道何啻千里即文工鞶帨君子不欲觀之矣公餘漫興跋夫意動而為言言成聲而為詩詩以抒性靈洩積臆也故曰詩可以觀乃有標新鬬異抽黄對白俯仰流光荏苒情竇敲推幾失常度性情因而成苦是亦不可以已耶汴素承乏淮陰其於督撫禇公為屬吏讀公所為詩及詞若干首大都忠愛孝節之念隨感而發於以匡時動衆其意油如也公之性情可觀矣夫詩家若以沈約杜甫為孔子逐聲咻響銖兩而較之曰此為詩此非詩其論當自有在乃所願學不在此謂作詩若公之忠愛孝節可以法己夫論詩若聽言其言端方而醇慤此其人何如也其言綺麗而浮靡其人又何如也故立言者蘄於不失其為人聽言者蘄於得其人通乎是可以論公詩矣玉笥山房集跋浙冲倩劉子至予館奉其翁電仲先生玉笥山房集示余余受而恭玩卓契實詣見乎辭矣則海門周先生題其端謂先生少業舉子藝窮年不倦忽夜半聞鶴鳴憮然有感隨棄其所業而業此其聽鶴之偈亦載集中大要於有聲無聲三致意焉時余座上二三友人因共相辨剖鶴之鳴也為有聲乎為無聲乎將謂其無則其聲至今存也東海西海南海北海俱聞之十世百世千世萬世俱聞之而何況當時呉山之上戞然而嘹嚦乎將謂其有則鶴喉空空如人耳空空如呉山空空如當時寂寂而何況今日安所執捉然則有而未嘗有乎無而未嘗無乎是真有也是真無也有為真有則東海西海南海北海十世百世千世萬世無間於此聲吾安得間之而此聲之中有林林森森者何間於我我烏得不同卷同舒同動同静喜同喜憂同憂理同理亂同亂也無為真無吾安得滯之為柴柵泥之為渣滓而不洗之退之藏之宻之也夫耳惟無聲乃能受聲惟其洗之退之藏之宻之而後能與林林森森者同巻同舒同動同静喜同喜憂同憂理同理亂同亂借令巻舒動静憂喜理亂之不同吾方柴柵之塞渣滓之錮也掃除盪滌之不遑鶴與我何與焉而何必其聲之有無之辨剖之嘵嘵也遂書之簡末付冲倩以質於先生或以其當日之所聞俾我共聞矣劉世子夏卿傳跋余讀劉夏卿傳未嘗不掩巻太息有逖思焉世胄之家生而崇膴不競華鬬縟足為美談夏卿具孝友忠信之行志古人徹易理是不可嘉羨乎其薄桓文不行王道罪季孫阻孔子之行王道尤非三代以下可多得也世之齷齪淟涊者無論借令布置周宻動有作用有不以為才乎穎識風生揣摩無遺有不以為智乎挺肩張膽一意摧强有不以為力乎處處流惠人人見德有不羣然而推賢乎然大段霸術之餘耳事功固集元氣實斵誰能純衷直行無機無械至正大公無偏無黨神運而人不知功成而身不宰斯之謂王道盖亦未見其人也學術不明匪朝伊夕世故多艱罅漏千百孟氏以驩虞為小補今以小補為大奇則以貿貿汶汶不求禆補者衆也噫九原不作吾誰與歸楊明宇都尉榮壤集跋盖余讀都尉公伏闕諸疏淚未嘗不潸潸下也嗟乎臣事君子事親不當如是耶子有不可致之親而臣有不可得之君耶世以楊封翁子尚帝女為艶稱然不以貴戚故妨廢子職徼異數之俞旨徒跣扶葬衣衰食糲三年則昔今戚畹一人而已不則黄金繞身何如父子相對之貧哉諸孫玉立帝女出者業已五允徵隆盛而可欽者在肅雝損貴榮饋食之禮此都尉以克閑致而實翁以貽穀臻也夫翁之得孝於子也都尉之得順於帝女也聖天子俞都尉之孝願也皆以性通者也性淪渾無間前不以後隔上不以下隔外不以内隔故父子志同男女道合君臣情洽然而世每暌焉則不以性聨而以形閼也形則七尺之外若山川若秦越烏能通乎盡斯人之性詎有不孝者哉水共一池故東摇而西動人共一性故此感而彼應封翁孝而都尉纉其孝都尉孝而聖帝帝女遂其孝或發以性之所有故真或符以性之所有故速日之遠也珠對之而火生月之遠也鑑向之而水起不知其所以然而其所以然者固已了了可目視而耳聽也夫性綂天下孝綂百行然則人人可通事事可通盡民盡物奚之而有間者乃綴數言於末簡以旌仰止之思薛文清公行實錄纂跋文清夫子吾明之大儒也産於吾鄉若此其甚近也然論其世而師友之者則亦鮮矣夫子學聖人而未嘗不欲人之共學不學夫子是自外於聖人之學也聖人人也自外於聖是自外於人也而可乎稷竹東任公纂著夫子之行實成錄將授剞劂氏公之人人欲人人學夫子也學夫子者學聖人也學聖人者人其人也志顧不偉哉吁嗟兹錄出而吾鄉之文清夫子接踵矣是公之大造吾鄉以迨天下後世也讀李如真先生集夫聖學之不明也遜聖人而不敢居也諺有之衆人是聖人何遜焉甘為衆人者無論其自好者則曰將為賢人焉非不硜硜非不翩翩而真儒每難於睹善治每難於臻世所號為賢人者或至為世病非盡名浮於質也賢人以知見用事而聖人無知見以知見用事或見己而遺人或舉一而廢百見一隅而遺其全見一時而遺萬世甚且名根利蔕滋其中執態褊行横其外無知見則内不見己外不見人如天之覆如地之載如日月代明四時錯行孟子達此故曰聖人與我同類者聖人先得我心之同然者耳乃所願則學孔子盖嘗流覽今古事功不同者學術不同也學術不同者學聖學賢不同也如真李先生教人曰寧學聖人毋寧學賢人有味乎其言之哉其臨終訓子弟曰人不可以知見用事嗟乎兹其學聖人之要也夫亦其學聖有得也夫余讀其集有深契焉乃題於末俟學者辨之書江汝修夢蓮巻人與蓮花無問安得不愛蓮人與元公更無間安得元公獨愛蓮舉世何人不賞花皆是不容自己與當年意思無别徒艶髙蹤於千古自不著察自不充滿耳元公常存蓮香不斷若謂隔越數百年不可面晤或謂可以寤對不可寐接抑謂夢中乍聚醒後如失俱有間之見也故曰孔子夢周是其真處總之無間無間之體因欲而掩欲盡乃露中既無梗相痛相憐江漢秋陽推而遜之不得皜皜前無歇地孔子大聖江漢濯秋陽暴吾儕末學大海滌塵烈焰鍜滓可也欲根欲蔓庶其可盪用愛宏尚友遠寤寐通矣汝修夢蓮南臯先生題以無欲真宗且以江漢秋陽為孔門心法謬付數語請質焉大槩寤時誰不分明於寐時想汝修不但夢竒也書知非語絳李子命其所著曰知非語伯玉五十知非淵明亦曰覺今是而昨非顧是非何常之有由賜之所是顔閔之所非由賜之所非顔閔之所是夷惠之所是孔子之所非夷惠之所非孔子之所是君子孜孜進學月有異焉月之是非異也歲不同焉歲之是非不同也日新者日知其非也日日新者日日知非也日日知非者日日知也譬鏡之照未磨時一妍媸既磨時一妍媸磨之又磨又一妍媸書劉冲倩飲水攜雲巻水泠泠可飲雲靄靄可攜此意人多不識顧或水未當前雲未出岫而望望焉庶幾遇之是雲水之牽吾也水既飲水且逝矣雲既攜雲亦散矣猶依依口頰襟袖間是吾之牽雲水也雖然劉生所飲水今為畫中水所攜雲今為畫中雲妙乃是畫中原來著不得書存陰説浙劉生昔著問世狂言欲存陽也兹復為存陰説不欲抑陰之極也持以觀余余曰陽擬君子陰擬小人固有是言然一陰一陽總之天道不聞貴晝而賤夜何至軒陽而輊陰夫非盡人之徒與而陰之耶而小人之耶而姑存之而已耶均是人也同生於乾道則同為陽純陽無論昨非而今是則昨陰而今陽是非半則陰陽半縱百非一是亦五陰一陽可喜之復也誰其可菲聖主當陽羣賢夾日午天之下向榮足快抑陰豈其時乎且二氣絪緼洋洋無間日出而萬方俱晝日入而萬方俱夜若曰某地多陰某地多陽尤達天者之所不道然則雖無此説亦奚不存也書權書止觀語云權非聖人不能用而聖人亦不輕以權許人即學人可與立猶未遽與以權也何也水止成照學無止奚以觀無觀則㝠㝠奚以權是以難也昔賢以春秋為仲尼之權書權生於觀觀生於止通乎是可以誦此書矣潘生曽縉世業春秋錄其所得命曰權書止觀其知用心於止也乎止則觀觀則可與權雖然余嘗有言賢有止聖無止聖無觀故無止學未至於無止猶然未可與權也題薛文清公像文清先生臨終題詩云七十六年無一事此心惟覺性天通通字未完而絶先生學問所得在此生平讀書為此尚論先生之學者以此學先生者當如此書治病要語余曩閲絳藩東壁公所自撰墓誌銘服其達於生死賦小詩贊之比觀辛復元氏所為公傳更悉諸懿行復元向余言公晚年孳孳於學公之孫誠一奉公命從辛子遊能忘其貴而篤於道一氣鍾耶庭訓耶俱可窺矣誠一手公所著治病要語示余以仁義禮智信五字為基臚列十要而㕘以素問本草及諸家方訣為巻十二蓋壽天下之書也誠一曰吾祖初著此書計巻四十繼減為二十又繼減為十二此亦先正所稱目減而近於放下之旨矣世人能捐伎倆埒此者亦鮮即此是學即此是道冝其達於生死況以下區區世味烏能動乎吁嗟睎公者且從生死以下勿動書濟世靈樞宗侯東壁公既以醫聲於時全活無量厥孫誠一復纉其傳有抱疴望拯者晰如洞垣余及家人輩或失調攝延之治療刻期奏效以所著濟世靈樞觀余悉醫道肯綮將以公之世躋萬方壽域也念不忘世世期於濟此學道有得匪僅僅攻醫術者比盖其學直探大本是以宇宙同視也學局皮膚者雖亦斤斤而潜伏冷念不自覺知學徹神髓藩籬乃破疾痛相關矣又嘗纂前人既效之方成帙曰肘後祕方既以公世何以云秘前人之之鄭重而祕藏者也何祕乎遇則傳不遇則不傳也遇而傳言言濟世之資不遇而傳輕則耳畔之飄風甚則明珠之投暗矣吁此所以遇合之難而世之罕覩其濟也書自渡語自渡語誠一自題其語也渡曰自非人之所能與也未渡而望洋自望也不克渡而溺自溺也既渡而登岸自登也師不能得之徒父不能得之子天亦不能得之人或不知在溺甚且安其溺長年憐之大聲疾呼聽之漠然甚且怫然將如之何故渡者自渡也雖然未渡之先一自而已既渡之後無非自者無不渡故禹急已溺之思伊切内溝之耻完其自渡而已矣仰節堂集巻三
