body:
  text: 仰節堂集巻十三明曹于汴撰五言律詩㑹胡慕東掌科於泓芝驛匹馬綿山道相逢似夢柯光儀昔若此世事今如何不盡班荆意聊占補衮歌郵亭倘予憶今夜宿烟坡清明嵗嵗清明日家家哭壟頭昔人一旦去存者千年憂野闇浮雲色田分澗水流九原如可作應更為予謀與北溪表弟十載還鄉曲青山竹樹饒旦評新得客花老舊分條未許嗔濃麗剛成慣寂寥珪璋張仲弟酬對肯連宵夀陳丈五十今是知天日天心果若何麒麟雲裏下貔虎座中多珮解青萍諾盃殘白雪歌燈前窺俠骨好去靖戎倭訪劉友不遇和其除夕韻嵗嵗除將去乃成千萬年渾淪不嵗改機竅幾人研世謂迎春後情殊守夜前子寅丑異建况味豈應遷和米山人除夕詩最是隂陽巧更翻作嵗華癡心剛被弄皺面為相加旅旅思鄉夢城城檢厯家林園猶濯濯誰㸔此中花夢逰河津遇蘇石水醒識其状甲辰四月十七夢裏逢知友憐予髭白生草茵相枕藉村釀若生平惜去馬鞍解傷時襟淚横龍門岡阜上乍醒使人驚乙巳七月再逰西園二首四野青猶昨重來病若加報君空諫草為母惜年華皓月邀臨榻紅塵懶過家休休還自適到處足烟霞其二遭逢亦已足胡不笑顔酡傑士時連袂逸情入放歌三生由命鑄四壁奈吾何强起加餐飯萱堂雙鬢皤劉定余先生園亭植杏以肖杏壇招飲花前貺詩扇賦謝四首何處園無杏何園杏不花一時成聖蹟千古艷竒葩爛漫尼山宅芬芳制府家行行來西郭如渉泗洙涯其二八九東蒙士傳燈祗一仁有懐窺孔室著意認王春生趣年年盛天心的的真此時無一酌那不負東君其三誰把春容鑄紅糚向曉開爾憐寜待語吾與勿須猜解佐犧罇興知經羯鼓催朱欄厪愛䕶不遣雨風摧其四宴罷七人起籃輿徧挿枝頓令鹺海塢恍歩上林時一色色無間衆香香更竒願憑風九萬布散滿天涯七言律詩和馮少墟先生勉學詩尋春莫待賞春時春色何縁過緑枝世路由來曽未險人情祗是自生癡合天為我方成我順帝不知乃是知大道見前憑認取相將良友叩明師平藩太宇宗侯遺詩步韻以謝二首百丈鯨鯢未戢鱗家家鼾睡大河濵關心獨有天潢客借箸能廽沙磧春四野燐交遼海卒千年淚落楚江臣孝陵王氣忻如昨且向月明理釣綸風動雲流鎮日閒非非寄向蠧魚間從無奇字煩揮麈覔得𤣥珠欲破顔臘盡便知氷是水巖居莫愛畫中山汾隂高士多精語何日青牛曉度關懐淮隂士民二首士庶雍雍佐郡時七年一調不嫌遲瘝官難補惟心折落日相催盡淚垂萬萬千千遮道左三三兩兩别京師於今赤子天涯外目斷長淮無限思兩考一官疾似梭成功為問竟如何従教去後心猶赤賸枉今畨鬢已皤未報主知顔汗赧難瞞我處淚滂沱攝行大治何人也到此令人感慨多步韻報盧茂才橋梓併致諸友二首斷梗飄飄倚日邉每逢貂使夜為年空勞青眼窺親舍幾向紅塵覔性天到底袖藏辭綬草也知囊乏買山錢丹心一片從來熱忍過西山酌冷泉濟濟冠紳集講堂言成鏗韻歩成芳主張潘氏教無類孝義盧家斐有章嵗若虚浮空髪短學無實地秪心長譚馮諸子吾知否夜夜心旌自北翔謁韓侯廟辟榖仙人蹤跡杳就烹國士血痕斑翔同孤鳯真竒絶淚灑千秋豈等閒誰向浮生能繋日未隨腐草便開顔徘徊相羡爾能死不死淮隂市井間志感有引海雲曰不求人知而求天知不求天知而求自知不求自知而求無知一峯曰保身所以盡忠也保身所以盡孝也善哉二君之言服之於膺詩以感之良朋終日鎮相隨何幸蓬心獲善辭纔道君親雙淚隕難將冷煖倩人知塵藩霧鎖單身出月窟春融一笑窺到得箇中全掃却這畨認取太初時村居薄薄村醪常滿甕採來野菜亦盈筐因躭月色眠高嶺為逐花隂移小牀每以避寒扃户牖未曽觸暑汗衣裳嵐光竟日相留戀不識人間有短長贈馮少墟先生西還得扉字壬戌冬仲名賢旬日再言歸我貴由來知自希楓陛黄麻需後召函關紫氣繞初衣斯文終古無加損國史千年有是非計到家山春咫尺繽紛囊笈滿程扉步韻謝别太宇賢藩二首三月河汾賸物華行行行到獻王家清江雲䕶龍眠穏碧漢風高鴈陣斜﨑路忘勞因旰食塵襟乍净有春茶光儀未許溪橋隔栁颭青枝梅放花牛耳詞壇孰與京留連端為遲行程幾年相憶雙魚赤一日躬逢四眼明錯落奚囊剛喜極咨嗟嫠緯却愁生全憑一醉澆離緒到向東人呼酒觥龍逄塚下馬高墳淚欲零忍聞忠藎被嚴刑秋風慘慘天為老夏厯茫茫骨尚馨一死猶期成主悟九州豈意共身傾英魂彷彿來相囑莫道吾王不聖明魏豹城野老溪邉説魏侯荒原曽此樹瓊樓秦王殿上珠光照薄后宫中貴氣収故壘惟聞殘鏃出遺溝猶自淡烟浮興亡千古堪憑弔何事蜂衙喧未休贈别徐明衡天部以請贈薛西原先生得謫南州高士出皇都隂雨三旬滙若湖一旦銓郎辭墨綬滿朝臺諫伏青蒲爾懐聖主恩猶渥衆羡西原徳不孤再弼盛明他日事眼前吾道在匡廬和吕豫石天部儆學詩十首睿思講罷講何思請更參詳率性時膝下瞻依寧俟慮井邉怵惕那容遲也知研究堪窮髓絶勝踈浮但撩皮祗是不思原聖脉入門争可讓些兒等閒莫把意為心纔説尋心無可尋固在一腔難問際雖然萬備不容針匪憑軸在空輪飾覔得丹來徧地金千古齋心顔氏子聰明黜盡只潜沉古徳相傳只此明十分明是十分行憒昏决事終成暝想像為知僅是名明照應須莫浪指躬行切忌不完成醒來幻夢一齊歇若個為明若個誠身外逰絲總贅疣營營何事不如休可憐暇日翻成擾却把直腸硬作鈎甘飲自捐著屐血錦衣人笑頂冠猴原來至足屬吾道塵網牽人可盡勾勿用區區嘆徳孤茫茫寜匪盡人夫試詢乾父皆男也可道街氓不聖乎有我一堂分肺腑同人千聖㸃頭顱陽和未到氷難解願挈良朋共勉圖世上何人號最貧裹装七尺小為人旁聯六合斯真體貫徹千秋是大身纔割禽魚便是痿不疼荒徼豈名仁只休封閉如蝸縮縱有高談未許真眼前突兀聳尼山終日徘徊盍去攀起念便分生死介是誰能立獸人間殷殷防錯常詢路戰戰臨深為過關老我流光增鄭重中宵耿耿未能閒吾性原従未有孩五常百行甫成才太初太始須㕘也一欲一為可漫哉身濯江流纔是潔眼迷跬步未云開曽觀鄉黨十篇否檢㸃衣裳飲饌來莫訝崇高聖與神為神為聖甫為人希天即在希賢日由義難於行義循灑掃曾聞神所入心精即是聖之真果然此道一而已孟氏當年既示津每詫儒紳見有邉得詩深喜已窺全明幽合貫方成世費隠都融可論天進學還須獨有得殢人每以故相傳元公試向詢無極不語只消抺去圏仰節堂集巻十三
