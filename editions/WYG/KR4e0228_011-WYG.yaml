body:
  text: 仰節堂集巻十一明曹于汴撰約言明學㑹約世之不治道之不明也道之不明學之不明也謂學止于誦讀者非謂學外于誦讀者非謂峩冠博袖便是學人非學何可不明㢤學明則道明人之所以為人世之所以為世也曾之于徳思之于善俱先于明可繹也余不敏藉諸友興㑹明學冀匡不逮而為之儀注毎月初四十九辰刻赴㑹所候齊至先師像前四拜一躬分班對揖端坐澄心随意質論或道域若何登進或習疚若何懲艾或聖賢某語覺體騐未能符合或日用某事覺處置未能停當諸如此類互問互剖總不越于自身若所講未投氣平意藹且待熟思需以異日或沉黙半晌或雅歌鳴琴涵養靈明漸収長益㑹畢仍向先師一揖一躬揖讓而别爰列數條用期共守一尚實天道人道不踰一誠徒侈講學之名不務躬行之實欺人乎欺已乎欺天乎焉用羣居枉勞唇􅝉其必實踐闇修徙義改過期言行之相顧勿假偽之遺羞一立夲士君子有弗學學則直透根宗了徹心性若水之由源而沛流若木之由夲而達枝不為補凑之計而為樞軸之運悠然順適詎不輕快唐虞執中孔致中當是斯意其亟圖之一廣量為天所生便當肖天為聖之徒便當法聖小成小就大人弗為故孟氏不由夷惠直承洙泗辟之于射必有正鵠射不望鵠藝何由精是在立志何如耳然聖實非髙勿同俗眼學久自知一謹庸道不在逺家常茶飯皆是也依庸為聖盡倫為至胡可忽諸尚于子臣弟友冠婚䘮祭取子約樂語黙進退範之規矩若尋常倫物漫不毖飭而談髙説妙如腹無盂餐口誦珍錯何關饑飽一虚受虚為夲體一物不着奚所不茹文望未見孔云何有何况承學成心成見掃盪勿留衆善因而外來天光亦且内啟若堅持邊辭分别門户躱避字様縂之障蔽是謂自封非進機也一主静静非静地静時之謂静地静時易于求静固所須也然必應時習存動中習定終日紛紜酬接而凝然者不動則我常御物物不撓我焉徃不宜一適用孔門弟子頻頻問政故論士則不辱君命而不達于政者無取誦詩近世名賢亦曰做秀才時以天下為己任今時制科亦有䇿論經世之具胡可不講稽古籌今豫圖于知爾之前斯體用合一之學也一有成農夫耕作覬于収穫耕而無穫何取胼胝業既有初猛力精進綿宻不斷期學之成倘或進鋭退速或間作間輟遷于異物廢于半塗校諸未學之人更是可惜彼原未有所獲此則㡬獲重寳而失之也其慎旃㢤志道書院約言不佞司理淮隂叨署府篆請于督撫褚公愛所先生建書院一所于府學之東以居諸士而肄之業公批允且發百金為工助比成擬二名以請曰學孔曰志道公命用志道遂題以志道書院而顔其堂曰學孔堂後堂曰慎獨號舍十區為明新格致誠正修齊治平右有方池池中有亭曰日新左為射圃右坊曰興文由亭以達者左坊曰觀徳以達射圃者夫志道者志大學之道也大學之道明徳新民格致誠正修齊治平之道也斯道也孔子之道也士何可無此志志斯學矣其要只在慎獨夫志道據徳依仁游藝一時俱在道藝匪二何况徳仁當下即是沒齒無容斁孔子十五志學七十不厭故曰發憤不知老故君子持其志終身焉弗畔于道乃述命名之意以為記即以與諸士約科條具是矣叙安定祠㑹約不佞既為祠祀安定胡先生因商諸譚生大禮馮生世明集諸生於其中歸依大儒以講聖人之學命大禮為㑹約而不佞申言於首夫諸生講學之㑹立自今日然則未㑹之先諸生果不在聖學中而不佞反黒為白變石為玉前後頓異乎曰非然也諸生日日行聖學日日習聖學㑹之有講特欲其著且察耳諸生當清明之時無心應事其和平公正與孔子分量不减分毫第其蹔吐萌芽隨被摧折遂不能叅天合抱矣然謂叅天合抱為木而萌芽非木則非也今日之㑹所以養萌芽而叅天完其為木而已矣顧培壅灌溉種木者可以用力乃其中盎然生意雖甚工巧者安能益之故學問之道唯諸生深造以自得之非人之所能為也嗟乎風流波蕩人懐我心貪名嗜利之習膠固而不可解有能割難舍之欲任聖道之大使民命永存乾坤不毁非天下之大勇将誰望焉諸生勉之節孝祠㑹約序徐仲車先生以孝子顯於宋迨今數百餘年其風不冺淮之人士多以孝子稱者不佞建先生祠於其里諸孝子徘徊祠下益蒸蒸思奮焉惟其有之是以親切若此也乃命盧生守恭鮑生越輩立㑹定約聚諸人士講孝而為之序曰人子之身生於父母如草木之枝業生於根夲愛其枝葉而傷其根夲則枝葉枯矣尚得為愛乎故人苟愛其身則必愛其親矣然自頂至踵皆父母精血所遺也故子身即親身而愛其親者則必愛其身矣昔之言孝者曰身體髪膚受之父母不敢毁傷曽子有疾啟手啟足以免於毁傷為幸然所謂毁傷者非止於殘壊之謂一舉手而悖於理傷其所受之手矣一舉足而悖於理傷其所受之足矣由斯以推目視非禮之色傷所受之目矣耳聽非禮之聲傷所受之耳矣口出非禮之言傷所受之口矣心懐非禮之念傷所受之心矣故曰戰戰兢兢如臨深淵如履薄氷言守身若斯之難也故曰不失其身而能事其親者有矣未有失其身而能事其親者也故曰舜其大孝也與徳為聖人然則無聖人之徳者其為孝也小矣故三皇以孝皇五帝以孝帝三王以孝王伊尹周公以孝相孔子以孝師君子以孝别於小人人類以孝别於禽獸可漫視乎㢤或曰論孝及於聖人孝之至矣㑹中多市㕓之民豈易能乎是不然聖人之孝特赤子之孝耳赤子孕於母腹母呼亦呼母吸亦吸愛之始也出胎未有不啼者其愛違也得母未有不安者其愛得也是故匪愛以言匪愛以知精所注也氣所貫也神所凝也不可得而名也是造化之靈機也冲融而無參雜圓滿而無滲漏故曰仁也仁者草木之子種也子種有仁則千花萬葉千荄萬株生生不窮人心有仁則盡人盡物盡天盡地亦生生不窮故曰大人者不失其赤子之心者也大舜五十而慕不失其赤子之慕而已矣爾諸士民㑹講之時潜心黙思誰不嘗為赤子誰不原有愛父母之真心昔何以愛今何以不愛昔何以愛之真今何以不真無乃知識開血氣動應接繁視聽亂妻情子念膠其中流俗滛朋薫其外遂至失其故態耳由是憬然悟躍然興銷其邪心還其真心守其身以愛其親如赤子之初而止斯為至孝矣斯善學聖人者矣文昌閣㑹約序舉業之制初塲試以經書義二塲三塲試以論䇿等篇令士子研究經書體驗於身心誦明徳則自明誦時習則自習誦仁義則自仁自義誦易則乾乾誦詩則無邪誦書則執中誦春秋則正心誦禮記則母不敬由是發之於文以聖賢之肺肝效聖賢之口􅝉必親切而有味而又觀其後塲論事論理條荅判斷可以窺學識之優深世務之練習即如䇿守令則必如何清如何慎如何勤如何生養如何教化考古證今確有成筭授之以政舉而措之耳一切欵項莫不皆然兹顧不可得士㢤無奈假舉業之多也口堯而心跖記套以干時科名滿世界善治不多睹而理學之士遂厭舉業則以假者之取厭非舉業之尤也嗟乎鄉學太學尚非理學之所乎講孔講孟尚非講學之事乎業舉而不知理學是秉耒畎畆而謂農家别有一流也惑之甚矣夫野逸不知學僅遺議於郷里衿士不知學将流禍於邦家何也典制既不可廢薦徵又難常得他日析圭從政終在渠輩若不廻心嚮道世事何所底止生靈何所依頼故君子於此尤殷殷屬望焉董生偕其諸友㑹文於文昌閣有約有序大槩明舉業理學之一貫余為申之若此語不云乎以文㑹友以友輔仁仁者仁其身以仁天下也誠知輔仁㑹文何碍不知輔仁㑹文何用文與仁有二乎㢤講書約言余不佞佔畢垂老于道罔窺諸賢不以為暗昧而相與闡孔孟諸聖賢之㫖若将代諸聖賢洩其胸臆者心口擬議之間或庻一睹其藩藉書藉講自開自印睠三益之在列覬大業之堪臻古人久約不忘今可覿面無語聊著數條于左卑之無甚髙論亦不多及貴在實行耳一遇㑹日各宜早赴揖讓序長㓜而坐或持論前次所講或随便商確徳誼肅候人齊開講相剖相長以求至當講完仍揖讓序長㓜而散荘敬雍藹即此是學校之聽講更為得力一記誦剿襲非不燃燈午夜汲汲窮年然身心無所享用精力徒成耗憊何如實研理趣直探夲根開我靈明劃然透悟發為文藝真切痛快自是出人頭地至于時務邊防河道農桑學校之類或稽簡籍或詢前輩確有成算可裨寔用異日經世舉而措之力省益宏豈不得㢤舉業初制原是如此乃或謂舉業與理學為二其説悮矣但舉業自有真耳真者逸假者勞真者樂假者苦真者大假者小真者樹立偉假者樹立卑真者百發百中縱不得中亦不湮沒假者有中有不中若不中便将冺冺一燕居獨處斂氣歸寂凝神學止務令寧一不致浮游此存養入門第一義上下古今歩趨賢聖摹古人之氣象以範我之氣象想古人之心事以檢我心事聖性人人具足雲開天逺玅道不離目前至淺至奥志堅氣鼓一日千秋塵世榮枯不足當其一瞬奈之何終此身而可不一嘗味也一聖賢垂訓如路之有程率而行之方能逺到束身入道大端有四一曰孝孝為百行之首愛木者誰不培根愛身者豈可忘夲劬勞恩重捐軀難酬急圖順事勿貽後悔二曰義義為根躬之矩取與行止節操凜然勿逐營營致有㸃汚三曰儉服食用度寧朴勿華華則童心朴則髙雅保徳保福胥由之是四曰讓人世百年電光石火小忿小利讓彼何妨君子不争所就者大以上數欵倘不佞有所違悖願諸賢不吝直言俾得省改仍望互相規勸一道同風良㑹難逢惟無辜負鷹揚㑹約竊睹倭警漸棘戎事方殷必将得其人而後兵可精而将品寥寥識者憂之淮城指揮千百户武舉武生應襲不下百人其中多矯健而有力者聰頴而有才智者端良而有行者特以積習相沿或役於奔走或甘于紈袴其不讀韜畧不諳弓馬者盖亦多矣乃請于督撫褚公興起武㑹備幣張筵請在籍都閫周君尺為㑹主以見任坐營都司及内中軍等為㑹賔仍設㑹紀㑹贊㑹掌羣官生于韓淮隂祠為㑹所訂期習武量行資給稽核奨薦冀人人賈勇干城有賴爰議科條如左一定志語云心堅石亦穿故志之所至氣必至焉古之名将豈有種乎亦為之而已矣方今邊海多事廟堂之上拊髀思賢機不可失願諸官生立定志向有始有終勿為虚應勿事委靡但稍稍自謂不能是自弃也一虚心語云謙受益故海納百川斯成其大凡一人有一人智識若合十百人之智識于一巳豈不大智乎願諸官生恭以事師和以處友勿諱已短勿忌人長凡所論議黙存勿忘智慧自生臨事無窒矣一砥行夫文武二途原自不逺而今将權似落事多掣肘或亦有所致之也願諸官生敦尚端亷愛惜名節勿泥積習勿貪小利務令青天白日上下相信夫上信我則可以展布無牽制矣下信我則號令行無違抗矣功業不成者未之有也一勤業夫業精于勤故曰惟勤有功夫博奕可度時光而騎射亦可度時光閒談亦談而談兵亦談究其成就不啻天淵願諸官生鼔動精神從事夲業不但功成名立為竒男子且匡輔國家是忠也光及祖宗是孝也何憚而不為乎一省心嘗觀南塘論将先于心術盖凡人之邪謬敗度由于情欲溺之習俗染之失其夲心也若于清夜之際常加㸃檢必有悚然不自安者乗是一念因而奮發便知此身為頂天履地之身必不甘于荒淫頽廢事事合于道義乃為豪傑之士矣一相成夫两澤相依其水不涸故良友相資不至于敗今大衆同集此豈偶然所賴規勸切磋共致逺大良非眇小願諸官生同心同徳若有怠玩不法婉辭以導之有負氣不協盡心以解之有小嫌則容之庻此㑹其永永乎夫大将者聨千萬人為一人方可以制勝若一㑹之中而不相成就何取于㑹乎仰節堂集巻十一
