body:
  text: 仰節堂集卷八明曹于汴撰尺牘與鄒南臯先生今之學人何多岐也分析門户回避字樣昔辨朱陸業既無謂今别薛王亦似不必提起空無等字不論是非輒云此禪此禪禪者曰我不儒安用禪為儒者曰我不禪儒若斯已乎邇言至善何必吹疵妙論市童吾師安可彈駁先賢見門户見知解亦必見我而不覺也遂令同世同生有許多不欲見之人不欲見之事不欲見之書不欲窮之理未免狹而不廣偏而不全滯而不透支而不根是以畛域多情懷淡戈矛起同室且爾况能彼人吾人禽命吾命草生吾生乎哉然不能彼人吾人禽命吾命草生吾生必不能同室相愛非不愛也不能滿也我塞乎中其餘能幾于今不攘且安乎彼人吾人而愛吾人者無所不用其極矣攘之安之亦無所不用其極矣辟彼流水原頭之濬支𣲖之防必有分四海之放必有由也可僅曰彼猖狂自恣決去藩籬吾但固我藩籬而已安問藩籬外事然吾儒藩籬不與天同大哉何可懲噎而廢食也某於道無窺私心竊疑敢質之老先生乞明顯開示仍示進學入道之方可勝冒昧引望之至答李贊宇楊止庵之疏厭士人之宗羅近溪而深闢佛老以維吾儒甚嘉意也近溪之學亦有所得而不無壙洋其徒宗其所得足矣而并譽其所失以為是則誤矣止庵摘其失而不録其得則其徒將不服大抵理一而已矣而異者異之老異於佛佛異於老佛老異于儒而儒之中有蒼素雲泥不同者惟善學則視市井小兒之言與孔子合符何論二氏第有詫異其行泥滯其辭談無相而反有其相甚至削髮面壁合掌者謂色即空而又欲離一切色甚至絶棄名教離父母親戚者其流多弊則彼固自異矣亦安得不異之夫反之心而然推之千萬人之心而同然不問其出於何氏無不可為訓者反之心而不然推之千萬人之心而不然亦不問其出于何氏無可為訓者若絶棄名教無禮樂綱常此則吾之心不然人之心亦不然空于渣滓邪穢而不空于綱常倫理此必人己之心皆然者學者可知所從事矣疏內尚行尚言之分及謂不當任情執見賄賂干請黨同伐異則確然之論世教所賴不淺使者催報卒卒答附以復惟年兄高見邃詣自有定論幸乞指教又答李贊字夫道無之非是無人弗足講學以明道也士農工賈皆學道之人漁牧耕讀皆學道之事隆古無講學之名其人皆學故無名也國家以文學取士天下學校無慮千百章縫之士無慮萬億蓋令其日講所謂時習所謂孝弟所謂性命仁義而以淑其身待天下之用也乃人心不古遂有口耳活套掇拾粉飾以為出身之媒師以是教上以是取恬不為異非其質矣而于立身行政毫無干涉于是君子厭薄其所為而聚徒講道人遂以道學目之若以為另是一種豈不惑哉然講學之中亦或有言然而行不然而藉是以干貴人捷仕徑者而其名為道學也是有口耳活套之實而更美其名人誰能甘之則羣起而相攻而講者益寡道益晦矣大抵所學出於實則必暗然自修不論大節細行一一不肻放過雖力量不同未必盡無疵而不自文以誤人也所學出於名則有張大其門面而于其生平未純處亦曲為言説而謂其為道夫夷之隘不害其清惠之不恭不害其和然亦何必曰此隘此不恭正道之所在而陋孔子于下風乎羅近溪逢人問道透徹心體豈不可尚而闊略處亦誠其病乃學者得其闊略以為可便其私也而或多不羈誠有如止庵疏所謂賄賂干請任情執見等説是其坐女子于懷而亂之而猶侈然薄魯男子不為也而可乎但今因止庵之疏而遂禁其講是因噎廢食夫此學乃乾坤所由不毁何可一日廢也似更當推廣而俾千百學校億萬章縫無不講以及農工商賈無不講才是而其機則自上鼓之若得復辟召之典羅致四方道學倣程子學校之議布之天下以主道教於一切鄉學社學之衆漸次開發而申飭有位之士以興學明道為先圖其學則以躬行實踐為主隨其人之根基引之入道或直與天通或以人合天或直臻悟境或以修求悟夫天人合一修悟非二舍天而言人舍悟而言修則淺矣近時學者知皆及此然言天矣而人尚未盡言悟矣而修且未能世豈有能致中而不能致和能正心而不能修身者哉則不可不戒也大抵果能合天則必益盡其人事果能真悟則必益盡其真修堯舜文王孔子何人也而兢兢業業望道未見徙義改過蓋沒齒以之也弟淺陋不能窺道毫毛其於所謂人所謂修百孔千瘡故謬陳如此蓋就弟根基云爾非所論大識見大造詣者也惟年兄辱教之萬幸萬幸答盧生守恭遠承手教深感相念不忘也細讀佳詩更窺研究之力恨不得會聚商之生慮淺昧無以相發明乃以原札致諸馮慕岡年兄蒙其往復訂正今俱録奉閲幸與同志裁思仍牖我之愚也祝祝慕岡第一書并詩云讀盧生三教詩有感而賦曾向三家遍問津一源分𣲖若燕秦到頭誰復論同異發軔先須識主賔好為商王嗟故國何妨周室數頑民千花共樹慿君賞李放桃枝豈是真盧生諸什具見雅志但三家宗同教異學者自孔門入則經世有用自仙釋入恐未得其精先得其脫略故當辨之佛書云桃樹上不開李花安有混為一之理然誦帖括學干祿孔氏之異端也又不若二氏近理矣學孔惟明明德於天下自有終身不能盡者今俗學未見孔面無惑乎雜二氏也二氏好處乃孔家明德半面耳但識主賔不妨博採惟老公祖教之不類答書云細玩主賔之説足為指南不致眩他岐矣但此當逺寄盧生尚有可剖析者桃樹不開李花是矣然由老之虛由佛之無不可經世乎夫惟其為桃故不能李吾不為桃為李何花不開孔子者非桃非李者也楊子為我故不兼愛墨子兼愛故不為我豈知能愛者方為為我能為我方為真愛彼其有所舉有所廢耳俗學未見孔面信然信然顧崇梵修以僥福利藉清空以排俗情侈高逺以便踈縱此豈見佛面老面者耶破鏡非鏡明德有半面乎文成公曰三教所差毫髮耳毫髮則千里也其差安在惟年兄指示弟與盧生共賴發蒙不盡慕岡第二書云辱教甚深殊用惕然思省昨詩及啓殊草草不暢謹述近日意見台臺細斧正之或問老佛虛無與吾儒同異王龍溪曰文成公有言老氏説到虛聖人豈得於虛上加得一毫實佛氏説到無聖人豈能於無上加得一毫有老氏從養生上來佛氏從出離生死上來却在本體上加了些子意思便不是他虛無的本色吾人今日未用屑屑在二氏身分上辨别同異先須理會吾儒本宗明白二氏毫釐始可得而辨耳京思從養生來者乃老氏恐人不向道始借長生引人即道家規中指南序亦曰示人回光返照一法耳出離輪回亦佛引人向道之意至虛無本色老佛却得之深原未嘗加了些子意思此與孔子原自無别即陽明此段議論猶是救學者非出本心祕語語因人變化各有當也陽明所得全自六祖來彼看到源頭處原無毫釐之差然如此説者為學佛老而念頭少差者言非正指厥教主而言也如此則京可無説於盧生矣京所爭者不在三家之心宗而在三家之教門吕東萊曰吾儒未嘗言空而空行乎其中空行乎其中乃心宗之同也未嘗言空乃教門之異也孔子曰中人以上可以語上以下則不可佛老専語上者也孔子不為也天下惟中人最多中人之學每每不得其精微先得其形似且就中人所得之形似較之學佛老者先謝事逺塵矣學孔子者先謹九容明五倫矣謝事遠塵之人君親不得其奔走之力而九容謹五倫明即次賢拘格式下士假名義猶有勞於君親有利於民物也惟上智之士或由一而貫萬或自博而趨約千溪萬徑皆可適國不見孔教之為獨優二氏之為獨偏然上智世不一二即王龍溪在陽明弟子中最稱利根受圓通之教之益而不無圓通之害向使束於孔教致謹乎禮所成就當不止此而後學觀化當不至侈高逺以便疏縱如今日諸士所為也自佛入中國有竹林諸賢以蕩晉室有梁武宋徽諸君以蕩列朝五帝三王制禮作樂以範圍天下之法一切解脫至於今禮壞樂崩古禮不復古樂不作其害不可勝嘆佛氏有三千威儀八萬細行豈其不才如此惟彼西畨原無中國文物學者一入其教不覺與之俱化假有童子於此教之曰手容恭足容重目容端頭容直彼立乎吾前儼然正人矣教之曰冬溫夏凊昏定晨省彼承事親側藹然孝子矣孔子之教豈不萬萬賢於佛老哉京所爭者入門之塗而已且如今乾坤何等時哉其下者瘠百姓以肥已是三教之罪人矣其賢者或拘孔子格式則夙夜在公履繩蹈矩省察克治此禪家不以為上乘而實社稷之柱石也或入佛老窠臼則通晝夜而惺惺齊人我而平等非不光明廣大然問之以朝廷之典章多所未諳問之以將吏之臧否多所未究隨波逐流認為無礙愛國勤民認為有著即千嵗不化於國何益哉此皆從末流受敝之輕重以較最初立教之優劣寧為孔不為二氏也莊子笑孔子取已陳芻狗教天下此正孔子苦心立教處故曰民可使由之不可使知之不可者非不能也早使之知恐彼猖狂自恣矣子夏教人灑掃應對正下學上達法門種桃而桃種李而李不為桃不為李而無所不可為所謂有始有卒者其惟聖人乎聖人則忘言匪直不言同異矣望老公祖批駁數次開京恍惚之見示之至當之論幸甚不類答書云承教詳論三氏宗同教異并二氏流弊及儒教之益自是確論但教生於宗者也宗同矣而教何以異文成謂毫髮之差固為學者然既謂之差亦豈無説夫孔子根枝全樹而二氏據其根者也孔子出世以經世而二氏出世者也枝不在根之外經世不在出世之外安得謂之差然根也而無枝出世也而無經世安得無差三教之説不知起自何人夫道語其異不啻千萬故孔子之門自分四科何止於三語其同亦一而已矣故途人之言無異孔子何得有三教而至於三也吾儒之罪也譬彼文武原非兩途兩途之分也文官之罪也又譬之漢高御宇一統中華昭烈偏安乃成鼎足夫論語二十篇言言仁命而記者曰罕言此言出而根與枝出世與經世始分矣夫道家長生而吾儒豈愛速死佛家出生死而吾儒豈宜沾滯避禪者如主翁私財自棄各房之物不敢道一空字溺禪者又若蕩子出逃仇視故土不肯道一實字俱執一之害也子夏教門人灑掃應對本自不差但下學上達孔子一口全道而小子聖人商費分别子遊能不疑乎竊謂真老真佛生於今日果行其教自當不外於吾儒彼不可以可道可名自偏以空而不色自偏也真孔子生於今日必謹容明倫亦必一切解脫所謂大莫載小莫破庸德庸行無聲無臭一以貫之也以此為宗以此為教何如夫宗二氏者其心何心也合三教者其心亦何心也不可不察也夷之合墨儒而孟子亦不許則三教可易言合哉此尚望年兄細教以裨益生與盧生也慕岡第三書云來教云真老真佛生於今日果行其教自當不外於吾儒真孔子生於今日必謹容明倫亦必一切解脫教而至於三也吾儒之罪也斯至言矣無容復贅敬謝教惟日體認之而已不類答書云昨侈口而談覬年兄砭正之也承諭甚愧夫論上見上容易墮落人故實體之為難體認二字敬佩謝并望督誨不一與談生大禮等兩會惟天下治亂係之風俗風俗美惡係之教化風俗不教不善教化不講不行故不佞每懷教士民而不能也幸多賢之識明足以明此教志定足以永此教心仁足以廣此教乃得興起雅會一講先聖之學而就中啓發不佞者實多且巨能不感乎仍望終相匡扶俾不隕墜則厚幸矣前時承同節手翰謂致書梁盛陽辨共發編語呵呵陽明之良知甘泉之體認大君子之言世之辨者尚未息喙我輩區區曾不出先賢之唾棄乃至相辨耶令大方聞之當絶倒矣再勿乃爾又致疑於看喜怒哀樂未發氣象謂看未發之氣象於已發此以事證心之意所見亦是然所謂看未發者原非分為兩截事第令人考其源頭耳得其源頭豈與支流為二乎即如未發本無喜本無怒而有所喜怒也何為故有所非和即非中也無心為中乃為和也心不可以有無言則未發已發自非兩氣象但求之已發不如求之於未發為得其要領也且其語氣原自明顯曰未發之謂中看未發作何氣象欲人識得中而已矣近不佞對李松廳座師論靜書語頗類此今録商之李座師來書云學問落腳工夫自止靜中得之先儒所謂看未發時氣象與靜中養出端倪者似落第二義不佞報書云夫靜者萬化之根也終日視而目常靜終日言而口常靜乾行不息而天常靜酬酢萬變而心常靜是即中庸所謂中孔子所以無意必固我孟子所以不動心率是物也周子得之故曰聖人主靜靜之一語豈啻落腳工夫究竟當不越此延平白沙所謂靜中則以時言非靜根之靜也然所謂觀未發氣象者亦謂中之體靜本無喜怒本無哀樂故雖終日喜怒哀樂而不以我是謂動不離靜和不離中則未發已發豈二氣象哉所謂養出端倪者亦謂收攝精神靜根萌見乃可以披露全體復還大始顧端倪全體自非兩截也二儒之説似因擾擾塵喧者心常紛亂故令其靜中體認本真耳云云同節尚與諸賢裁思當有以教我會中近時人數及有無進益俱寄字以慰懸望諸友一一道意并致秦州王子不盡復賈泰巖前承老年丈大教俱近裡著已之談年來僅聞此耳謹拜謝弟竊睹講學者研注腳之纎毫辨門户之同異高入無際深入無極語竟日不了及對景實行又大謬不然者竊惑之噤不敢發聲承老年丈教言乃知道學自有在也弟亦竊謂學不在高遠即若論語中自頭一句起但行得一句生平之事畢矣又不然俱任心以行心所羞耻者不為生平之事畢矣老年丈以為然否弟為有司日貿貿風塵中尚有可羞可耻之事或忍心為之假若查盤處或據人虛文以了前件又或奉上司命令那移日月實憧憧不寧不知老年丈當此作何如處將徑情直行毫不假借耶抑委曲遷就以為此小節不足拘泥耶夫枉尺直尋亦委曲之流弊耳一字不實將不謂之枉其心乎幸惟老年丈賜教顧年兄過淮命弟致書老年丈附言請教惟垂示不一復馮慕岡湖廣用武之地西連蜀畨多土司北連河陜多遊民東並江西有陳友諒之遺孽有鄱陽湖之羣盜中原有事此亦喫緊處也年兄分巡則當逐地巡行考察官吏上城操練與按臺一體江北惟帶溪曲公如此弟以為得體然必奬率府州縣實心為民事事修舉僅巡行以考其成而已則學校倉庾阡陌孤貧鄉約無不在所巡之中然跟隨官吏人食二雞子百姓亦將椎骨故省事之為急也嘗謂古人省事今人多事古天子巡狩今按臺不能遍巡則亦民之苦繁苛也弟愚不能裨益遵原劄登答於後外具興革録二册奉覽此有司事與風憲不同然有司一切收放買辦挂搭濫稅殘害之弊略載一二亦所當知而類推也諸容面悉事上有依阿者有徑情者依阿者固不足論其徑情亦無以濟事必也正而和直而敬其庶乎接下有崖岸者情意不通有扶同者法紀不肅有辭怨辭難而俾下官任之者有炎涼其態而俾鄉貢奪氣者有囁嚅含糊而俾人揣摩者俱積習之害也則正大光明方嚴真懇而已矣其吏快各役則最難以息其姦聞其良則亦不假以權不慿其言文書經目事干陵人賣法者必罪已耳練兵兵無實數士無實藝操無實益非旦夕矣必以漸整刷之設法點查間取比試弟曾於操畢收營之際人給一帖遂查出空名數百又嘗於過堂之時忽試數人遂得其不能之實又嘗欲令衆兵出城百十里演埋伏及丘陵水澤之陳若常如此庶可一變然激勵將官則其本也隆其體貌不折辱之嚴其法令不姑息之製器修城製器價多則委官尅落少則器不精然雖少亦尅修城亦然俱委官大利益也嘗見費銀萬千毫不足藉則亦不躬不親不如其家事可恨之甚儻貶其威重親臨省試當不至此至於收藏弓矢堆積濕地刀銃鐵蝕不加揩磨纍沙泥以增濠沙墜而濠復平城垣小壞不修久乃大估十金買馬忽稱老瘦變價不及一二金有實政者自不如是弭盜民飢寒乃為盜此不俟論然使縣捕官巡其一縣府捕官總巡之盜何從生今則捕官不出庭户兵壯高卧其家盜之縱橫何怪其然江北河下弟曾具哨船設兵巡邏鼓炮相聞惜乎其無實行也保甲之法甚善然非良有司行之亦祗增一畨擾耳至於囹圄近亦弛玩不可不謹也息訟刁民之誣告也明知其不能直特欲牽害耳若被告不至於害彼何利而為之其被告之害則追呼之擾也婦女之出也嵗月之延也貪汚之取也其良有司自不至此弟常不問人罪人亦少告狀久則狀辭不文問之其訟師行矣誣告必反坐此正條也然準狀既多則不勝其反故少準之為優也大抵教行則訟夫愧為人上之責也賢否賢否最不易知勢必假於人此人非賢者不肯言其言亦不實則識拔賢者開誠以問之可也大抵有司之才能一露於言動再露於辭詳吾再或背審告狀等人以探之詢於有行之鄉紳參諸各官之評揭亦自有難掩者然知之不若教之其教之法則善言勉諭設法查考使之不肯為惡不敢為惡可也楮愛老以辭詳觀有司劉晉老雖小官必與言俱可法也復蘇弼垣承命開赴任太守事宜謹據見聞謬列上呈惟年丈裁奪一同僚差人下書迎接發回書有禮則收之一州縣差人迎接送禮其禮發回不收或發一回帖加副啓或以無大封筒但發批若有順人發一票免接免送禮更便其舊規應用夫馬不在此論一接到人夫酌量留者留先發者先發命吏房開一切見上接下待士夫各儀注仍須審問慮其或不確也一入境即係屬縣亦不行香講書以未到任也其縣官既見過免其赴府參謁一凡將見境內一切院道部將領等衙門俱細問舊規一到任畢即命逺來州縣回免其伺候行香仍分付勵精相成省約相諒之意或仍令候行香亦可一開示門牌查取舊案參以意見及曉諭屬官吏書及下民等告示斟酌行之其馬票另刻一一切賀禮不收其同僚公下程收之其贄禮酌換答之一初政寧緩勿急寧細勿疏一遇左右以嚴肅為主一清查未完以後時時留意總置一簿一投上司公文必過目雖下程等項亦間一視一待同僚屬吏不論科貢俱一律一革弊以漸一清免一切繁事勿以事小而忽之辟如投結狀之類何益一衙門令嚴靜其倉庫牢獄養濟院等有關係者俱一閲一士夫投書囑託勿曲徇勿峻絶一非甚緊急不差人下州縣一優禮過客一一切以便民為主初到必多勸化懇惻言語亦間行威嚴一一切以速為貴其匆忙旁午之中留心防欺一屬官於言動得其近似公移得其大槩密訪民情當無逃者一屬官賀節預免一各縣政事不必一律在合時宜一上下之間情法兼盡一天平法馬等稱各門鎖鑰間一看驗一鄉里可見者方見不則辭之一但遇士夫有識者及民間父老即問民疾苦求所以蘇之上劉晉川先生前承台臺大教歸而體究惛懵無進祇覺多過耳今開欵請教惟乞垂示可勝傾仰之至一研究道理費一畨思索或稍露端緒而此夜夢寐反不安果思索非乎亦所露僅成見解終非知體耳如何而可一是非毁譽到前每凝定以處之以冀不動然兩腋傍兩耳根津津氣上則氣自動矣此時欲收攝已成強制矣如何而可一行取報到不作張皇喜態然思之非也賢才向用何分人已因取我而作漠然之狀是有我也何不以人視我則其態出於做作非中節之情矣如何而可一嘗見途次搢紳以夾板運書籍示人以非貨也斯不流於好名乎若徑以箱籠運之連綿多扛慿人謂是金是玉恐隱微之間亦不能勝也如何而可簡劉朴菴馬少軒兄天分敻絶生平無誑言無愁色無機心其五內坦坦外露少有志伊傅周召之業復欲窮濓洛關閩之學其下者亦欲追韓范富歐藉令得聖人為之依歸所就當不可量乃弟先其一科登榜君易衣同其弟入宴觀盛事忘其我矣既與諸弟析㸑少所取則筮仕廣文為祿仕計弟子員遇汴於京邸嘖嘖嘆服不容口教化可知矣既成進士偶以假寐候其座主獨遲同事者教以託辭則笑而謝之竟直述假寐狀座主異之居常慨然思有所建樹於世天不假年何哉至今搢紳有問汴之良友必屈指少軒不能以既死而忘之誠重之也憶數年前談海內高士者晉中少軒朴菴山東李惟青今少軒惟青乃俱去傷哉然則銘少軒之墓者非朴菴其誰焉復瞿慕川于汴最庸陋然聞海內高賢則精神歸往不能遏止或不蒙棄斥立之宇下得承一二謦咳則喜躍以為不世之遭也向者江右之役李櫧山先生顧我於棘院繼謁張斗津先生朱守約先生於其廬已而陟匡廬讀陽明先生遺咏逰白鹿洞想朱陸二先生之高致既過大江肅謁先生而閽者不我拒而道駕復枉顧於寓邸纚纚深談細入無垠博極無際于汴數年傾仰一旦躬逢顧不快哉别後拜闕里廟墓登泰岱萬山撮土耳觀日之出竒狀難喻昔人云死生猶晝夜世人未知深信儻於日觀峯頭指點便自親切以上俱兹役所獲奉告以自慶云尊諭當大興教化誠然誠然世道非教化何所不至哉張方伯夙聞其人陳令尹幸一晤接史直指雅重先生固當爾爾敬義堂扁向者鄒茂才相約渠至南都徑求善書者書之即列敝銜寄上何渠猶未就也禮樂考序當托周郇野寄奉請教尊體既違和馮兄之弔可緩勞困跋涉亦非馮兄意也陳君回任正值計客紛集匆冗之際草率報候伏望垂鑒仰節堂集卷八
