body:
  text: 仰節堂集卷十四明曹于汴撰五言絶句省躬詩燕子語梁間天籟各自發家童勿垂簾出入任飛越又風從水上過文成風不知水亦不自文觀者乃文之又人信勿自信人疑還自疑不疑不成信暗然為襟期又人不幸不及相看成自驚莫訝醉人醉未飲不為醒又蒿萊誰不厭斸盡又還生田不茂黍稷未許不青青又聖人時而言一發千鈞弩終朝審其機含章緘不吐又小鑑鑑以面巨鑑鑑以身不比明月光豈識乾與坤又或計在一時或計在一世或計在萬年經營應自異又我全而人毁毁者當自怒而我乃怒之藝人忘其故又利根千萬丈漆堅細若絲誰知絶利日剛是利生時又鑑空水之止纎塵不掩光人心塵無許頓爾成昏茫又血氣相驅役真成傀儡身不知伏火處那知已成焚又宿愛不能斷宿嗔不能斷營營階序間何時登彼岸又請益居其虛受益居其愚請益而益至真能不怒無又畫史先盤礴一擇敵化工萬事未當前胡不虛其中又孟子善養氣此氣即此理稟氣人人知理則逺言取又萬人各一生萬生各一遂聖人遂萬生於巳取不匱又遇蘭馥我衣遇棘刺我裳人生隨所遇何必苦相傷又御人與御事難易迥然分人心不我洽吾事亦邅迍又世變人崇鬬几筵列戰鋒雞肋誰我弱箝口莫相衝又昨夕塵情濁惉惉結不舒夢中馮伯子命我勿區區又良賈以虛殖殖多更邃藏祗緣寸銖兩囊篋日周章又不百鍊不徑大任阿誰舉大道大如許衆生衆如許又舉世俱豫聖千年顔孟無向明爭似暗明便輟功夫又何不學幼子笑罷忘其喜不風猶作波人稱為禍水又天大不漏細羅三垣列宿不難大如天抑恐多疏漏又喋喋以益人疑於炫所有人方陳其益雖逆且順受又過不可不悔一悔便消釋藥過病還生撼搖苦此鬲又恩過翻成怨非關怨者尤陽和隂不節炎夏竟何流又休因得意處忘却懊懷時自吐寧堪食剛腸莫再移又偶睹醜人醜歸來淚暗彈醜豫無處著為爾何成寬又行不離階前言乃萬里去負儋果幾何千鈞勿浪語又困來寧退休倦容勿對客勿易吐肝膽而令辭氣迫又德義早安排十三年前語今日初度日慚愧汗如雨又過喜氣多揚過憂貌亦嗇理情如調羮味過詎堪食又尋常躪徑草容易撲流螢怙强終不覺爾弱乃相陵又長呼據竿頭他人焉置足環瞻匪爾榮將以爾為鵠又陽過常畏人隂過不畏已人目當其麗吾目當其鄙又小怒不能懲大怒且相襲大怒旬日連小怒時刻戢又羊腸鮮覆轍密語多興戎風波翻齒頰氷炭羅心胸又勿恃沾沾恩恩為怨之府勿恃煦煦親親為疏之藪又貞士不易悅曲士不易結胡為乎營營空爾成勞拙又逢比榮萬年桀辛辱千古弔罷莫談忠慟淚方如雨又治世非一手亂世非一足南渡主多寃羣工俱食肉又磯流嚮滂湃風樹影參差神氣清寧日聲容和順時又參芎自不惡藜蘆亦何尤丈夫同氣味白首願同逰又螢火未成日不信草能飛望夫軀化石石軀有無知又家有軒轅鏡鏡貌分於此去者影常留來者胡以俟又漏語亂之階轉喉若發機機動靡不走促膝成噬臍又謂我不如斯人其誰我諒是何人之殉不憐我之喪又蟻鬬如雷震病耳亦時聞人誰同此耳相述徒殷勤又周行松桂羅狹徑多蓁莽遇莽方廽足何如詢路口又燕居如對客客至不更容倉惶多掩飾藉是以自攻又怒毁成愎諫喜譽若爭憐借將頷下氣增取面前妍又乍面成乍煦易諾旋易悔孰與少踟蹰猶令直道在又誰將一粒珠棄之於中野誰將一寸長人前誇詡者又吾將益人善因之攻人瑕區區亦疏耳如煮水灌花又陽剛散之始物生肇自坤石冷能藏火火烈秪成焚又折旋不足處百拜盡成虛减寸不為丈凛凛貫終初又人情誕固誕評章密似毛評人如評鬼雙淚落青袍又大濟肇於忍大懟肇於忍一忍不復辨剛道是愚蠢又先朝肇大禮羣議競紛然文成問不答聊爾咏青天又千里難一師百拜難一語詬言感如飴相成出相齬又口虛而內實欲入閉之門空洞絶伎倆是為百益原又天雨之潤禾傾盆不如細侈口相開陳知應匪求濟又知人真不易咨詢失亦頻勿謂憑高客勿謂聽密人又人亦何容辱人亦何容欺我否而人可貌諾而中攜又義手成經濟揖授何森然欹側談條理沉醉說醒言又眼净微成巨三年貫虱心羊羮與雞距戈甲起繽紛又制念如縛鹿一排而一抵無念乃無縛正襟墮支體又雄辨如求勝直窮亦似爭才勝負者逺才爭大道崩又劉戒釋文義潘不議論豫無乃談學聖勿越各身軀又何事須明心神通無更有一朝心其心宇宙在吾手又何事賞巴曲何事唱陽春既成立語式更得聽言人又時或率天性分明大道行無端翻自悔苦媚世間情又意左莫投足言違急斂脣訾人如齒劍揚已如投焚又諸有不能無諸無不能有靈性一何靈無無仍有有又些個失人意愁腸百疊縈却詫元城子梅州鼾睡聲又談忠多負主論孝未酬親詬濡才似髮相負便生嗔又不作井中泥輒鳴牀上琴匡人何豫有况為廢謳吟又惟敬能生樂恣睢成悶懷尋常莫造次戎好笑中來又支言亦有根根深不在口任爾三百緘根動口自剖又爾窺事遲遲喜怒勿遽發爾處事疏疏經理須密切又卒然輒舛錯檢㸃已千里改是胡以預造次必於此又大木充棟梁全帛美裳衣若不中繩墨環觀嘆竒稀又飛雲流逺浦旭光蕩風林去住倏不滯可擬達者心又一字歉於中四座俱回首惕兮敬靡忘勿以為細咎又無謂楚可疑趙孟自坦坦無謂漢可信留侯戈已返又知幾者不辱况令辱相續徵色不自喻是之謂走肉又一水滿不容一水滿欲施海若乃汪汪二水小如巵又何故多遺忘知因心不存水澄物自照垢逺鑒靡昏又心胸藏釁郤譽之以為譏岐路相違左合之乃成離又戚休掣電來得喪迅雷起心澄目不搖憑言了生死又養氣如養虎虎哮制則難養心如養龍龍變以能蟠又天下極難事取土益高陵千秋華嶽頂帝座幾人登又保心如保印印去能吏拙事心如事親常令安且悅又事不問巨小身在思有濟庸庸偶其間何殊匏之繫又以言教者讐以言教者訕几席笑談間好師成大患又常定亦常覺常覺亦常定泗濵獲要言吾以止吾性又吾亦完其我夭夀我何關人毁與人奪似隔幾重山又有物彌天地至密至恢恢放非由近去卷不逺方歸又宗聖終無愆遵王道如砥人心真聖君從心何不理又不識嚴僮僕能無畏影衾心開雙目朗匝地鬼神森又心意由來别心性亦分明不窺真性面終是氣縱橫又傑人千仞壁卓見亦橫中方識不聞覩穆然洵聖功又事因忙處錯中道在從容擬議為言動免令愆戾叢又止止還止止休休休坐馳兀兀固在此浪浪將何之又魄我魂仍我夢胡不我由夜夢原從晝云何不靜修又聞雞頻問夜非是愛辛勤老至光隂少那能不惜隂又匪擬人相重不嫌人我輕察言知不足從此日兢兢又古人惜寸隂寸寸必有事古不専誦書所事果何事又名利真成祟英雄奈爾何清江平似席倐忽起風波又問路非行路年年在户庭果然行路客問罷即登程又不欺人功淺功深絶自欺自欺寧易絶還在欺人時又何處窺剛德應於衆聒時初心原不惡底事為人移又不懾於巨禍不怵於殊榮不眩於久昵白首鮮能行又飲毒十年前毒發十年後智人慎舉匕懵人悼成疚又日照不擇地雨潤無遺草吾心藏仁機嫉惡亦能槁又飽食卧北窗多少恩難補征人捍邉陲農夫勞畎畝又利榮無冀想推挽絶偏私杳杳高風在執鞭我願之又請看鼓楫人江海如平地由來此世途各自分難易又莫視聖者高自高更局促暑葛寒以綿人人贊化育又天心最憎機人心能照機試觀海上客何事不忘機又積風風乃厚强信終成疑相逢才半面便道遇鍾期又鄉願萬尋坑白頭跳不出圖個世人稱年年囚鬼窟又㸃檢從前事感應如桴鼓勿云方寸幽天公於此睹又常憑未發天好令直如弦忽忽初念轉照照却惺然又朝暮相煎急誰人㑹個休通來一寸血㸃㸃逐浮漚又著力因求得得後何庸力無力却有力綿綿自消息和鄒南臯先生寄示三詩土坼田分畛氷消水共池怪來關切甚原未隔毫絲右共一家耳目若可鎔見聞何所住春色滿乾坤畫樹非真樹右文字障不道西山高却道日將晏誰知夾日烏陽光猶自爛右四大假劉冲倩誕初子錫朋劉子今方赤相看不爾如他年年似我憶取爾之初劉冲倩定嗣長子錫蕃主器遵而祖荆花好振先彛倫天叙就而祖即而天劉冲倩誕次子錫履多孫若祖欣雙郎欣若父有弟欣若兄異日三無負七言絶句獨坐蓬萊弱水是何處悠然獨坐小齊中分明天地共浩浩豈必烟海逐空濛和友講道道無堂奧亦無門何處入來何處存舉足求門足便是眼前淪渾更無痕賞牡丹花前逸興欲傾杯為問此心何處來物理若還不我與等閒那得笑顔開坐思萬軍接刃鬭紛紜旗鼓惟聞將帥尊若道此心更有主又令將帥主何人吳安節先生貽詩步韻以謝茫茫今古道常存眼底拋除誰是尊一座堂皇天樣大無端又向小分門夏庭鑕斧亦遭逢爼豆關祠代代同却道頭顱剛直甚悔將主過博臣忠新月訪客登臨百尺樓纎痕遙共薄雲流如輪皓魄分明在舉世爭言月似鈎癸丑村居雜詩東鄰西舍總淳龎後圃前㕔盡植桑莫道農家成寂寞茂林好鳥奏笙簧坐卧高樓萬户低山屏闌楯兩相齊眼前塵障開除盡暮雨朝烟入品題澍雨昨宵漲小池曉來庭院緑參差兒童報道蔬堪摘便好邀賔賞嵗時得請歸來恩許閒細窺書卷飽看山四郊却道無禾黍又為饑人不解顔五旬無雨壠苗枯少女誰家挽轆轤也愛深閨幽靜好半因饑餒半田租才愁溽暑忽秋凉人世誰同天運長好展襟期酬令序四山雲物曉蒼蒼高臺四望野連天風月於兹豈有邉三尺匡牀紛計算還知世界幾千千田叟邀來為解蓑飲君濁酒為君歌莞然一笑還相問昨夜月明詩幾多村小不盈數十家回回相見問桑麻稚兒未任犁鋤力也向溪頭解種瓜聞報書懷四首丁巳鈍質生來故不竒科名官位總逾涯若人剛好投閒地猶費夕郎夜草辭鄭重多賢輔聖君不才自合老烟雲兒童課罷書堂寂種竹栽花日又曛利鎖名韁久若遺無端猶爾浪猜疑而今想在相拋却正是茅簷穩睡時塵世繁勞不上肩山中長夏日如年千秋未了遺編在且喜蠅頭也㑹看初任司理到任日吏用印報云升授吏科給事中虛套取喜何必乃爾走筆題其上休飾虛章報吏科縱成真取便如何眼前羞作瞞心事莫把津華覬望多梁燕重來二首行取候命萬里都門春復春雕梁燕壘又更新呢喃相向如相訝不是燕人是晉人年年作客客華堂歸燕殷勤話暖凉飛過回廊還對語主人何事鬢成霜藤嫩枝柔幹倩相扶未信終成矮地鋪當是老龍離玉闕昂頭藏角隱平蕪竹偶因月上橫疏影不為霜來發徑枝休把貞操漫相擬還須些個自然時迎春花輕黃不似首春時果是青青但此枝欲識花無與花有且言春去竟何之葵花自白自黃還自紅賞不加喜折不恫若教著意才傾日花若能言應笑儂榴共道榴花結子多百花階下共森羅滔滔萬𣲖歸滄海胡不中原絶水波落花憑欄逰冶惜芳菲陳陳風來片片飛多惱多情總向外本來才著便忘機咏垂楊似座中友為甚枝枝向下垂不剛不徑耐風吹相逢為爾頻傾酒記得十年贈别時題北園十五首楚弱劉强東逝波銅山金谷總消磨啼鶯莫向窗前枕無限榮華正夢柯七尺身軀一粒沙年來病豎苦相加吾將一笑攀明月白玉京中别有家昨夜狂風萬水號如從三峽聽江濤垂雲隔在應憑取飛入天門興轉豪風高猶自怯衣單華嶽峯頭四望寬萬國洪罏悲正熾銀潢瀉却與清寒採藥時從陌上還牀頭欹枕看青山一腔熱火風吹去欲向忙人賣個閒夢裏分明玉帝旁騎龍駕虎任翺翔回頭世界些兒大不是爭蝸是怒螳萬里黃河一線流茫茫大地水中漚非非是是莫相聒一夜西風欲白頭石橋橋畔濯滄浪高栁隂濃足午凉野老班荆情共適無人識是瑣垣郎纍纍高冢傍河涯古碣苔封半欲欹惟是銀璫曽不拜百年處處口為碑時逰張氏墳十里郊原信步逰每逢嘉樹且休休旌旗却憶長安道瀟灑終應此日優隴頭小坐說當年逐牧隨農過緑阡人是舊人窮亦得烏沙難道漆同堅半生炊黍未全醒羸體相看便不寧非是貪官非愛夀個中不了為惺惺春老園花秋近枝黃昏相對淚交頤如天事大關情切惟有清風明月知盂水昨宵夢化金靈臺帝主窒吾心楊家夜却尋常事蟻穴能令江漢深岸裂瀾狂漲若湖且沉且起賴殘壺中流力盡波仍急尼父空中笑欲扶避暑姚館漫題乙巳邸報傳來莫嘆呀長安從昔此紛拏飛霜墮雪皆天意到得東風自放花草有千般花萬叢形形色色也難同負心唾面都由彼不向人間競楚弓千年華表草中埋八百籛翁亦去來拋却金環總一律儘他二豎莫徘徊南逰八首廬山面目何為真我來問取山頭人山人住慣等平地脉脉無言鋤白雲為觀瀑布登高閣懸流百仞空中落山僧不見雪花飛指㸃巖頭說旱涸時瀑無水文殊臺上惟月明水中有石聲鏗鍧這畨公案憑誰剖還是石聲是水聲白鹿無踪古洞幽仍登絶嶺豁雙眸紫陽笑指條山曲一樣淙淙湧碧流千丈神妖繫鐵柱年來逃向靈臺住憑遣千兵擒不來不持寸刃驅將去一溪緑水一林松五栁先生宅此中天遣生成晉處士非將飢餓博高蹤佛子金身三丈五袒肩垂手觀下去莫怪當年著眼高等閒豈識羣生苦訪仙臺上石崔嵬人道餐霞去不回果向深山更深處溫良何故進丹來㑹堂和楊晉菴先生勉學詩七首此道何時不大明青霄無奈片雲生幾廽欲掃掃不得不掃憑誰代若行為是為非我自明每從暗裏淚痕生㑹堂度度得良藥欲䇿駑綿勉强行同此天真同此明宛如一鏡羅羣生煩君提我迷途裏沂水河邉好共行還得原來恁地明無邉真趣自生生何須著力相防檢水自流兮雲自行眉宇薰人乍欲明須防鄙吝别來生利名根蒂縛人急口說難憑且去行頤解蓬開未是明譬如擊石火光生可憐擊罷依然石到此令人猛欲行果然明盡却無明到得真明萬照生千古良知孩提子孩提剛是任天行鳶飛魚躍鳶魚吟罷此心開色色如斯莫更猜窗草驢鳴同意思古人才是誦詩來和張霽春談棊詩茫茫今古大棊枰興敗輸贏局局爭畢竟有時雙歇手回頭一笑枉生情仰節堂集卷十四
