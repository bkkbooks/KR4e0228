body:
  text: 仰節堂集卷一明曹于汴撰序江西鄉試録後序臣不敏副江西典試之役既告竣當有言夫兹地習談聖學而諸以比士來者亦大概以作聖之功三致意焉臣安能更端以告士士不聖人之學而誰學乎學聖人者心其心行其行言其言舉子制藝亦言其言者也方其湛重淵之思抉九天之祕魯鄒覿面莘岐傾懷里巷屑越之語烏能有此不謂聖人口吻可乎哉第孔孟伊周啓口容聲罔非是物而諸士匪臨場羔鴈鮮不為里巷屑越之語者要在充其類耳詎寧惟言士亦嘗心聖人之心矣行聖人之行矣尋常食息大聖如斯雖在梏亡猶涵至性忽愴臆於顛連忽赧顔於爾汝忽莊容於賔祭忽灼知於著掩其於聖心聖行隙露全露乍合乍離者皆是方其離時一毛萬山當其合時百世同室亦在充其類耳充之者言有常也行有常也心有常也夫一臠知五鼎跬步知千里業有其言何不常其言業有其行何不常其行業有其心何不常其心言之實者其言常行之實者其行常心之實者其心常其心實無有不實其心常無有不常無不實者至誠也無不常者不息也充類者致其曲而誠也夫滄浪之咏充之綦隆臻居室之能充之天地察孩提之愛充之仁義達豈以士也而熒熒隨熄涓涓自封弗克充滿優入聖域哉夫觀天者以昭昭察地者以撮土學聖者以一隅故棘內可信棘外一緒可窺全體非過也士誠有此倪也然而由聖倪躋聖極則亦有辨矣臣北産也既壯而渡江北之所聞恪守實蹈尺步繩趨居多焉渡江所聞頓解根宗圓通開廣居多焉或相背而各往或相疑而交辨頓解者曰何為瑣瑣滯滯拘攣格式眼瞳不瞭足趾竟隘恪守者曰何為艷悟忘修駕大棄細以名節不足檢以踈縱為無礙臣竊謂二者之言可相濟也俱不可廢也夫恪守之士斤斤於門外者也頓解之士揚揚於門內者也門內之論終不能勝顧烏得決去藩籬便其情態躬為嚆矢遺人口實道之暗也殆與有責焉夫障緣愈添本真益昧爾先達之重戒者戒之良是賄賂干請任情執見爾先達之明糾者糾之亦良是爾多士兩存之一切謹嚴一切脫化三百三千何思何慮九經九德無臭無聲以此為心以此為行以此為言淵源孔孟證可伊周豈不偉與不然膠於師説岐於門户其為辭也詖詖辭不足辱兹録而況生於其心發於其行害且更烈何聖學之足云豈所望於多士哉崇賢録序盱山士紳以宋劉剛烈父子及李博士應列祀典狀建議於邑侯許君得諾先是三公顯靈於漕直指蘇公樹壇於直指董公兹議乃興建祠以祀就祀為會用闡聖學感三公而思濟美匪直報之俎豆已爾爰述其經制始卒之詳成録問序於余夫宋距今歷年纍百英􅐩猶存追崇不喧今人之性不隔於古人故不喧也古人之性不隔於天地故猶存也然則天人一而已矣東西南北之人古人今人一而已矣而人或自封一局者何歟不達鬼神之情狀付之曰烏有亦自封也則何不可自封者門其門户其户名其名利其利步武幾許胡不藩之剖而家之大乎吁嗟此君子之所不為也劉氏父子身其身乎宋與我何有而自糜於鋒刃李氏而身其身皇皇於聖學之翼也何為直指邑侯而身其身何有於亡人何有於盱而舉之祠祀盱士紳而身其身翕然不忘於昔賢何為而又何會講之殷殷也是皆根於性也不可得而隔也故不容已也彼自封一局者亦何嘗隔而以為若有畛焉若有域焉是幻見也如夢中之畫界倐然而醒畫界安在諸君子仰止於斯知其無幻見矣幻見於講互有辨幻見於行互有規幻見於幽隱之衷三公在上不笑且怒幾希吁嗟謂三公不笑且怒是以為無神也奚以祀以為有神也尚念旃哉馮少墟先生集序夫道生人失其所以為道則失其所以為人矣誰甘於失其人而每失其道弗思耳道貫於血氣之質弗相離也離道而抱空質焉與土梗何殊乎是道也其大無外或狹而小之其密無間或輟而斷之其粹無滓或點而衊之是故學為急焉學也者恢廓而使之大綿聨而使之密滌蕩而使之粹也道不待學而有而非學無以保其有非學無以復其有非共學無以公其有故孔子蚤歲志學沒齒不厭也然學亦難言矣性天之奧本中有本胡以徹之知見之紛岐中有岐胡以析之習情之錮忽醒忽迷胡以覺之是用連朋講究互參證以求至當相夾持而防墮落故孔子以不講為憂也夫道需學學需講有不啻飢之食寒之衣者而講學顧罹世訾非盡世之尤也不學之士患在不講講學之士患在不副或亦艷為美稱儋簦聊聚朝朝問路歲歲不越閾譬露背而談九容揮玉塵而稱儉素於我乎何有故孔門之訓無行不與夫惟相與以行則學為真講而萬世宗之無斁也少墟馮先生沈潛聖學踐履篤至問業之士如雲而先生惟有教以闡揚剴實衛道謹嚴蓋亦以行為講以行為學者也道不在兹哉昔有問楚侗先生以天命之性者先生方欲訓解其人曰意公自言其性耳先生為之矍然慕岡先生會友於白下凝然相對或曰馮公何無講座上曰此人渾身是講其亦旨於論講矣于汴不肖仰先生之行有年兹誦其講道之集若而卷而窺君子之慥慥也敬綴數語志向往理言什一序夫人之所以為人理而已矣里巷庸衆對談之語未嘗不謂理云理云然究其精微則峩冠而皓首或不識為何物亦可詫也古先聖賢以理為行亦以理為言言為後人設也而究心者寡安望有窺於理而能齊其行乎知一張先生有味於先正闡理之言摘而録之時時研討問發以所見遂至成帙命之曰理言什一嗟乎風會之下也士之所趨者流俗汙世競利逐時之習而已即沈涵典籍之中窮年兀兀藉其可禆進取已耳又不然左史英華晉唐膏馥輝潤筆毫留連光景已耳聞所謂理言者如奏古樂不終場思睡矣亦有口誦注腳漫謂了了實則錮蔽此又訑訑之見耳先生之志大矣哉其造理之邃制行之卓宜也得其所以為人者矣人之徹內徹外動容啓喙孰能外此譬彼魚然能為順水能為逆水而不能外於水人亦何為不理之順也乎雖然什一云者以言言之也理無所謂什者一而已矣亦無所謂一嗚呼微哉微哉非究心於理何足以語此質言序徹天徹地亘古亘今一理而已矣人得理以生惻隱羞惡恭敬是非真誠其質也以此見之行則為質行宣之言則為質言其為殘忍無恥傲慢昏憒虛詐之行與言者非其質矣故曰人之生也直直其質也故曰君子質直海陵心齋先生崛起末俗之中獨完其質而流遺風以啓後人靈臺唐君私淑先生之教興學祠內敦行慎言躋八旬無倦鄉里薰之縉紳褒之曰不失其質者也彼有遜聖哲為敻絶甘沈染於習氣者反以習氣為質者乎辟之人面有本來色相乃至抹墨塗朱盤舞劇戲久假不歸不知真面掩朱墨之內也然一洗刷真者立露又豈借面於人哉人心之質亦若是豫不類少失其質時稍覺其非是顧與賢人君子相講劘其質輒露幾希或涉世味恣嗜縱情則質復隱而反以非是者為質蓋至今倀倀也辟如劇戲之人登場逐隊樂事方濃若以其抹塗之面為固然不復知醜場終意盡對衆鑑形則有啞然自笑而洗刷不遑耳紀生常新陳生魁類輩受業於唐君而彚梓其質言欲因言以求質者則必日親師友相切相磋守其惻隱羞惡恭敬是非真誠之質必不至抹塗其面而以非是者為質矣不類他日遊海陵走祠下將以鑑吾之所質當有以洗刷我讀易夢覺序秦蓮勺先生史公學易有年沛然徹悟録其所得成編為卷者九命曰夢覺何覺乎覺我之為易也何録乎將覺世以共覺也殷阿衡云豫天民之先覺者也豫將以斯道覺斯民也夫易六十四卦括於乾之一卦三百八十四爻括於乾之一爻廣大無垠森羅悉備我命如是我性如是我心如是我身如是萬邦億姓遐􅑍僻隅昆蟲草木共是不知我之如是是睡夢方沈不可言覺業覺其如是我固乾也遐􅑍僻隅昆蟲草木連貫相關矧夫切而近焉者乎而不欲其共覺乎此夢覺之所由編也讀是編者謂公逢時不偶歸田研究立言覺世棲山林者當如是然阿衡覺民乃在三聘幡然之後何也大行窮居寄迹殊象自覺覺人心念惟一心齋先生不云乎唐虞君臣只是講學執中十六字莫非呼人之寐也世見孔夫子周流未遇歸而刪述乃謂達則道行窮則道明或遂以內聖外王分别為兩寧知其周流十二國時未嘗不為明計也故曰欲明明德於天下即如公曩覺世以讜言今覺世以讀易寧有異耶泰運復亨徵車且至大覺斯民譬天光之焕幽陬盡朗彖稱乾元大明不在兹乎余蓋有深望焉四書説意序聖賢之書聖賢之言也聖賢之言發於聖賢之意聖賢之意動於聖賢之心有其心則知其意有其意則知其言知其言則能説之説之者説其意也説其意者以意逆之也不以意逆而徒揣摩其言而已終不可肖今天下士人其於四書蓋童而習之矣然至白首或不達其意吾無其意安窺其意吾無其心意從何來李放桃花其可得乎稷竹東任先生著四書説意説孔孟曽思之意洞然詳盡何以臻此余未睹其人而聞其行清貞端謹年且望九而不倦於勤跬步必繩諸義可以識其心矣不失其無意之初也不失其同聖賢之初也以聖賢之心説聖賢之意與自説其意何殊烏得不了了讀是説者勿徒以説視之亦以意逆之吾之意與先生之意投乃與聖賢之意投而先生説聖賢之意者吾亦可了了然在能有其心有其心斯能有其意李放桃花之謂乎心水也意波也江海波池沼波洪纎懸異有同然者吁嗟心學可不講哉正心盡心養心存心四書顧不諄諄哉四書疑問序或有問於余曰吾讀蓮勺史先生之疑問而竊疑焉夫先生積學功邃神遊於孔曽思孟之間默契道真何疑之有吁此未知疑之不可無也孔夫子自述云四十而不惑是其四十之前何嘗自謂無惑儒者四十之後尚未可當夫子四十之前動云吾既知之矣居之不疑如何其可也善哉乎先生以疑自居而長安諸君子復有未能信未能疑真疑真信之惓惓也疑則問問則成其學學則信然則既信矣當無復疑乎是匪可易言也虞帝之聖奚啻於信而問察之好不置夫豈自處了了而姑為是咨詢也夫子不惑矣而假年以學蘄免過之大者又豈自信無過而漫求免也世人謂惟聖無過此殊不然到得聖過轉多耳譬百里之侯不任咎於封外天下之宰詎委責於遐荒故彼能是是亦足為一長之士也聖人而有足時乎不足則不敢駕言信烏得不問且學也是故讀四書者疑焉而已讀疑問者轉疑焉而已伯玉未五十時幾不覺四十九年之非儻亦嘗自疑也而罔歇於問也乃克自覺乎夫學難於有睹而有睹非可盡學也疑以生問問以成信轉信轉問沒齒焉而已矣則兹編之所開者宏也余不敏叢疑如織當圖航大河之津陟華嶽之嶺摳衣請問矣銀臺政紀序竊嘗謂當官致治之要有二尊令甲修職掌而已矣國家建一官則有一官之成憲幾經籌量而後布為章程者鑒於成憲而精神畢注於此罔敢頺廢斯於職不溺一職不溺則一官之事理顧或蔑棄典故惰窳職守世之不治無惑也安節先生歷官中外有年所至輒講求舊章設誠而行之鴻猷駿業炳焉比自留卿奏滿甫入都門天子簡之銀臺則首詢掌故而掾史無以應先生曰奚而持循以修職業於是廣搜旁採要例科條燦然悉具某事也訓典之當舉莫或湮之某事也訓典之所禁莫或循之政乃大飭汴不敏睹先生之為納言而知奉職者當如是也睹政紀而知先生之盡職有所據也職巨職細諸百執事疇不有成法在疇不有官守在即古稱名臣傑士躋世綦隆亦無他竒第各不虧其職分以無戻於憲典足矣雖然方䇿昭垂由心制之先生編纂而躬行由心運之脫無是心乎即令條教盈案將藐焉背之以馳世之不治自若耳然則當官致治又自有本也歟蓋信哉其有本也馮慕岡先生語録序昔有士人十數相遇於崆洞之陽衣冠甚都吐辭雋永主人肅之各授采箋冀承清論須臾俱就録而成編覽者珍襲何異程朱比肩哉居頃之敘及生平或曰吾鞅掌日久崇膴不我及奈何或曰時情未可拂將造貴人之門或曰田無妨求舍無妨問不者何以遺子孫主人驚汗吐舌是與録中之語殊不類人與言可相背而馳耶因思前代以詩賦取人未免靡麗之習國朝定以經義周情孔思淋漓筆穎制非不善逮其後也僅借梯榮下不必顧行為文上不聞因文問行若謂舉子業固應爾爾大人先生乃登壇講道彚語為録評駁古先抉剔造化非法言不言宜亦非法行不行是以髙賢大良罕不從事躬修今若此將令異日觀語録者亦若觀舉子藝乎是可嘆也於是新安戴生以所輯慕岡語録視余余交公知公揚言於衆曰是固非憑耳入流之於肺肝非僅口出履之以實踐其通籍二十餘載茅茨猶故秉憲於楚兢兢奉職百務俱興直觸橫璫脫全楚於水火禁詔獄纍年講晰益邃兹録所載獄中為多蓋以自砥亦將覺人塵態光華無所覬覦其亦可尚也乎主人乃逌然而喜因敘次所談辨之簡首馮慕岡先生年譜序昔在孔門無不從事學問及語好學僅推顔氏之子好學誠難言矣何況叔世知學為艱安問好哉然弗好則可作可輟可信可疑學之無成者多矣慕岡馮子孜孜於學以好自許嘗語余云吾好學如好好色蓋自覺其深嗜不可解者其家亦云公曽對卷研思大雨水入户及座下不動家人驚呼之方出詎不有真好哉何以徵之徵於其學之進也余初會於都門再會於盱三會於淮泗又會於都門五通問於圜室度度非復阿蒙年有進焉非好何以致此譬飢之好食終果腹也寒之好衣終蔽體也好故有成也故夫子思顔子亦曰吾見其進士將學顔子學何不好其好馮子殫精於好可謂善學顔子向令天假之年不知所進何似然亦不虛其年矣其年可譜譜之足為學士模其門下士戴君任當馮子逝後門户荒涼交遊星散之日搜羅讐較為之著譜裹糗重趼間關纍千里問序於余此亦好學之報也聊綴數言闡揚其好以俟尚論者知其生平窽要云重刻我真語略序絳郡公笪我真大夫甫涖堂皇輒以興學維風為第一義進多士而誘掖之觀其語略蓋其初為鉛山侯以教鉛士而鉛士刻之者也多士以傳寫為艱重付梨棗問序於余余與大夫同遊久此語亦習閲其人恂謹其學有本原故其語精切而醒人其歷官行政裒然有成績仕絳未半期口碑業遍四境多士若其化乃崇其語耳第未知多士之梓之也將誦其語乎抑語其語乎踐其語乎語其語者大夫曰仁亦非仁無談大夫曰義亦非義無談宛然有道口頰也盛矣踐其語者業共談仁非仁無由業共談義非義無行儼然有道步武也尤盛矣顧余所望在此不在彼蓋嘗聞海濵一先生出所著語録示諸人士人士爭捐資鋟之梓最後一人以資來主者弗納其人恚甚奈何拒我主者曰爾既應試列名矣烏用此先生聞之嘆曰將令我不暇給耶士林傳為笑柄吾晉士風推魯罕從事於講講則矩蹈而繩約之弗敢越軼寧失之方不至失之圓兹之剞劂語略者固非公不至室者也子大夫其欣允理學文鵠序關中少墟馮先生輯諸大家舉子藝百數十首以式多士命曰理學文鵠不命以舉業而曰理學何也見理學舉業之非二也皇制羅俊秀之士於庠序俾其研究理奧心繹而躬迪之期於湊泊融貫可通於世用顧上之人無由知也則令攄所學於文藝其文肖其所學乃因文而知其人擢以科第簡以官秩而收治平天下之效舉業之制豈不善哉習之敝也學不必理文亦不必理帖括勦襲糚點色澤以博進取回視所為文真成敝帚無一字可濟於世此舉業之贋也清修之士從而厭薄之講聚闡理自謂理學或遂謝舉子藝以為髙誦法孔子而甘蹈其所謂果失則均焉兹集出而舉業在是理學亦在是舉業而不本之理學雖極工巧而識者亦窺其微庸人之腹終不能倣聖人之口亦未有理學徹而文不精者孔孟周程之文不在兹乎固可睹已彼不達於理而覬成章譬醯缶而欲瀉酒味固不似也吁嗟不達於理而文之飾滔滔皆是厭薄而不屑為者宜其髙矣此理學之所以不明也鯤伯詩選序夫世之治也士大夫惟公室之恤逮其念不越身計不逾家漠然不知有國而世乃衰風之醇也無不尚朴者鑿醇而漓則縟麗穠纎以相矜尚而已士大夫不能報國而至衰其國不能維風而至敝其風亦足忸矣顧非所論於藩潢家也彼其離腹墮地所睹宮殿之巍錦繡之爛祿豢終其齒惟絲竹之為娛裘馬之為豪已爾而又格於功令無當官從政之責治不任績亂不任咎烏能約其躬而國之慮也王孫鯤伯有異焉足未嘗過城闉而聞廟堂有善政不啻欲躍者抑或民有隱天有災亂有萌不啻額之蹙者居恆自奉殊簡雖座上時有客而不類徵逐宴飲競水陸而侈繒綵無鬬侯鯖誇趙舞之態其精神固有所注也若人而為貴戚卿乎安有惟田之求舍之問金玉之輦為不可知之子孫計而治理日圯民生日困外訌日熾內釁日積而金甌無闕之天下且有懷問鼎之思厪方蹶之憂者乎竊謂鯤伯足尚也或曰若晤其人乎曰否何以知之以詩知之其詩慷慨激烈殷殷國是忠義之肝膽流於吟諷如將天問而雲排焉而蕭寂清約之致時時宣露經云詩言志又云詩可以觀公之志形於篇什吾因篇什而觀其人知其關於治亂醇漓之大也乃三嘆而書其集之首以為序孔廟禮樂考序夫髙下未判有自然之中陰陽未蕩有自然之和天地之禮樂本於兹矣人得之為性則亦有自然之中焉有自然之和焉中固未有不秩如者和固未有不雍如者聖人若是途人亦若是第中和之性不能無所蔽其不形而為乖戾者寡矣故聖人以性之中制為禮俾人人遵其禮而各復其性之中以性之和制為樂俾人人遵其樂而各復其性之和辟之於水制之者由源而發為流也遵之者緣流而得其源也得其源者得其性也得其性則中和合一禮樂匪二後世不究其源安問其流孔子禮樂之宗也其廟祀之典尚不免於舛廢況其他乎夫磬折式里自鮮愆動鳴鑾鏘玉當無躁心袒背而歌濮上必納於邪禮樂豈細故可忽漫言哉楚儒瞿睿夫氏慨然欲以興之乃推廣觀察周淑遠氏之意為孔廟禮樂考稽引宏遠核訂精嚴闡發幽奧皎然不啻列眉意若曰諸誦法孔子遊其門觀其禮聞其樂肌膚固邪穢滌矣又若曰請自兹始舉廟廊閭巷承訛襲陋敝禮淫樂一反之隆古合諸天地世教其興民性其復矣故禮行而民志定樂作而神人格夫論禮而不遺民也論樂而不遺人也則聖人之制禮樂瞿氏之考禮樂意固可想是書成而陳令尹鋟梓以永之與瞿周之意又何殊焉七克序昔者魯鄒之立訓知天知人之説蓋屢言之學莫要於知天矣知天斯知人知人者知其性也共戴一天共秉一命共具一性可知也泰西距中華八萬里逖矣龎君順陽者七克各一卷中華之士諷其精語為之解頥此何以故其性同也傲妬慳忿迷食色惰善七者情之所流吾性所無率其性焉未有肯任其流者中華泰西之所不能異也謂傲妬之可長慳忿之可持食色之可迷善之可惰豈天之降性爾殊哉平旦而憬然見君子而厭然聞善言而快然其憬然厭然快然者性為政情順聽矣性如堂皇僕𨽻之所不得擾也性不為主雜情熾堂皇無主僕𨽻登矣性靈一覺雜情濯濯堂主一升羣僕寂寂故知人之性者化其情者也化人之情者自盡其性而已矣自盡其性者自化其情者也化其情者知天而已矣上天之載聲臭且無知天之人纎欲俱絶詎令七者之潛伏流溢也乎哉而克之其烏容已於時龎君梓其編及半索序於余漫書此以復之滕縣救荒事宜序余治農渠陽之塢乾所趙公以救荒事宜四卷示余蓋其二十年前尹滕時起溝中瘠而生全之既試之猷也久而未嘗示人顧烏可不傳之宇內俾司牧者有所型範而安養元元之衆乎余受而卒業則見其規畫詳盡搆思肫懇於神於人於上於下凡可為民請命靡不舉也以粟以粥以金錢以蔬果以藥餌凡可拯民於厄靡不備也逺近有程給散有法普遍而不淆綜核而不漏委任而無宄拮據巡省而忘瘁直令餓者餐憊者起賣者贖流去者歸流來者如家病死者有葬嗷嗷者寧洶洶者戢而又制器墾蕪興農積粟已往為鑒將來有儲想其據堂皇撫黔赤軫飢困切痌瘝寸心欲嘔雙鬢欲皓潸淚不知幾揮蓋其視民生若鵠而精神畢注於斯也洵民之父母哉是以滕民頌之久而不忘朝論韙之晉陟銓部夫公之殫其職也如是則必以是望人矣顧簿書習熾愛養意踈人未必如是之殫職也則未免信口繩之而怨謗乃至然公則無愧於職矣且士人秋春二闈藝文各十九首而國家賁弓旌之典錫青紫之榮何愛此十九首者而隆重若此為其績學已素必能代主養民也而民之𨽻其下者未至而望焉既至而迓焉稽首階墀莫敢仰視鞭朴詬誶無敢反唇出入乘於民之肩竭蹶供養無敢違者雖耄孺婦女聞宰官之過其里企足引領冀一窺見顔色焉又何愛於異鄉之書生而尊榮若此為其必能養我也顧或秦越相視痛苦不相關平時既不為之備荒年坐視其死亡豈非負民並負國也哉若公者可謂兩無負矣憶曩歲宦於淮北有語余者曰經遊滕縣相隔半尺許便自迥異余心識之繼被徵北上入其疆田頭皆樹樹外為牆牆外又樹樹外為坦道出境而止其田無不墾穀無不碩無草莠之雜楚楚若一姓者然不覺心折公之孳孳民事蓋不遺餘力也無何公亦離任越數年東省告荒或謂余曰滕縣以樹木之利民得濟於飢此則公救荒於行後而公亦不知兹卷亦所不載余記所覩聞乃爾遂題於簡端讀史斷章序夫理斷事之衡也心燭理之鏡也欲掩心之障也欲深心昏心昏理隱遇事當前蒼素無以别非事之難斷也既失其衡曷憑而度之况乎千百世之前史編所載其人杳如也其事之端委茫如也摛辭之筆或至眩真評議之口遂為成説冀以剖斷不爽不更難乎孝廉姚君仲美天成修潔濯濯塵表曩在壯齡緣侍養北堂不晷刻離遂謝公車纍科不赴荏苒皓首竟絶仕進撫臺金溪吳公疏薦未報而君恬處畎畝數椽容膝無榱棟之羡裋褐蔽躬無文繡之願藜藿充腹無鼎烹之嗜此於世味捐除蓋盡心靈安得不露理奧安得不徹居常閴户讀史神遊掌指考得失之原察心曲之幽䇿成敗之數獨抒心見不襲人吻積久成帙一日鹺臺上谷劉公晉接間詢其近功出斯編以視劉公頥解題曰讀史斷章檄刻以傳且命為序分運烏程史公欣然授梓匪具精瑩曷來賞識余辱交於君知其屏除欲染非旦夕矣心瑩理洞斷事炳炳有固然者乃辨數語俾讀兹編者知其根因而讀史者知所準則焉三臺奏議序昔子輿子尚論古人以伊尹為聖之任後世易視此任每謂有所不足其髙視尹者又謂其任不可幾及近儒剖之曰任以所遇而言蓋聖賢當事未有不任而清和自存其中藉令夷惠阿衡其任亦同大抵名臣良相彪炳史册者罔有不任國制士人筮仕曰任某職其之官曰赴任遷轉曰離任豈異人任而一日當官烏可一日不副其任然而天下不治則以任事者之鮮也簡命頒之當寧職掌載之典章而或以利害怵心當任不任義當言而卷舌理當前而縮趾職務烏得不隳禍亂烏得不作也以豫窺於今日司馬拱陽孫公所稱任事之臣哉公曩以治行髙等任南臺侍御時柄臣用事力能墜人於淵公抗疏糾彈風裁聞天下其留都豪貴行行且止獨畏公一人逮後改任北臺正色輦轂間值羣陰方熾戈戟攢攻公八面應之直氣執言終無所懾遭其齮齕無悔頃歲泰運復亨帝庸舊碩公秉鉞西秦藩府巨蠧憑依城社梗憲虐衆公毅然繩之法藩王百計熒奏卒不能撓公若曰此皆吾任吾不任而誰任豈其姑依違退避博人之歡保已之祿而已諸疏具在他疏可類按也儻人人如公無論職巨職細事到思任安有唯唯畫諾悠悠玩愒視責任若辨髦叢脞庶務流毒邦家也公今知遇日隆晉二樞卿則夫東西烽燧方棘中原萑苻潛窺兹任匪眇而公必有所自任矣將士淑慝兵機興釐明目張膽議之朝堂瀝誠竭智告之君上情面怨訕安能撼公蓋封疆公之家垣兵政公之家政徑骨直節固饒任之而海宇磐石在其仔肩耳豈不並駕古先哲人而阿衡之業佇當屬之矣贈運庠廣文景嶽康君育才館造士序或有問於余曰鹺直指李君緝敬集三藩雋士於育才館而督課之復時聚於傳是堂專為科第計乎余曰否其敦聘廣文康君景嶽司教事專為訓以文辭乎余曰否世之盛也舉業理學合於一師以是教弟子以是學上以是登之科第而任之職乃能廉於躬忠於主慈於民而天下以治逮其衰也忘其初制師之教弟子之學主司之掄選總不越於文辭曰以是梯青紫而已終身唔咿不知理學為何物間聞理學之談從而非笑之以為作偽以為好名吁亦但為其真者耳為其實者耳然不講則真安在實安在貿貿何之亦不得之數矣縱博一第躋膴仕而世味薰人如舟無柁安望廉忠慈愛保世之不亂乎直指生理學之鄉灼見於此乃綣綣於鑄士俾其文行雙修直徹本體庶由體適用而世終藉也而又以據臯坐者非僅僅文辭之士所能型範知康君自關中來從少墟先生講學久以黃甲之英恬居芹序可以為人師遂藉之主教而君以天成朴茂沈酣理域洞燭玄微繩趨矩蹈罔有越踰望之識其為端人就之坦易可挹扣之而無隱不剔也士乃蒸蒸若於化競自澡濯向於聖學同志有録可按也會直指驄馬南諸士解館以歸乃質余言為廣文贈余惟人生而明德具焉昭昭如也其於義利善惡得失禍福之介無不了然者比其染於風習迷於欲念乃不知義之為崇利之為卑不知從善之足樂從惡之足憂道充德富本得也而嗤其失墮實損名本失也而侈為得奢躬陵物禍之媒也而罔知逺守身善世福之聚也而罔知趨是非眩焉從違乖焉病其身而病天下所謂載胥及溺也揆厥所由以不知理學而僅沒沒於文辭之藻繢也學則明不學則暗以理則為聖學不以理則為俗學俗學之昏人終無開眼出頭日此廣文之所以無負直指有造士類也乃書此以贈廣文且以朂多士育才館同志録序昔有友人會余於都下談志甚悉首辨志次立志次持志終以成志辨若問岐立若樹表持若執玉志乃竟成而總不越於孟子輿之尚志於仁志居於義志由必也志學志期於矩從心不踰之謂成按鹺李直指本晦羅三藩髦士於育才館立科條厪教育館祀堯舜禹率之對越館距城數里而逺復於城內孔廟之東創𢎞運書院傳是堂時挈諸生遊其中闡明聖學士蒸蒸奮若謂明師在上良朋在列所不辨志以至成志者非夫爰彚其姓名字貫為同志録同志居仁同志由義自同志於學也粵稽堯舜以志成帝禹以志成王臯夔稷契益以志成贊襄孔孟以志成開繼或同志一堂或同志千古爾多士同其志即謂同諸聖哲之志可也以斯締交亦以斯久要蓋直指之志如斯爾多士不相渝斯為不負余嘉其志更嘉其同乃題數語拭目以觀其成傳是堂合編序夫道以學明亦或以學之偏焉而不明故學必有分非以一登壇講論僅優於不事學者便可謂明道也學不足以明道矻矻亹亹何為故子思薄賢知而道中庸孟子舍夷惠而學孔子學固有正傳也大江之右有南臯鄒先生學孔子之學徹悟立本𢎞大無邊而仁體盎然蓋初誦其書繼會其人而知之洵所謂傳之正者柱史李本晦氏與同里而從遊久蚤得其傳按歷三藩所至興會闡學竟日不倦會録其所語語成卷帙余得而卒業大槩南臯之學也即孔子所傳之學也亦即唐虞以來相傳之學也比付之剞劂而奏議序紀書答文告胥萃命以傳是堂合編若曰皆是物也從昔名世碩人對君戒衆序述書問何者不本於學不本於學者巵言耳奚以格上喻下孚友而垂逺壁經所載陳謨布告尚矣端木東里以辭命安邦而杏壇所紀固撰著之衡也故學以入道何不貫道以應用何不臧謂編中諸項皆柱史之學可矣余歸自京師方抱疴杜門亟赴會於是堂官師紳士耆民俱集問難互發無微不抉窺其直露本根不規規邊隅以自域其視人無不可親藹藹沁入羣心故曰南臯之學也斯為正學而道由以明明斯傳矣士君子之學原為道計其於道為明計明道為傳計將令千聖如存萬年永揭實式賴之學不當如是哉乃識數語以告夫共學者知辨宗云贈鹺臺侍御緝敬李公祖育才傳是序李侍御緝敬奉命來按鹺約躬貞度百務俱興尤嘉惠風教軺車所至輒興會明學羅所得三藩之雋士於城北育才館昕夕課訓復念城中無聚講所創傳是堂而時時攜之遊闡千聖之祕期百世之業其一段謙沖慈藹之度浹入衆心士無不若於化者會瓜期且屆而侍御兼有歸志諸士將祖帳東門而難於别謂余盍為言余惟古昔多治學明也叔季多亂學不明也士狃於帖括工於鞶帨僅借為青紫之梯終身讀聖書不知聖學為何物如是者不明或從事講學矣而泥於畛域錮於意見曲而不全局而不徹如是者亦不明由前之説將染於流俗勢利之陋固足以殃民而蠧世由後之説雖其斤斤自好優於儔伍然亦未能充滿分量纇潛而不自覺亦以學為世病學可不辨哉吾鄉先正文清生平篤學直至性天之通文成倡道南昌直指良知廓清障礙其門下二王輩剔發無遺而鄒氏則前有文莊今有南臯俱得其傳蓋江右多君子法堂相望環聽如雲譬則五都之市必有佳珍而終歲刮磨精光乃露冝其然也侍御産於其鄉甫離襁褓即立父師友朋之側衆美躍如聖真卓爾耳於斯目於斯若呼茶呼飯以為常是以入之深而得之正也竊謂侍御於吾邦厥功甚巨迪多士以入道衆著於聖人之學矣蓋皇朝育士士人業舉原是如斯而囿於辭章溺於名利非其初也兹之啓聵發蒙躋諸聖域是功在士類猶之乎學也而千里之差起於毫釐孔孟之學自有滴𣲖正傳既揭周行乃顯是功在斯道然在道亦在士也為士亦為世也士既得未曽有其可忘乎夜光在野耰人揮鋤弗顧不知寶也或拾之歸未能什襲旋亦遺忘猶之不知寶也余望諸士終侍御之訓勿曰流俗可安勿曰小成可限期盡其才務傳其是將文清文成以下比肩何有馬首雖南不殊函丈之聚遂書此以朂多士以別侍御仰節堂集卷一
