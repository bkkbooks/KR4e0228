body:
  text: 仰節堂集巻六明曹于汴撰祭文祭王心齋先生文於惟先生崛起海濵剛果真切必為聖人竟纘斯文卓哉先覺不揣愚䝉謬懐聖學風靡習積乍開乍昬趨蹌祠下仰止芳芬䖍具牲醴再拜陳辭於惟先生牖之翼之祭慕岡年兄文萬厯三十四年五月五日慕岡先生馮兄既病故百餘日矣安邑年弟曹于汴銜哀瀝臆自京寄奠曰嗚呼徃歲余里居猶相聞問譚我出處今春自家入都私念當有詢請每條畫于衷云三月初忽聞凶耗其言詫異至謂被戕嘻豈其妄耶亟思訪其的然囁嚅不欲啓口業不可以奈何遲一日入余之耳余猶一日可遣也間于坐次聞客談則云謂戕者妄其物故真嘻妄則俱可妄耳亦置不聽既而談者多且其人自泗來余心覺其真然竟是傳語庶㡬其猶妄乎無何西太至曰朱一鳯以書來訃嘻豈不果真也哉五内如搗懸其像伏而欷歔尋且時坐其傍以為未死嗚呼兄與余同年同門余宦兄之隣郡間過兄之草廬未嘗不質疑炙範至移晷不能去近離逺别亦未嘗不緘言開我其奥妙余未能臻然砭余病痛則没齒不諠焉兄之向道極蚤求道極切研道極沉見道極真體道極實志躋聖域慮周天下月有得而歲有進其仕于楚以一身博萬人之命恬處囹圄殫思著述精闡聖祖晰剖儒禪乃更大進滿其造詣何古之哲人不可鴈行者余得浴化承誨或亦寡過而毫芒自效何捐我而去乎誰與掖我之靡呼我之瞶濯我之垢乎此余所以哭也嗚呼生也衞道豈死而遺明也憂世豈幽而忘不遺不忘猶有牖余之衷者矣明晦北來相與咨嗟追悼于其旋也附以瓣香哽咽陳辭告諸柩下兄其鑒饗祭劉朴庵兄文惟表裏之河山何崚嶒而澄澈獨于公乎鍾粹凛終身之介節甫弱冠已躋賢科校繩樞之貧士而無别迨五旬登第于南宫仍跨蹇西還而終養高堂之華髪繼典錢榖皭不受涅再入天曹筐篚謝絶不矯矯以自彰而寒氷美玉俱讓其潔又喜施與故恒匱竭辭主爵之榮如脫遺蕭然迴故里而秋毫無衊布袍歩隴畆之間疏為餔而水為啜野老不識其為貴人天下望之如泰山嶻嶭忽罹脾疾荏苒朞月乃自製數金之棺床頭陳列及屬纊猶莞爾㣲笑遂成永訣篋内惟敝衣數事囊底無金銀之屑且遺命勿焚楮鏹葢不惟清于人間而亦將清于九天之闕嗚呼立懦廉頑之師既逺誰踵其轍若公者豈非超然振世之豪傑至孝天植至友軼倫包羅今古揮灑辭林兼精武事可蕩羣氛義有可徃奮不顧身倘竟其用當有赫奕建樹而胡遽沉淪余悲鄉邦之失良友慨廟堂之殞賢臣相與聚嘆雪涕繽紛若乃門户荒凉二孤在抱室㓜女孀而甑且生塵則又念公之私而不能不咨嗟愴神祭知一張先生年伯文嗟大道之乆闇紛曲徑之多岐或真性之不冺亦日用而㒺知聖不講以為憂衆居之而不疑于齊民乎焉異愧抱筴而吾伊既成名而抛巻程與朱其為誰文清之㞐伊邇草封法座而疇依惟先生之崛起仰前修以為師或授余以格語聞空谷之音而歔欷匪若人之徒與世道毁而誰持矧有子以述繼文炯炯而在兹挹高風以一奠神洋洋乎鑒斯祭宋正吾公祖文維萬厯四十三年歲次乙卯夏六月之十日安邑曹于汴方伏苫塊聞㕘藩正吾先生宋老公祖之訃為位而奠揮泣陳辭曰昔歲公起自田間憲我晉陽余聞而深用慶焉非謂金紫之榮足以榮公也非謂世好之誼足依日月之光也惟是以世乏真儒乃無善治學道一脉關繫匪淺而俗鮮志學恬不為念則日覬問學君子易士人之耳目心志挽之濂洛泗洙其庶㡬化行俗美天地之心生民之命可立三五盛時可復睹也昔宦淮隂奉公謦欬其嗜道甚篤一别㡬二十年而公之孜孜不厭有如一日都門再晤凝然端定淵然沉毅洵足以鵠士人而翼聖真是以為吾晉得公賀也公巾車抵署輒與同志當路以興起斯文為任將一世利藉豈直吾晉之一方為幸哉公亷于律躬精于修政癯然抱恙則時以將休致示余而余每殷殷請留徃歲以齎捧行僉謂公將不來而猶竊望其來也邇時詢北來音耗或謂行當還任則甚慰忽報使者及門意公必有書到匆匆啓函則公子弟訃書也嗚呼悲哉夫闡揚聖學作新人士蒼蒼者天豈有不願而何為奪公之速殆不可解常謂人之大不幸在不知學而貧賤饑寒不與焉公去而不復呼瞶不復發䝉不幸者何衆豈直余一人之不幸哉居憂抱病荏苒委頓僅存喘息慘慘乾坤能復堪聞此變耶公生平無愧去亦何憾遺孤雖㓜能世其學天必有以報公矣河山遙阻慿棺未能無次之辭聊以寫哀公其鑒之祭鮑中素先生文嗚呼弟之得交于公也二十餘年所每窺公峻潔之操勁挺之力高明之識淹博之學溫藹之衷竊依依歸向暌違旬月輒慮鄙吝之萌也或寓邸促膝或勝地話心從無一字計官爵升沉榮禄得失及互有私囑惟以維國是培善類修職業之兢兢相朂而已矣迨壬子冬弟以無當于世而求去公亦以人之不容之也而求去猶于蕭寺送弟行尋亦南矣此後天各一方鱗羽且稀况望一對顏色乎當是時世網甚固林園亦甚適盖皆若將終焉公曾寄弟字云相思之極安知無相見時比庚申時局復更弟叨備起數次年公亦起私念固可如約不則亦可通問葢弟猶次且里中未果于行乃移書洪桂渚先生托致意于公趣公之出乆而乏迴音則桂渚長去矣既聞公入朝乃致書于公述托洪轉致之意亦乆而乏迴音則公亦長去矣嗚呼痛哉相繼云亡如我邦國何如弟愚昧何今歲四月十日弟方入都門聞公靈柩尚在旅舍出于望表自念十二日見朝畢當赴几筵一哭及朝罷僕夫告余云靈柩于十一日行矣驚怛無措豈死後隔棺一拜亦不可㡬倖耶嗚呼痛哉公造詣精深勛猷宏鉅聲聞流播䘏贈優隆所謂可死者耶公昔與陳赤石先生同遺弟書公去後不三月赤石亦去弟竟未獲一面縂令人悽楚九原相聚想如平生睠今外患内憂景象如斯豈以已成别世遂漠然乎抑亦念我不世出之聖主亦一慨乎抑豈無所以啓弟之愚者乎嗚呼痛哉弟從諸冠紳後致束芻矣悲衷如縷不能自遏聊陳不文之誄再效漬鷄之奠若謂此遂足以寫哀則猶未也公其鑒焉祭鄒南臯先生文天啓壬戌晤總憲南臯先生於帝城是年余忝佐憲未到任而先生奉㫖歸次年余亦得告還里問訊不絶尋聞先生之訃愴然驚惻乃瀝誠為誄寄大江之西而奠之曰惟去聖之遼邈嗟正學之荒蓁不學者固甘厭廢其學者或意見之斤斤辟畫地以自隘遜神妙而逡巡誤天下亦毎出於君子誰知學術係理亂之根如有㑹聖學者斯萬類之洪鈞以愚窺於先生洵度越於等倫秉聰明之夐絶艱難歴而體騐真直徹於未發之祕日用悉徳性之循安排絀而任天以動藩籬剖而肫肫其仁愚曩僅誦其書頃年乃幸炙之親辱先生不我棄若謂可與深論顧酬應之鞅掌尚有蓄而未遑盡詢倐南北之分袂猶賴郵筒而問聞俄長去之訃至頓悽切而愴神嗚呼悲哉先生之著述滿世而高足者能繼其芬文在兹而未喪知浩然以還蒼旻遙寄誄而一奠擬微悃之藉申安能揄揚乎高美聊以見吾學之有遵祭張生旭初文維年月日師曹某致祭于賢年姪旭初茂才之靈曰痛哉爾之去也苦哉余聞爾之去也前月卄一日聞爾大變驚惻不知攸措然猶不敢信走使詢訪瞪目而望其為訛也頃之有的耗痛哉苦哉爾生善人之家何乃夭死况死于盗乎爾恂謹無可招怨貧乏無可誨盗何為死于盗之刃乎余不自揣每懐得友以明此學蒿目而求者若而年明頴沉静如爾者指不多屈近者爾以書寄余欲從事任之一字私心慰藉不可言喻今已矣夫是余之徳薄福薄匪特爾一身之厄也夫求任道之人于今世極難耳未任誰任既任而復畔者有之昔余求友而或未得曾有句云天意未終厭㑹當愜所思或既得之則云吾今可以死今日之禍天厭余也夫吾豈可以死乎哉痛哉爾之去也苦哉余遭爾之去也豈氣運衰薄不克毓賢俊辟彼土力之瘠不能成嘉榖也乎爾父年高爾祖母年又高爾常切切在膺者將如之何吁嗟此爾一家之厄而厄豈止此乎余哀爾而不知當何以哀也余恨戕爾者而不知當何以恨也余瀝余衷而不知當何以瀝也痛哉苦哉復何言哉仰節堂集巻六
