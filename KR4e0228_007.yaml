body:
  text: 仰節堂集卷七明曹于汴撰議防倭議為東封報竣倭撤無期乞嚴飭海防以戒不虞事近蒙憲牌㑹議防倭事宜職素淺暗非其人也雖然沿海道里之險夷兵卒船馬之多寡業嘗畫圖貼說各營將領之才品投揭具呈矣其將之可恃者冀任之不然者調停之將得其人則扼險練兵造船製器戰守機宜俱當聽之豈不愈於操觚而空談哉惟是兵寡當增而增兵又艱於餉則有司者宜有所處然江北民力竭矣增之閭閻勢不可支增之商稅商憊已極近查得廟灣稅銀嵗可得五七千可養兵五百及議留贓罰歲可得萬金可養兵一千此外無有也夫增兵千五所增幾何况倭訌境土商旅絶黎庶困二項之銀可隨取隨足乎則選鄉兵練壯勇留班軍清屯衛誠計之得者也而說者猶慮其擾民未必可用矣然則增兵亦誠難哉且淮城之衆計日而糴無半月之積城守不通潰將自內所憂乏餉豈獨披堅荷戈者乎今日之計誠無完䇿矣職書生也幼讀孔孟之書謂聖賢之道必可行古人之事必可法七年蓄艾未為遲也亡羊補牢不為晚也夫古者兵民不分有事𨽻伍無事歸農即此人也後世民苦于征役不能仍為兵則兵與民為二竭民財以養兵故民困財盡不勝其供故兵亦困乃今日又有異者兵之中又分為二則衛所之軍與招募之兵是已何今之為民者三也倭醜狂謀邊陲告警皇皇無可為備逮戎馬逼臨勢必調客兵以禦之倭一敵也客兵又一敵也幸而成功死亡過半矣幅􅊷千里比屋百萬似不患無兵而竟無兵似不患無餉而竟無餉其失有三官失其職也民失其所也政失其實也何謂官失其職國家設官亦甚備矣姑不枚舉辟如官以治農者所當行阡陌治溝洫課耕穫議牛種墾荒蕪教積貯此外非其職也官以巡捕者所當日練兵壯夜走通衢重關擊柝譏察奸宄緝防盜賊此外非其職也尹縣者以縣為家者也守郡者以郡為家者也佐二之職皆其職也職之內盡與不盡賞罰行焉職之外則否今則農官不知農捕官不知捕或賢而賞之不以其能農能捕也或不肖而罰之不以其不農不捕也推之各職莫不皆然彼但役役于奔走簿書溺其職矣夫官不必同無不職在安民者官失其職民將焉賴奈之何不窮且困也何謂民失其所夫今之民亦大苦矣積敝相沿不但苦之者以為當然而被苦者亦以為固然有苦而知其苦者有苦而不知其苦者追徴敲撲明顯易知者不暇殫述樵漁之微無不𨽻名于上糞穢之賤無不抽稅于官有知一筆一墨之有倚墻以伺者乎有知一紙一薪之有杜門以竄者乎有知寸許箸僉之纍及畫工乎有知指許楮花之苦及花匠乎環向而執役者誠知其勞而此人之衣若履若器具亦知其纍及數家乎一署之內一日之間廢生業而愁苦者不知其幾况乎四境之遠蔀屋之衆亦有臨食而思其饑舉衣而念其寒者乎嗟乎此其間難言矣天下多急于獲上而緩于恤下天下清有司常多而窮鄉官不多奈之何不窮且困也何謂政失其實夫冉求之志止于足民實能足民者也季路之志在于足兵實能足兵者也今則不然上之責有司與有司之自許似乎無所不能而究則由求之賢不多見焉則政務鋪張而鮮實效也辟如保民一冊豈非循良首務哉今日曰開荒若干明日曰招撫若干今日曰修社學幾處明日曰講鄉約幾次果開耶招耶修與講耶則田野何以不闢而教化何以不興無乃飾目前之文具費一畨之公移乎上以督責行下以依准應下不以虛飾為愧上不以相欺為尤推之年終諸册大抵類是上下相䝉澤不下究奈之何不窮且困也夫民方救生不遑疾視長上安所徴餉而又安得藉之為兵兵食不足職是之故夫古者天子巡狩亦于土地田野之間省耕省斂耳台臺代天巡行謂宜風勵各官存恤億姓斬削繁苛一意休養一事而益于民則舉勿以善小而不為一事而損于民則革勿以惡小而為之大約以孟子之田里樹畜庠序孝弟為主而參以時宜因乎土俗修政以實辨官以職必令家給人足上下相悅乃以見行保甲寓以選兵略倣四時講武教之戎事未有不勇且知方者何慮兵不足哉夫居今而言古涉于迂矣惟以胞與之風微故官民秦越功名之習熾故真意不流也請乞台臺闡明聖人之學以倡有位之士道在人心原自未泯在有所鼓之耳夫急則治標緩則治本今當事急之秋而卑職為此緩辭惟以諸所條議業皆臚列而陳故敢以本之說進否則因仍敝陋日深一日㑹睹此生靈之塗炭矣結民心薦竒才議為感時激衷懇乞申飭有司固結民心以防不虞併薦奇才以備折衝事職方患瘧困卧閲邸報見朝殿火灾為臣子者只得以天心仁愛為言顧一火再火宫闕為墟若以不必然之兆揆之良可深慮雖甚不忍言而亦安得晏然已乎邇者礦役大興名山深谷發掘殆遍占以洪範主有旱乾之災旱則盜起其禍固不但倭患而已夫淮隂南北之咽喉運道京師之命脉無論江南江北有弄兵潢池者必不能忘情兹土且也潁夀之積盜通泰之海賊睥睨而思逞豈不可危哉夫于無事之時為有事之備則事舉及其有事而後圖之亦已晚矣夫有司受君之榮食民之奉脫一旦有變此身焉往又豈容束手待斃誤天下事貽萬世笑乎其途有二提兵𠞰賊反亂為治上也堅城死守張許爭烈次也二者非民何賴焉乃今之有司之于民何如也只如近行鄉兵一節豈不甚善乃多廢閣不行非不可行也所以奉行不實耳夫善變法者法變而民不知善得民者令出而民不違儻其捐損威重躬歷閭閻曉以禍福約日刻期以示信舍輿就馬以示勞挈糗飲水以示不擾民有不欣然從者乎此其一端耳治民者感化在平時撫養在積久投醪可以得士挾纊可以動衆問疾弔死可以興越滅吳理勢固然有不爽者今之有司以文移簿書為急務以催徴搏擊為風裁秦越其民民亦秦越之家無蓋藏饑勞不息風教不行情意乖忤非旦夕矣脫有緩急此必不濟之數也伏願台臺特行申飭俾其大破積習加意撫字解其繁苛課其農桑勸以蓄貯作其忠義倡以勇敢練其武藝四境之內孰饑孰寒何害何利夜而思之晝而圖之若養赤子若治家業不必聲聞惟求實益夫父母愛子豈諄諄然告之耶而子未有不知者其精通也有司愛民如子民焉有不附者由是比屋皆兵民財皆餉守則有不拔之威戰則有直前之勇所謂常勝在我計無出于此者蓋百姓之轉移視有司而有司之轉移又視台臺也然此責守令耳用師之要先于擇將得一良將愈于十萬師顧非常之賢不可以資格拘古有築壇拜將而驚三軍者誠知其人可任重也今有潁州武生李呈芬者力能舉重射能决拾智能審機然此猶武辨所易能者乃其忠信節義非禮不行雅慕聖賢竭赤軍國聞江西有道學裹糧求之得李櫧山而師之篤行不怠此亦今時所僅見者也夫使貪使詐不獲已耳若其不貪不詐而且勇可不謂豪傑之士哉伏願台臺召而試之若其可用委以一面必當有所樹立地方幸甚開荒議前䝉委查州縣開荒事宜繼閲邸報則業䝉具題設専官增鹽引以墾荒蕪行見赤地盡成膏腴災黎盡成殷富誠地方無窮之福也惟當拱候經理樂觀厥成然職奉委行州縣查報荒田良久無報者近有一二來報殊無多田問之則上之人原欲查無主之田招人開種而收其穫以充公家之急本處荒田皆有主不便報也此蓋有司不達本指故此疑慮然亦不可不申明也夫江北荒田為欵不同有人户見在而荒者有人户逃移而荒者其內又各不同其見在之户或欲耕而不能則貧農也或能耕而不為則惰農也其逃移之户或久無踪跡或猶在近處或里遞族鄰種其田而佃其糧銀或佃其糧銀而未耕田或無人可佃而其糧銀全逋又或有昔沉于水而今出今沉于水而可望復露或與河灘湖岸相連而莫辨或鞠為茂草而鬻薪以為營或滙為池塘而取魚以自活且不但民田有荒而屯田竈田亦然諸如此類其綿亙誠甚廣者若夫無主之田官可自耕而自穫者則海濵所淤湖波所退高岡沙鹵等處固當清丈募開而收其入然亦有數不可拘于此也今既奏請皇恩大行開闢必當一槩經畫興起農事賑助之鼓舞之招徠之稽察之掌印治農等官减去騶從挈帶餱糧巡行于阡陌之間集其父老相其地宜給牛給種為塘為堰稻麥隨宜糧差緩科務令有利無害使無業者有業不耕者勤耕居者豐足逃者樂歸歸者得所因而建樹社倉即倉以為社學即學以明鄉約即約而寓講武且其溝洫經界之中不特可藉禦侮而亦可兼治河一事而數善備焉豈非根本之上計乎若但求無主之田官耕官穫而已則官與民隔矣行之而善倉廪可得豐盈豈云無補行之不善則官户侵陵小民失業皆基于此宋之公田豈非明鑑夫足食以足兵從古言之然所謂足食者豈僅僅令荷戈之士飽食而已乎伏惟台臺為久遠之計造生民之命必有成畫伏乞于頒布章程之時明示羣寮以足民之意將見閭閻樂業親上急公皇圖鞏固矣仰節堂集卷七
