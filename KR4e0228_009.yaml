body:
  text: 仰節堂集卷九明曹于汴撰尺牘復馮慕岡承手教示以知人之方及州縣賢者敬謝指示河淮大工人力已用什七八淮口青黃頓分夀伍之間無水亦明效也乃貴鄉猶有遺議至畫積水圖以動觀者謂祖陵之水未消髙堰猶然為梗也此其見稍偏淮揚之人折之曰彼援祖陵為辭耳此其見亦偏泗人不以祖陵為言誰問泗者淮揚之言不信於盱泗疑其偏也盱泗之言不信于淮揚亦疑其偏也故君子大公無我泗人淮人何異焉然則髙堰可拆乎曰拆則不利於淮揚亦不利於盱泗不拆則遺害於盱泗亦遺害於淮揚何也巨浸茫茫一旦決之淮揚且為壑淮水南行失其故道清口將為陵運道中隔入海入江無途則壅緩如故豈有加於清口之宣泄哉此所謂拆之兩不利也堰障而水聚泗盱實受其禍川壅而潰淮禍更慘此所謂不拆兩遺害也為今之計則有料理黃􅄵新河加堤防決俾不壅淤永成順流嵗闢清口盡此積沙而後已去年闢七十丈矣多多益善他日淮水將不及髙堰之下焉能為有亡哉大抵淮黃至此俱稱尾閭而顧此顧彼關係重大誠難為力當事者當無忘今之大工不則無以勵人心而集羣力諸有司當不以為勞而益用劻勷若治其家積水然則事濟矣其相機相地營度事宜在主者為之又新河下流有數決口聞所決籍家河深闊可以成渠下海不妨因而順之但期於水之有歸在此猶在彼耳他如蕭豐之上黃水出黃堌者十之六七徐吕之間淺且膠舟儻一旦全徙運道不通且逼近祖陵肘腋不可不慮此亦一喫緊事也弟今寓徐老年丈何日可至容一晤請益也復馮憲卿泰州為心齋先生之里遺風未央唐先生闡其教王生繩其武以門下之英頴逰其地與諸賢相切劘千古事業端在此矣近得同節書舉門下所謂無天無人自在之説相質正夫此實太虛夲體顧實際何如耳得今翰乃知有為而發門下固求實際者非茫茫空蕩者比矣根心之説亦是此意誠得學問頭腦孟子曰根於心施於四體四體不喻心於何有故曰一正百正百正一正一亦心也百亦心也門下與同節探討精進其謂之何承教髙趙葉丁梁潘王等及令弟諸友力學可喜可羡世教當終賴之惟一一致意并致意唐先生及王生不佞孤陋荒廢幸相扶持不盡簡晉柏陽春闈後讀老年丈佳卷謂當九萬圖南也不意仍遲一科天所以厚其詣大其發也然在兄在弟亦何殊異哉朝廷用士將以勞之辟如一大擔長兄先荷之弟且就逸然終有一勞耳聞年丈發憤益力更卜逺到但不知所學者博一進士而已耶士為秀才則忘其為童生不知秀才之榮也為春元則忘其為秀才不知春元之榮也為進士亦然科名到手便成見在種種責任方費料理君王如天兆民如嬰國事如毛小人如鬼衆口如酷吏青史如地獄豐績宏聲言何容易不為之奚取爾也弟為窮秀才食粗醉濁殊無苦一行作吏卑卑無樹居常點檢汗顔欲淚髮髭為白則不學無術不預之過也年丈燈忩多暇早備為妙弟辱知愛乃瑣談若是然亦知年丈他日不至如弟之不預也諸惟鑒照二兄四兄致意不一復潘生以忠韓侯解入刻足慰千古乃不佞荒言亦附不朽幸甚愧甚門下主張會事條理精詳更用羡藉士君子達則行道濟時處則明學善俗莫非政也書曰敬敷五教在寬寬則涵之以養需之以漸造之以器無大無小使其樂為之日遷善而不自知然有身教有言教身教者樹之以表先之以勞使其觀感而自化言教者呼其瞶發其矇警其怠鼓其奮彼方鋭於善不妨以直彼若苦於教不妨以婉諱其過使其可改揚其善使其更進大要於事親從兄親戚朋友飲食衣服耕讀交易行坐言笑之間不背天理而止矣語云教亦多術又曰成物以智孟子好貨好色之對最善成物者也孔子以無違告樊遲以鳴鼓而攻命小子成物不倦者也諸惟類推不佞拭目以觀化成之美矣會中不暇一一惟遍致意為望簡談同節元友到得手劄欲卜諸夢寐夢而不夢及欲念念通人以驗息息在道俱髙邃之思也然不佞竊謂夢可卜也可俟也不可為也工夫自在夢前耳念念通人亦可卜也可俟也不可為也修道如決淤淤盡而萬川滙一不淤之決而欲通衆流此海若之所笑也故曰剖破藩籬即大家工夫在為大家之前耳才覺通人便屬爾我此豈可措手哉冒謬之談無足採録但不可虛遠問乃爾不佞不學作詩然或自病自呻遂成小語無足觀也洙泗考略轉致一儒者其言亦有異同然人各有見亦未為礙候全刻再與之議惟鑒復鮑君傑賢友以上乘相問甚嘉意也一向布施濟人而上乘即在此中不在此外但自思量其一切布施有望報之心否要人知而稱譽之否其或人不知人不感亦懊悔否行此善事亦頗自負否及見人有德色否有一於此雖罄産濟人亦落最下若無此等心便是最上乘也又施財亦須分辨有厚薄有緩急其中當施不當施當多當寡俱有天然之則若合於此雖不施亦為上乘若不合於此雖罄産與人亦落最下惟君傑講求體認之新堤建閘極妙得會簿見會會有人不佞喜不自勝此諸賢維持之力也不盡復談同節逺辱佳詩又相質疑幸感幸感不佞慮紕謬之見無以相發也乃以來翰求馮年兄慕岡答之今具於後馮兄之意大抵謂近時學問非以舉業規名利則習禪圖自在二者俱非也學者惟從事五經六藝實體實用乃為聖學惟同節共諸友留心體貼可也共發語向承梁子晉及李明晦俱有批竄待從容商量削正前囑勿傳布者正謂此耳貴鄉少雨可慮會中不皇一一惟致意來問云葉中興言性體常定不因怒遷不因過二梁兆明言怒即是性過即是性云云慕岡曰怒能觀理故不遷過能復善故不二過即性謬矣不因過二亦無必復於無過之意習禪説談夲體與好學不相應來問云大禮兩會梁兆明於祠下明曰昨會子似色喜今似色愠何也禮曰窺及當下即了不覺喜恐終身不了不覺愠云云慕岡曰終身無日無當下了當下盡之矣或喜或愠乃所值不同當下順應應之得宜乃謂之了空蕩非了手來問云馮世明自泰回謂豫近月以來只覺自在無天無人無有為而為無無為而為大禮曰名利心不可有為國為民心不可無不可有要做聖人之心須做此不要聖人之心云云慕岡曰喜自在便是禪病常戒慎方是聖學一日十二時中宜動則動宜止則止宜語則語宜默則默皆出乎自然如賊至則剿除之賊不至相安無事有無兩字皆下不得要不要皆説不得來問云江凖言性無生死能生死一切大禮曰性何生何死何是非成敗而世有以此對待者人為之也識神所藴而性體初無之也云云慕岡曰性渾然自有條理對待非人為也識神即性不可看體用為兩來問云趙有年謂人之學晝觀妻子夜卜夢寐大禮曰夢乃識神非性真也夲性真體無夢也禮每悚惕於此旦必告天冀上天之天開聰明之天云云慕岡曰動靜云為只循天理則妻子自化夢寐自靈必欲分别識與性却是癡人説夢扇搖則有風扇大則風大風非扇有乎知扇則知性何必苦苦求上天要了生死即是妄想妄想陋識也來問云鮑越謂我一生作功德事聞此外有上乘工夫大禮曰根在性命則為上乘世人剽古人塵言寶而含之空有大言反不如實布云云慕岡曰有餘則推之無人德我之望此即上乘惡古人塵言恐為餓夫須因言得意推以布施來問云先生翰示曰更得如張三光輩童生十數人教以五經正義以延道脈云云慕岡曰五經之學破今世之弊習夲生前面為禪説牽纒縱説得天花亂墜止做得一和尚後條宗五經之教厭科舉之習乃透乎道矣五經體認得透則禪説不攻自破馮兄諸説俱係實地工夫非空蕩者比大抵古人近思今人逺思古人勉不足今人盡有餘中庸不可能所由忽跬步而騖千里也孔顔傳心在四勿惟諸友熟思之復趙乾所承教以一念不起為安身立命自是至言亦自是究竟弟向為鼓譟諸生而發亦第謂其不知于道理著腳耳但於名利營營耳危其身棄其命而已矣然淺言之則多行不義固非安身立命深言之則行一不義而得天下遁世不見知而悔亦非安身立命也身為何物也七尺云乎哉命為何物三寸氣在云乎哉知身則能安身知命則能安命故進學在致知人何嘗無知蔽之者暗鏡何嘗不明垢之者昏致知者復其知而已矣有競十間門面者夜不能寤晝不能食忽而知有廣居天樣大也粲然一笑遺其所爭如粳粃今世士子錮於習染了不知有至大者在而謂功名富貴可以置身其間至榮至艷豈非置夜光之珠於塵穢哉何啻鏡之蒙垢何得不昏諸醜不覺至於鼓譟視若極得意事矣可怪也一念不起者止也常止則常知常知則常止止者默乎知者識乎默者直向內而已謬談如斯惟老年丈髙明裁正焉幸甚復婺源趙大尹青石恭承翰教亹亹真切仰窺深造來諭真心不鑿智故不設便自反無愧誠哉是言古聖人亦奚加此但士人或以非心為心以不真為真故或以負心為不負耳夫果真心不鑿以迹而晦何妨亦不云以仁得過矣非不得過不見其以仁得過而惟見我之未仁也故視世路常坦不見夫有羊腸也者又安見有嶮巇之甚者乎是以君子戒慎恐懼俾真心之不鑿真心在我如安輿如巨艦渡山浮海如履平地奚嶮焉夫不見世之嶮也庶其仁乎不佞與門下無半面之晤輒敢喋喋如此惟是莊誦教言非尋常竿牘之語不覺傾吐其愚冀獲砭正開我蓬塞復李肖溪札談諄亹良慰私懷齒及荒序更令人愧雖然所云月異嵗不同道無盡也孔子十五固已頓異豈俟十年一異哉其曰一日克復又甚直截如此不佞迂暗之質當此衰暮之年於世無當自忖未能有為謬叨起數已走力齎疏叩閽告休尚未得報辱奬借逾涯非所能荷又來翰謂因論水之清濁而或者謂水性不同且謂人性不同竊謂水之性一而已人之性亦一而已水經鹵而鹹經硫而溫鹵硫不同水未嘗不同也頗似人身衣錦則暖衣蘆則寒豈原有寒暖之身乎性非氣質不載人人有氣質人人有性氣質雜揉於五行不可勝算而性無有異以氣質之性義理之性雙提並論似有不必執氣質而疑性尤屬不可如金在礦砂砂有重輕金有隱現而金奚殊焉又頗如夜光之珠函於紗縠之中則氣質清者類是函於布楮之中則氣質濁者類是而珠何不同之有孔子曰性相近相近二字對相逺而言亦聖人口氣之婉也非謂有不同也今只論有無而已向行道之人語之曰聖人有性衆人無性定不以為然既已有矣一粒即全丹也一隙即全明也一息即千古也烏能以為有不同乎吁性之不明盡性者寡也儻不之求盡乎即喋喋於同異吾輩亦漫談耳鄙見未知是否讚孔子手書讚道泄先天羲皇一畫纍牘連篇靡軼於閾尼山六籍萬載章程矧遺手筆不寶如璜士也撡觚欽其手法士也希聖遵其心法心法伊何罔越於正昔賢有言心正筆正孔子手植檜讚尼聖植教萬古常存尼聖植檜亦萬古常存教之興替世運攸繫檜之榮枯亦世運攸繫教繫於世是或可知也檜繫於世是不可知也聖不可知之謂神惟不可知斯為聖神陳楚英先生像讚壁立修容電翕雙瞳寒鐵生風望之心折對之僂躬是忠烈孫公乎忠節許公乎抑忠愍楊公乎或告我曰貌未必同貌不同而浩氣同不畏強禦同不怖死同不死同扶持國法如山同憲百世而起萎薾同嗚呼三公其公公其三公古人云死生大矣然則得失升沉其小者也先生執法忤權之死不怵不搖於大何論其小世人且勿搖於小耳浮名細利輒憧憧而曰我可以死其然乎余既讚先生因三嘆附此慕岡先生像讚形魄有往丹青寫神衆皆曰兹殊未肖而余視之若真憂時之色可掬凝道之思猶存倐栗栗以如秋倐藹藹以如春豈先生之精隨余之目以聚余將見於羮墻况其峩冠而垂紳謂先生為既歿余之失此友也則亦淺之乎其論斯人自題小像畫成自顧為之莞爾吾不期汝髯龎亦爾將草木同腐耶不當其爾四旬七又題小像兹其為爾也乎其非爾也乎爾若斯已乎其不若斯已乎爾不既皓然乎爾不睹乎銘素帳銘長至前題采帳過華余厭其靡青帳近暗簡帙艱窺乃素其帳藝忩是宜旭日相蕩洞若玻璃端居草榻黃卷任披搜羅彚品宜契軒羲暗則為隂明為陽相陽德光明君子所尚表裏瑩然無人我障纎私匪匿八荒同曠似啓重門千目慿望有坦然心無厭然狀適兹在兹余省余衷儻有微翳蕩以徑風晶晶朗朗如彼太空乾元用九是欽是崇惟乾之九肇於潛龍浮情憍氣敢不磨礱乾乾惕若明示要功聖言如蔡萬古開蒙履長期屆一陽遄通復兮防剝維陽是洪乃敬銘此用借檢躬仰節堂集卷九
