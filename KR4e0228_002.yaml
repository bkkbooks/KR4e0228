body:
  text: 仰節堂集卷二明曹于汴撰序安邑縣志序昔者竊聞之一家之政六曹具焉家必任用人吏也必有經費户也必有四禮文事禮也必防冦盜戢外侮兵也必有束禁夏楚刑也必有田廬器用工也六者一有弗飭不謂善齊積家成邑積邑成郡積郡成藩積藩成天下六者一有弗飭不謂善治平地域有廣狹幾務有繁省而政無兩岐是故百里之長協寮帥屬吏事修明天曹之邦治户有蓄貯室無離析地曹之邦教崇祀優賢一道同俗春曹之邦禮詰戎除械有備無虞夏曹之邦政刑期無刑奸豪不逞秋曹之邦禁城髙池深封洫服舍有章冬曹之邦事豈不關繫重巨建樹顯奕哉鳥得而忽諸然古昔經世宰物莫不設有方䇿載其典制而周官一書獨為明備上揆下守前憲後鑒由來遐矣繄我皇朝廟廊有㑹典諸司有職掌有條例史局有史而郡邑志乘權輿於斯焉邑志雖藐諸項俱該不可缺也余邑於余省稱劇二百數十餘年乃獨缺志前侯汝陽吳公臨清邢公嘗欲著之而未竟今侯上谷耿公明作庶政宣上意愜羣情肇未曽有頃督學呂公行部諭及爰命不佞從司馬先生之後及諸文學開局編纂考紀載於羣書訪遺踪於耉老聽評駁於輿論踰百日而志成為卷者十大端不越六事懼不核也亦懼不詳也第若不公而胸臆之憑不直而愛憎之比德意云何洵所未敢夫一畝之宅百十指之衆誰不按籍據譜思為之理安有籍四境譜庶姓肯屑越也者侯之斯舉視邑如家窺其一斑異日推治行髙等簡之津要宰天下如此邑矣道固非遠術固無多也刻禦邊集序夫用兵者驅千萬人效死乃能制勝千萬人之心至不齊死人之所甚惡也非精誠貫結豈克臻此乎自使貪使詐之說出而介胄之士或不知有仲尼夫貪未有人不怨者詐未有人不疑者縱令殱巨寇樹勛名要亦雜霸之習得不償失吳起諸人可鑑也況其下者僅成危敗天下國家何賴焉李子明晦研窮理學有年其修身應世期不愧屋漏邇者感東倭之橫有深慮於衷凡中外之情形防禦之勝算搜羅聞見彚而為集不佞讀之竟篇雅重其志念夫用兵呼吸變化莫可端倪誠不謂此集遂盡將略而將略亦不盡明晦然可得其槩矣因付之梓亦懷安攘之思者所樂觀也明晦呈芬字集凡四卷春秋房四書同門稿序竊嘗謂古者學而後仕後世不學而仕興治之難易所由分也然後世豈果未學哉失其所以學耳孔曽思孟之書童而習之經幾講授經幾研究摛而為文亦詣深趣夫至摛為文詣深趣也庶幾覿當年之面遊聖神之天矣措之於治何有顧以此為登進之階梯云爾綰綬臨民鮮回視燈窗之業者若謂當官涉世别有術焉有仍為孔曽思孟之談目以迂遠而不切於事情其術彌工悖初學彌甚而治乃彌不古若國家肇立甲令以經學訓士以經學取士豈僅欲耗精神於土苴哉弗思耳趙韓王非知學者稍稍能用論語亦足興王定治況挈其根宗明體達用其建樹豈尋常可埒辟之於醫窮軒岐之奧妙著為方論固將起疴壽人也主家敦請𤣥纁既陳砭針且施指其笥中藏卷曰兹不過羔鴈今者之恙操何術以治之人有不胡盧者乎頃謬從校士之役得士若而人各出其四書義稿選彚梓之余讀之喜諸士業已學矣積有良方矣繫之肘後往治天下焉雖與三代比隆可也春秋房同門經稿序昔仲尼論君子所懷曰德曰刑夫懷德足矣而刑何為乎德辟周行刑辟巖險以約之有不得不履周行者先正云春秋聖人律令也又云春秋夫子之刑書士宜何如懷焉況業是稱專門搆為文義如按律例成爰書撫卷悚悚烏容已乎全經不具論論首數段元年之述戒不仁也即位之削戒不忠孝也盟蔑之惡戒不誠也克段之貶戒不愛也吾而仁乎忠孝乎誠且愛乎讀之坦坦不然則夫子之筆若為我設敢不懷哉余不敏先為理官日檢律例治爰書書成未嘗不心惕也坐堂皇之上奮筆讞牒某坐不仁某坐不忠某坐不孝某坐不誠某坐不愛夫安知吾之仁忠孝誠愛何如也古先哲王立法垂憲以有形警之亦以無形警之或法及而人見或法及而我見法及而警焉者細人法未及而警焉者君子懷以言乎其隱微也邇從愷陽先生後以春秋薦揚多士士按聖經為文矣其用懷若何行且筮仕治民按律例為爰辭其用懷又將若何嗟乎箕子未囚也比干未戮也三桓未貴也通乎是可與論懷可與論刑可與論德矣劉公宰邢給由録序夫人生於親用於君事於民觀法於後人親胡以不忝君與民胡以不負後胡以佑且啓也光前者以裕後者也治民者以獲上者也民之不治君將不可獲何以徼光寵於親而作法於後然則民可忽哉匪治民無以報君無論前後矣友兄豫吾筮仕邢臺政成民悅既三載考上上天子勑嘉之貤封其親乃裒紀始末録而存之曰聊以示後人録成授其友曹子卒業適冡子本唐捷鄉書偕計南宮是又將繼志理民者曹子乃以重民之說為友兄朂其子語有之仁者人也舉天下之人言不能一天下之人仁之歉也顧不得馭人之權則仁之用不廣孔子所以栖栖皇皇願得君以治民也以究其仁以成其為一人而已矣豫吾之仕邢也邢之四封之衆計日而冀其至其得覲其丰采者相述相告有喜容不者亦詢諸人曰是何容貌齒籍殆將生養我儕者真如手足爪髮通氣於心腹矣豫吾登其堂涖其民民之弗食若其枵腹民之弗衣若其露肘境之左一人疾若左臂之木也境之右一人疾若右臂之痛也日調攝休養粱肉藥石靡不具舉又若心腹之氣貫於肢體蓋以四境為一人豈私肥甘以饜三寸之喉聚綺羅以華七尺之軀自小其人者哉今且晉西臺薦陟鼎鉉又將一四海之人矣故曰有大人之事其仁大則其人大也然則徼榮於君非幸也我弗二於民君乃弗二於我而併弗二於吾親究其仁而成其為一人也本唐為其後人將何以承之亦豈徒以得君為顯親哉顧在其仁民如何耳養心録序養心録者復元辛子以其學道所得録之成書者也堅貞之力精詣之語不可枚述其大者在以聖人必可為夫丈夫何畏有為若是聖人同類從昔談之近世名賢每謂滿街皆聖人世人髙於視聖卑於視已望之而心已震焉其學聖人之學者未嘗不慷慨思齊以為舜何人也豫何人也有為者亦若是至論及不思而得不勉而中亦未免遜於聖焉夫果聖人不思而衆人不能不思聖人不勉而衆人不能不勉相距何啻徑庭焉安在其滿街皆聖人乎解之者曰患不知思耳思之熟可至不思患不知勉耳勉之熟可至不勉果爾何不云滿街皆可至聖人而直以為皆聖人目之也不觀之孩提乎其知愛親也不思不勉也不觀之稍長乎其知敬長也不思不勉也不觀之乍見孺子入井乎其怵惕惻隱也不思不勉也滿街之人非孩提則稍長非壯者則老者孩提稍長既不思不勉而愛敬壯而老者又不思不勉而惻隱於孺子之入井是以曰滿街皆聖人也顧乍見惻隱譬發一葉於枝幹亦以知愛知敬原含真性於本根耳理本相因機無二致故曰非由外鑠也或又曰聖人不思不勉事事如斯若衆人者偶觸而得之烏得比而同之哉譬諸匹夫懷抱良璧雖其迷懵不自知而連城在握謂不可與富人同語不可也然則不思而得不勉而中人之本然也同然也養心者還其本然同然而已矣是為聖人也已矣泰西水法序惟上帝好生既生人則為之生食食出於地藝於人人有遺能地乃有遺利食乃不足其不足恆以旱乾天澤既不可徼則渠塘溉灌急焉顧亦罕所講究而西北之鄉尤未間習土髙泉寡井有淺深甘鹻大段不得水之用即有用之者工力繁浩不償所費然大禹疏治溝洫必於冀州建都之域不至獨遺今胡以一望岡鹵豈阡陌開後因仍墮廢遂謂水泉之利若靳於此方田家終歲懸懸占雲盼雨雨愆其期立視苖稿猥云天實為之人力無可奈何枵腹菜面輾轉為溝中之瘠而已矣太史𤣥扈徐公軫念民隱於凡人事之可興靡不採羅閲泰西水器及水車之法精巧竒絶譯為書而傳之規制具陳分秒有度江河之水井泉之水雨雪之水無不可資為用用力約而收效廣蓋肇議於利君西泰其同儕共終厥志而器成於熊君有綱中華之有此法自今始粵稽曩昔盛世首重民食而田器亦有司存周禮稻人掌稼蓄水止水蕩水均水舍水瀉水俱有經畫今也牧民之宰簿書不遑過隴畝問桑麻亦未多睹他何論哉雖前人樹藝之方載於月令諸編上不倡下不諳也食胡以足竊意冬曹當以此書頒之直省而方嶽之長宜宣告郡邑倣而行觸類而長尚何患粒食之難乎夫士人談及參贊遜為聖神若無敢望涯涘者不知此類事即贊化育井田壞而經界湮雖猝不能言復然崇重農功固王道之先也不圖於是而欲睎蹤隆古之治必弗可覬已且安有尊處民上坐享民膏不為民生熟計忍令其饑以死此豈天之意也哉治本書序夫井田行廢古今之關也隆古之時家均以田人食其力樂苦不至懸異風尚因之不漓後世反此安望至治然非但田之不井也野多曠土土有遺利公私乏蓋藏之積凶荒無拯濟之具饑寒之苦在民危亂之禍在國有由來矣今之牧民者相向嘆惋未嘗不曰風俗日偷徵納日逋然富之教之有先後焉為之用之亦有先後焉胡不思也戴肩吾有感於是採古今農桑樹畜之言彚而成書四十餘卷命曰治本牧民者得是書而推行之可以興民之利矣夫文王岐周之治要亦於農蠶雞彘時加意焉不此之務而區區於簿書之間抑末也其或率作補助之無方僅一傳宣聊示文具即云民不我從則過也又或奪其時傾其業斯民也奔走繁擾之不遑而曰爾胡不勤農亦過也噫古之人當官一日多人䝉福今之人當官一日多人䝉擾欲興利於斯民者其始於不擾哉九族類鑒序族而曰九析之也乎不如是則尊卑疏近不分奚而施其恩義九而曰族仍合之也不論尊卑疏近而恩義藹然貫也一身之中四其肢五其官五六其臟腑十二其經絡百其骸何啻云九然而疾痾痛癢無不相關不相關者木人也九族之痛癢相關亦然而相關者鮮茫茫大衆大槩木而已矣仁人視之不勝其憐焉此九族類鑒之所由著也著之者誰師文周君也君蓋慨末俗之日漓嘆同氣之不輯以家為型陶冶六宇援古證今法戒咸備而類鑒成焉為綱者六為目者五十有八首曰立宗壼閾以內秩如矣次曰睦族凡此同支肫如矣次曰教子聖功濬於䝉泉次曰事親百行肇於一本次曰訓內防其厲之階也次曰治生殖其穀之原也其義精其辭剴其指陳人情物理婉以盡玩之令人色動而頥解心悅而情勃有不覺其木之蘇而仁之浹者竊謂此書可置之座右人人為針焉一家之九族睦則為齊萬家之九族睦則為治天下家家九族睦則為平道有二乎哉君之所造逖矣乃題數語於簡端且將告於吾家之九族俾共遵奉而各告其九族則願諸天下之家家賀馮少墟先生六袠序丙辰嘉平月人人有真體浩浩乎無涯悠悠乎無盡與天地同其大與天地同其久一身處兩儀之中譬一指聨四體之內有精流神貫之渾融無一毫半息之睽隔不待智者可知也然或自生結礙乃與天地之大不相肖而其可大者自在或自生斷息乃與天地之久不相肖而其可久者自在夫其可大者可久豈不天地同壽哉無奈結礙斷息者衆也則以塵情障於內習見錮於外耳而壽乃獨歸之仁者仁者無結礙無斷息之謂也故以天地為一體萬古之前萬古之後天地之體如是仁者之體亦如是顧不壽哉古之聖賢或六十而順或六十而化順則無逆化則無窒無逆無窒故浩浩悠悠同流於天地少墟先生壽屆六旬門下士不遠千里質余言為賀以祝無疆夫先生肩任斯文躬行粹德研入聖神之微動為士林之鵠出則赤衷讜議揭國是而肅官常處則繼往開來立天心而植民命大道昭宣風行海宇自無結自無斷自抵於順自抵於化自大自久自符於天地之壽寧俟祝乎諸人士戴履於霄壤之間步趨於几杖之次先生陶其情鎔其習誰不剖其結緝其斷先生不二於天地多士不二於先生共無涯共無盡體仁之化何其宏壽域何其廣也抑人亦有言不負此日方為得此日彼靜恬自適之夫且詡日長似歲況有道之儒日躋而天遊月異歲不同乎故日月不至仁則日月成虛三月不違仁而三月非曠志學從心一息通於今古垂憲萬世尼山之聖常存先生齠年敏學以逮今日窺其功力蓋瞬息之有養衡其造詣偕六甲以俱崇夫是之謂六旬哉由斯而耆耋耄期頤至於無疆年且彌髙德將彌卲夫是之謂耆之謂耋之謂耄之謂期頤之謂無疆哉完其真體乃為其壽豈僅僅與尋常校年論齒已耶是則可賀也謹西向再拜而言賀楊氏七孝芳聲序淮陰楊氏通參公為其封母董孺人病篤惶迫莫可為計禱於天刲股為羮食之得愈公之子博士君憶㳂同配謝孺人復因公病刲股公之孫把總於庠亦為父憶㳂刲股於邦亦公之孫於郊妻許公之孫婦適陸率履者公之孫女一為母潘一為祖母某姓一為父憶木皆刲股乃謝孺人為處女十四歲時業為母于及既嫁又為博士君各刲股矣而博士君為諸生時已有孝子之稱於是縉紳戚友交美之或旌以扁或贈以詩文曰同心純孝曰奕世忠孝曰德行文學曰孝子名士曰孝順之門亦有未及旌揚者蓋有待也諸生於升亦公之孫而博士君之子也將梓其詩文以傳而求序於不佞時不佞且北行徒行送百二十里示懇也余以其刲股者七命曰七孝芳聲云因七人而槩楊氏之門因刲股而槩七人之孝耳借謂其孝止於刲股則通參公之清修崇望出處有聲果何物乎而其餘可推矣又謂孝止於七人則于升之奔走不遑求顯其先果何物乎而其餘又可推矣洪惟我太祖以孝治天下而刲股一事不在旌表之列非薄之也不欲以難事為民倡且慮其毁傷滅性重違親意也顧孝子當親之疾凡可救療不憚為之斯時也不知有旌而遑知有不旌夫民心積染或至路人其親區區財利校量爾我一語不相能或至反唇彼其白刃自殘視膚肉若瓦礫瀕死無顧豈可易及哉善乎盧子守恭之言曰以身療親身猶親自治自夫惟以身為親身故能刲股故能竭力故無以有已故不失身以辱親通參公可作或以余言為不謬矣送修吾李先生巡撫江北序江北為留京門户二陵所居實國家重地狼山直當日本東海衝釡山頃緣東方用武頻歲戒嚴顧濱海延袤二千里大港可出入者無慮數十而兵不滿二萬犀利之器無儲何以為禦然通泰鹽徒擁蓋建旄而僭稱號潁亳桀盜鳴鼓露刃而詬有司捕鹽緝盜之役陽食於官而陰以賊為利而諸豪猾不逞者時出飛語謂某且梗運河而剽漕粟某且潰諸堤而灌城市於是當事者蒿目深惟為一切增兵足餉計然兵餉取諸民者也而其民何如哉田沈於水一望成巨滙其一二髙原之鄉亦遂鞠為茂草郊野之民委身為駔儈日求米升許以糊口中人之産無五日之粟而重以河工之迭興大木之鱗集班軍漕卒之奔命榷使鹽璫之驛騷有司者惟催科箕㑹是急求免目前民以為不見德也不相親而相讐脫有緩急何恃焉故議者欲風勵羣僚崇重民事力溝洫以治水而轉害為利巡行補助易蒿萊為膏壤於凡蠧政妨民之習一力更始使野土無曠家有蓋藏不擾於公而暇於私然後計里為倉因倉為學因學明約因約練武以通上下之情若元氣之流盎內治外威於斯焉在他日南方有事吾將批其吭北方有事吾將擊其尾左提右挈據重勢而奠國家磐石之安顧不庥乎然此惟撫臺可為之而今撫臺修吾李先生則其人也竊謂天下無難為之地無難為之事無難為之時亦無不能為之人其人之不為者則以我心據其中而失其所以為者也李先生欲無我者知其大有為耳公起家地曹時執政握重權立能生殺人將置言者於危法公抗章申論遭左謫不悔豈計得失利害者哉既觀察三省揚歷兩京為今大理大都無以豪貴骫法者無以私昵幸福者無以盤錯卼臲衆所縮手而兩可依回者故政成人服所在垂永利其視營營顯膴問田舍急妻子不啻羞之方督學晉中一旦念其親輒棄官歸無異脫遺當在齊魯值荒疫匹馬走餓病萬夫中飯藥之殆不知有身每見其推轂忠義之士然其言曰忠義以自盡耳而矜已詡人何為嗟乎此足觀公矣不有其利且不有其名殆庶幾無我也持此治天下無難而於一方何有蓋嘗論之州縣之吏以百里為我者也一郡之守以州縣為我者也司道之長以列郡為我者也撫臺之尊合道郡州縣為我者也故邑無循令則郡有慙德府事修和而後憲司無忝撫臺之精神包羅流貫於上下其政方舉有一閼隔皆為未充公其以無我者師帥江北俾道府州縣皆忘其我而共成一我政其興哉民其康哉國家藉兹地為重又何疑焉送許繩齊公祖入賀萬壽序繩齊許公湛心若氷植躬成矱蚤歲刺吾晉之澤郡一窺其丰采稔聞政教業辨冕仕籍既揚歷金紫飄飄巖棲者若而年諸簪紳過其廬無不式者當寧採庭臣議起憲晉寧公再三辭不獲允乃西視事宿竇故俗為之一滌吏未有不灑然者事未有不釐然者民未有不帖然者世之為政以簿書公之為政以身也今歲春大計羣寮銓臣疏舉廉異吏以風有位海內不數數公褎然其間是秋屆聖天子萬壽之辰公將賫表入賀郡大夫祖帳郊關質余言為贈夫聖節告期萬國執玉冠蓋相望若公者真入賀人哉旅馳旅見拜舞嵩呼賀之文也忠誠懇惻如愛親年賀之實也於以究其實公誰遜焉夫壽君者壽國君所御也壽國者壽民國所由立也壽民者好生者也好生者盡其性者也盡其性者無所以閡之閡之者其出有繫其處有牽居榮若艷遇膏若霑性本虛而實之性本達而隔之君民何有乎公之挺然有執脫然無營處榮如蠟視膏如凂澄澄乎滓之汰也恢恢乎籬之剖也此性體之初也與衆通者也性與衆通之生乃與衆共之奚而不好故視民若子立其命焉視國若家永其脉焉對一夫而不敢忘君行一令而不敢忘君此之謂視君如元首世之元首乎君也以分公之元首乎君也以性以分則不敢廢其文以性則不容遏其實嗟乎天之不得不髙地之不得不下理也人生於天地而斯理咸具雖在童孺遇長則肅故曰義之於君臣有性焉真性露則愛君篤矣是行也天顔日邇赤念愈殷稽首闕前凝精帝座天子萬年而後喜可知也縟節云乎哉維天之鑒聖壽與齊介景福焉踰岡陵焉草野逺臣罔效華封之祝竊欣虎拜之䖍敬為吾君慶賀于虹蛟公祖兩臺交薦序虹蛟于公以東堂握篆綱振紀張三尺山嶷四壁氷凜不佞側觀風采喟然興嘆曰時哉鹺政由此舉乎既而鹽臺曽公按臺汪公相繼報命僉登薦剡不佞疊窺清評輒復嘉喜曰時哉百城此其鵠乎盍觀諸天焉臘深沍極陽律飛葭乃氣淑而彚暢長夏番庶商音應候則霜嚴而衆結假令有春無秋大造亦幾窮矣邇時鹺地何如哉地固近寶閭左通神如風斯靡人未能自制其情也煦煦咻燠之輒不無修其睚眦梗令次且嗟乎一人御宇萬里傾懷惟是法度聨絡智無庸謀勇無庸角也有其弛之莫或張之奚所恃亦奚所不至哉于公以徑氣直節挺挺明作不怨之辭不恩之樹不繞指之習不唯唯諾諾之拘骫法踰格令甲存焉商民始而駴中而服終乃定陽鱎固可阻也白額固可戮也烏足異者吏奉刀筆如刻木靡所施其黠至於願休閒行其庭跡稀喧絶顧不偉歟故斯時不可無公蓋天道也不可無兩臺之薦亦天道也匪公則法且湮匪薦則羣工無所嚆矢而法亦湮公之禆益兹土詎尋常效官奉職已耶迹厥注措適中其㑹者也故曰時也時者聖神所不違也夏之不得不忠也商之不得不質也周之不得不丈也仲尼當周之季不得不文勝之厭也時焉而已矣唐之藩鎮宋之邊患始以因循竟成壅潰不識時者也故動陽於六杪運陰於九極易之為道不越乎時以濟窮而成不匱者也鹺之廣文諸士質言贈公夫縫掖之談治法出焉治能外於時乎乃以此為復而并以為公贈贈吳中麓父母入覲序往歲中麓吳父母補選吾邑當事者若以為難地焉而公慨然易之余窺其言論丰采私為吾邑稱慶既則及中途而玩胥畏威甫入境而閭閻飲和上下不由掾喙運之獨斷徭賦不必往案要之便民讞牒不恣雀角歸之式憲藹然進赤子於几杖而休息均調之民於是帖席窮鄉僻陬垂白之叟謂及其未斃而出之於壑余親聞之而鄰封遙逖之人企足引首思睹其顔色每一行部至於擁道此其地之難易何如也然其故難言之矣且民情之善良者無論即有一二故染亦大都外憍虛而中柔脆張之則張伏之則伏轢之則憊綏之則蘇法易行也恩易入也公得其機矣兹以修覲屆候先期戒途而簪紳孺耄之謠頌者繾綣者難其往而盼其還者巷若沸而心如結而公之介幕若談君邊君封君茹厥德意受厥成績莫不採謠頌而揄揚焉其僚采之間耳目最真精神最邇有不容已爾夫謠頌也繾綣也若沸而如結也氣所通也氣也者一體也一體也者父母也請陳父母之說先儒云乾稱父坤稱母而人秉天地之性則父母之道誰人不具顧所用如何爾或用之一家或用之百里或用之千里或用之天下性一而已隨處而顯施非易地而增減故漢讃循吏詩戒具瞻無異術也若乃胡越分岐痛癢罔與是荆棘生膝下而同室反唇也公嘗向余語曰吾行實事者嗟乎實哉實哉乾得實以父坤得實以母人得實以備乾坤之性實則通文則隔古昔之治以實叔季之治以文循吏也具瞻也實焉足矣公非久處百里天下之大且利藉焉是行也銓鑑之司當最其父母之績以報當寧余故推本其性而謂由於實三君其以為然乎送潘子孟深二刺膠州序天為民立君君為民立百司庶僚職巨職細不同總之各盡其職以安民而成治譬之目視耳聽手持足行以成此一身而已矣乃或以內外正佐風憲有司之異而厭薄其官濡延歲月以為弗獲建樹而職以內曽不克盡是目不能視而顧憾其弗得聽足不能行而以不獲持為歉也豈不惑哉潘子孟深為中丞熙臺先生之孫少承家學攻儒業入太學博洽善詩辭不難一第而竟不偶選授膠之二刺或者以不盡其長惜之夫長亦何地不可酬哉㑹計當而委吏非虛茁壯長而乘田無負惟其如是故為司寇而魯大治今人但知薄委吏不為而不知其無孔子㑹計之當即委吏亦且溺職縱授之司冦亦何以治焉夫一州之中有刺史主之而其僚屬或司捕司農司戎司教化不一而足借令捕者戢民之寇盜農者豐民之蓄積戎者使民知兵教化者使民仁且讓不亦一郡至理乎若捕者不省關農者不履畝則非官之不能盡其人而人之不能盡其官也孟深第盡其所司為良二刺而已他非當計賀邑二尹定宇賈父母擢尹餘慶序夫世之治不治由民之安不安民之安不安由仕之職不職仕之職不職由學之明不明古者學而後仕是以其職舉民賴以安而措世於上理晚世之仕者罕由於學非無學也帖括辭章以為工課利祿華膴以為期許非古之所謂學也一登仕版鮮有軫民之隱者豈啻不軫其隱且朘其脂膏焉輦金載玉自不之醜親戚鄰右亦鮮為之醜也其資微位下者尤甚前途近而掊克若不遑也元元奚藉焉邇值四裔之警旱荒之災有識者且謂揭竿斬木之變若在眉睫焉吁嗟朝廷之設官豈期至於此乎關西馮仲好先生倡學造士厥意良逺定宇賈君實出其門以明經來丞吾邑催徵其職也初至掾史以羡金進麾之不納邑人以為詫奈何有視金若凂之丞也繼從事直指之臺職司捕有訟者具緡錢為爰書費亦麾之邑人尤以為詫奈何有視金若凂之捕官也於是聲藉藉起署邑篆又署臨汾篆猗氏篆廉靖加毖垂白老人私議於閭諺有之署官如劫奈何有視金如凂之署官也豫聞而重之然不以為異彼其講學關西之日澄徹其心靈堅定其操守久矣知愛其身而不肯淪於可醜矣固將軒軒磊磊答億兆報朝廷維斯世千秋不朽寧肯令此膩垢者㸃其皎皎乎哉君不阿上官之左右初時不見知顧茂實奚掩竟知之既而直指薦於朝主爵者擢餘慶令尹吾邑之慶將移於餘慶餘慶之慶也夫主爵乃得人若是主爵之慶也夫海內聞風清吏且蒸起海內之慶也夫初時忽有訛傳謂升信不的衆乃譁是將致汶汶者揶揄矣夫夫亦僅至此乎已而升信確交相慶者倍於前索文於豫以賀故事為賀文者須糚㸃媺事其衷不鬯豫則深知君握管一揮而就甚慊也此亦豫之慶也夫贈張蓮汀寅丈南歸序世有砥躬修行之士不知者曰此跖也可以謂之跖乎彼固不自跖也世有貪榮嗜利之夫不知者曰此夷也可以謂之夷乎彼亦不自夷也真夷真跖在人之自知外之毁譽不與焉寅丈張蓮汀氏以保定賢能薦調淮安董治河事比初至豫迓之舟中見其繪河圖為屏心敬其賢必謹於職業者也及理大工綜核有方略曽半夜遇大風雨席廬盡圮萬夫大譁幾僨事一言定之往歲運道水涸舟不能寸移主司者束手君倡議塞義安口而四百萬漕粟盡北矣其才識勛勞大約類此然從事理學其講談多心見此其立身出政之本也君宮保之子淡素若出韋布其家學有自此又其本也每向余言世路多崎嶇圖歸田以教子孫豫曰君才當用世且當事者憐才安能遂君之圖乃主議者以不理之口投閒乎君夫君之所圖果遂矣顧其遂君之圖者非所以為名也然君亦有真徜徉泉石之間遊酣詩書之府明學範俗佑啓後人此乃多才多勛求歸田之蓮汀也非主議者聽不理之口投閒之蓮汀也君亦自知何如耳何恤乎人言送劉生本唐西還序劉生將還之前一日曹子過焉問所學對曰方從事忍字乃翁豫吾年兄亦首肯謂其言果不誣也善乎哉劉生之篤於學也夫色之於目聲之於耳味之於口臭之於鼻安佚之於四肢環向而相餌而我之欲心競心嗔心矜心習心方且沸如湯飛如蓬躁如技癢忍何容易故一時不忍或貽百歲之羞一念不忍或起滔天之禍故君子忍小以就大忍妄以就真忍童心俗氣以就聖躅賢軌蓋終身以之也夫衆人之不忍何也懦也懦則物强而我弱君子之能忍何也勇也勇則我大而物小故天行健君子自强勇之謂也然勇可習乎夫愧懷內生赤發於面斯時也其氣揚故兩軍對壘雖有羸夫辱之則奮故曰知恥近勇夫言恥而知先之恥生於知也亦有褎衣聚談甘辭仁義不知暴棄之可嗤流俗相仍駕言從衆不知塵情之可鄙故學先於求知而知何以求焉水之照以清心之靈以虛知生於內者也對鑑而知我之妍醜對聖哲之範師友之良而知我之善惡知藉於外者也知則恥矣恥則勇矣勇則忍矣夫虞帝殷相古之大聖也則亦動之忍之增益之於未降大任之先而克勝其任矣動則知之謂也恥之謂也動則忍矣動忍則增益矣劉生將求增益以待大任烏得不動忍之兢兢賀張碩人烏臺旌節序碩人景氏余年友奉常公之女十六齡時為天部張公之子婦公子素抱羸恙不數日别室靜攝荏苒三月而捐世去人謂碩人於公子即眉目亦未稔也然而矢志從一既不獲身殉則寂守閴閣玉遜瑩氷遜潔石遜堅逮今三十餘載嗣子有室嗣女有家門閥不墜埒天部他公子若光大者萬口嘖嘖謂公子有妻天部有婦奉常公有女宗親頌於庭鄰里讃於閭於是鹺直指念山張公採羣議而旌焉隆以鏹幣額其門曰苦節可風云粵稽易之坤彖曰利貞又曰安貞吉又曰利永貞不貞何以為坤德貞而不安非貞也貞而不永亦非貞也伊其徑節如斯可不謂貞乎確然無二可不謂安乎垂老節成可不謂永乎貞而安安而永坤元不在兹乎洵可以風矣凡厥有生誰無貞性惟無所風貿貿不識所之故春風過而衆物榮秋風起而萬彚肅風之所關詎不大哉兹者碩人為風四國為草諸凡閨闥之媛瞻望感嘆方知翠鈿羅綺非華也刺繡挑描非巧也惟是貞節堅凝乃為兩間之正氣一代之完人而步武芳蹤當亦不乏孰非風之所鼓抑聞道肇居室化先閨範詩首二南書崇溈汭豈徒為壼內人哉有婦之貞以風為子則不二於親以風為臣則不二於君以風為弟則不二於兄以風為朋則不二於友若曰彼女也且松筠其節我士也豈萎薾其行故曰男兒負剛氣莫愧女郎身然則碩人之所風廣矣苦在一身而風化被於千萬人苦在百年而令名流於千百世是以蚤謝鉛華不辭落寞固守之定亦識之卓也雖然苦節之云旁人睨之耳碩人奚苦焉彼其寧心一醮之不忘坦然成性異日見夫於地下香骨如銀其視無貞之婦方且興憐興慨曰斯人也不人而禽何苦乃爾蓋視失節極大以節為甘故曰苦節之云旁觀之說耳昔聞公子蚤負異才未弱冠入黌序輒擅詞壇之牛耳天假之年必當巍科膴仕封妻光顯彼一時也碩人冠帔鏗鏘里婦企踵而誇羡脅肩而尊奉然無以顯其貞亦無以樹之風政不出於閾外名不聞於四方但赫然榮耀已耳以今校彼孰大孰小蓋亦有天意焉天若謂世態之靡如瀾之倒不有以風究將何極障大河者必堅土護名花者豈朽木風斯世者非若人之儔與而誰與是以寧奪其榮而置之苦藉其節而用以風耳然則直指之褒旌固奉若天意也宗親鄰里之旅賀亦動於天也碩人以節風直指觀風仍以碩人風天以碩人及直指風余不敏以不文之辭揚其風且厚望吾里之人勿負此風辛母陶夫人七旬壽言序陶夫人者贈尚書一閒公六世孫女裔出於晉靖節先生蚤稱孝女適辛稱賢孝婦生子為慈母子復元篤於聖學乃曩者夫人能忍貧俾竟儒業乏膏繼晷令爇香以照致有今日當路交旌焉勉之曰勿自滿峩冠者罕此識也秋仲初壽七旬辛子門下士樂辛子之有壽母相與歌頌之辛子樂其母壽樂門人之歌頌其母而母以歌頌而益樂且益壽也俱天理人情之至也諸士質余言為引辛子亦以簡來昔者趙冡宰吉亭公語余於京師士大夫之家多壽母歷數之信然茂樹繇生坤氣必厚抑以貴事志適氣固理有然乎然猶以勢分論也況生子而賢且以賢事又當何如兹夫人之所以壽也古之論大孝者曰德為聖人生子而聖且以聖事更當何如固亦盡人之子盡人之母也諸士頌夫人之壽必述其德亦必及其子之德述其德則德其德矣各德其德各事其事子各事其事親各壽其壽洋洋金石之頌交相應也洵樂乎哉此亦夫人所欲也寧公異政序天壤間目之可睹耳之可聞足之可至謂之明目所不可睹耳所不可聞足所不可至謂之幽明有盡幽無盡通於明不通於幽猶局曲之見也古之君子不愧屋漏惟是環吾前後昭布森列莫非鬼神無時無地無敢不敬故不至有愧而學士家或以厭世人徼福之陋漫云何鬼神之有孔夫子盛德之訓何以說焉幾何不縱肆於屋漏也胡不觀明軒寧公公為髙密侯禱雨雨至憂雹雹止憂蝗蝗去夫非鬼神之所為歟一念潜孚捷於桴鼓鬼神之顯如是公蓋無不敬者無不敬則吾心之神凝以吾心之神通鬼神故隨感隨應也凡人以形用者有及有不及以神用者無不入以形用者聲音笑貌不能信孺子以神用者六通四闢用之於明格豚魚用之於幽動天地彼以隱微之中莫豫視指邪辟暗滋不知鬼神在旁歷歷洞悉吁其亦可愧也夫其亦可懼也夫仰節堂集卷二
